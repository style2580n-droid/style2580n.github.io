});

/* window.storage 폴리필 — Claude 아티팩트 밖(일반 웹)에서는 localStorage로 영구 저장 */
(function(){
  if (window.storage) return;
  function lsKey(k, shared){ return (shared?"shared:":"user:") + k; }
  window.storage = {
    async get(key, shared){
      const v = localStorage.getItem(lsKey(key, shared));
      if (v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(lsKey(key, shared), value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(lsKey(key, shared));
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const pfx = lsKey(prefix||"", shared);
      const keys = [];
      for (let i=0;i<localStorage.length;i++){
        const full = localStorage.key(i);
        if (full && full.startsWith(pfx)){
          keys.push(full.replace(shared?"shared:":"user:",""));
        }
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();
</script>

// ═══════════════════════════════════════════════════════════
// 💾 window.storage 폴리필 — 클로드 아티팩트 전용 API(window.storage)가
//   존재하지 않는 일반 웹 환경(GitHub Pages 등)에서도 동일하게 동작하도록
//   localStorage 기반으로 자동 대체. 앱 전체의 모든 저장/불러오기가
//   window.storage.get/set/delete 를 거치므로, 여기서 한 번만 보강하면
//   실제 배포 사이트에서도 예측 기록·ELO·설정이 정상적으로 영구 저장됨.
// ═══════════════════════════════════════════════════════════
if (typeof window !== "undefined" && !window.storage) {
  const LS_PREFIX = "wcpred:"; // localStorage 키 충돌 방지용 접두사
  window.storage = {
    async get(key, shared) {
      try {
        const raw = localStorage.getItem(LS_PREFIX + key);
        if (raw == null) return null;
        return { key, value: raw, shared: !!shared };
      } catch (e) { return null; }
    },
    async set(key, value, shared) {
      try {
        localStorage.setItem(LS_PREFIX + key, value);
        return { key, value, shared: !!shared };
      } catch (e) { return null; }
    },
    async delete(key, shared) {
      try {
        localStorage.removeItem(LS_PREFIX + key);
        return { key, deleted: true, shared: !!shared };
      } catch (e) { return null; }
    },
    async list(prefix, shared) {
      try {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(LS_PREFIX)) {
            const stripped = k.slice(LS_PREFIX.length);
            if (!prefix || stripped.startsWith(prefix)) keys.push(stripped);
          }
        }
        return { keys, prefix, shared: !!shared };
      } catch (e) { return null; }
    },
  };
}

// 🧮 수학 유틸리티 (원본 그대로)
// ═══════════════════════════════════════════════════════════
function expScore(ra, rb) {
  return 1 / (1 + Math.pow(10, (rb - ra) / 400));
}
function glicko2Factor(rd) {
  const q = Math.log(10) / 400;
  return 1 / Math.sqrt(1 + (3 * q * q * rd * rd) / (Math.PI * Math.PI));
}
function calcDrawProb(eloDiff) {
  const base = 0.27;
  const closeness = Math.max(0, 1 - Math.abs(eloDiff) / 500);
  return Math.min(0.34, Math.max(0.16, base + closeness * 0.07));
}
function poissonRandom(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}
function playerEloPenalty(team) {
  const data = ELO[team];
  if (!data) return 0;
  return (data.injuries || 0) * 8;
}
function bayesianBlend(priorProb, dataProb, weight = 0.6) {
  if (typeof dataProb !== "number" || isNaN(dataProb)) return priorProb;
  return priorProb * (1 - weight) + dataProb * weight;
}

// ⚙️ 동적 ELO 모듈 (경기 결과 입력 → 실시간 갱신)
// ★ 오류수정: const → let 로 변경 + storage 영구저장 추가
//   (헤더 주석의 "영구 저장 storage" 요구사항을 충족시키기 위함.
//    계산식 자체는 원본과 완전히 동일, 저장/복원만 추가됨)
// ═══════════════════════════════════════════════════════════
let _dynamicElo = {}; // { teamName: {base, xG, xGA, ...} } - 경기결과 반영시 덮어씀

function getDynElo(team, field) {
  const dyn = _dynamicElo[team];
  if (dyn && typeof dyn[field] === "number") return dyn[field];
  const base = ELO[team];
  if (base && typeof base[field] === "number") return base[field];
  // 안전 기본값
  const FALLBACK = { base:1300, xgElo:1300, atk:1300, def:1300, form:1300, market:1300, player:1300, xG:1.3, xGA:1.3, npXg:1.2, ppda:14, fieldTilt:45, setPxg:0.25 };
  return FALLBACK[field] ?? 1300;
}
function getKFactor(stage = "group") {
  const factors = { group:20, ro16:24, qf:28, sf:32, final:40, friendly:12, qualifier:16, po:18 };
  return factors[stage] ?? 20;
}
// ★ 유효성 검사: xG/xGA가 없거나 NaN이면 실제 득점 기반 기본값으로 대체
function updateEloAfterMatch(home, away, homeGoals, awayGoals, xgHome, xgAway, stage = "group") {
  const hg = Number.isFinite(homeGoals) ? homeGoals : 0;
  const ag = Number.isFinite(awayGoals) ? awayGoals : 0;
  const safeXgHome = (typeof xgHome === "number" && !isNaN(xgHome)) ? xgHome : Math.max(0.2, hg + 0.3);
  const safeXgAway = (typeof xgAway === "number" && !isNaN(xgAway)) ? xgAway : Math.max(0.2, ag + 0.3);

  const homeBase = getDynElo(home, "base");
  const awayBase = getDynElo(away, "base");
  const expectedHome = expScore(homeBase + 60, awayBase);

  let actualHome = 0.5;
  if (hg > ag) actualHome = 1; else if (hg < ag) actualHome = 0;

  const k = getKFactor(stage);
  const goalDiff = Math.abs(hg - ag);
  const margin = goalDiff <= 1 ? 1 : (goalDiff === 2 ? 1.5 : 1.75);
  const homeChange = k * margin * (actualHome - expectedHome);
  const awayChange = -homeChange;

  if (!_dynamicElo[home]) _dynamicElo[home] = { ...(ELO[home] || {}) };
  if (!_dynamicElo[away]) _dynamicElo[away] = { ...(ELO[away] || {}) };

  _dynamicElo[home].base = homeBase + homeChange;
  _dynamicElo[away].base = awayBase + awayChange;

  const prevHomeXg = getDynElo(home, "xG");
  const prevAwayXg = getDynElo(away, "xG");
  const prevHomeXga = getDynElo(home, "xGA");
  const prevAwayXga = getDynElo(away, "xGA");

  _dynamicElo[home].xG  = prevHomeXg  * 0.7 + safeXgHome * 0.3;
  _dynamicElo[away].xG  = prevAwayXg  * 0.7 + safeXgAway * 0.3;
  _dynamicElo[home].xGA = prevHomeXga * 0.7 + safeXgAway * 0.3;
  _dynamicElo[away].xGA = prevAwayXga * 0.7 + safeXgHome * 0.3;

  return { homeChange, awayChange, newHomeBase: _dynamicElo[home].base, newAwayBase: _dynamicElo[away].base, safeXgHome, safeXgAway };
}
// ★ 추가: 동적 ELO 영구저장/복원/초기화 (storage 사용 — 헤더 주석 요구사항)
async function loadDynamicElo() {
  try {
    const r = await window.storage.get("wc:dynamicElo", false);
    if (r?.value) _dynamicElo = JSON.parse(r.value);
  } catch (e) { /* 없으면 빈 객체 유지 */ }
}
async function saveDynamicElo() {
  try { await window.storage.set("wc:dynamicElo", JSON.stringify(_dynamicElo), false); } catch (e) {}
}
async function resetDynamicElo() {
  _dynamicElo = {};
  try { await window.storage.delete("wc:dynamicElo", false); } catch (e) {}
}

// 🤖 ML 랜덤포레스트 앙상블 (5-tree, 휴리스틱 결정트리) — 원본 그대로
// ═══════════════════════════════════════════════════════════
function buildFeatureVector(home, away, homeAdv = 60) {
  const h = ELO[home] || {}, a = ELO[away] || {};
  const hSpi = SPI_RATINGS[home]?.spi ?? 50, aSpi = SPI_RATINGS[away]?.spi ?? 50;
  const hOpta = OPTA_RANKINGS[home]?.powerScore ?? 50, aOpta = OPTA_RANKINGS[away]?.powerScore ?? 50;
  // ★ 오류수정: 기존 코드는 getDynElo(home,"_formArr") 가 항상 숫자(1300)를 반환해
  //   "(숫자).reduce"가 undefined → 조건이 항상 false가 되어 hForm이 0으로 고정되는 버그.
  //   → formDiff가 항상 -aForm*8 이 되어 ML 트리4(폼/필드틸트)가 홈팀 폼을 전혀 반영하지 못했음.
  //   formArr 그대로 합산하도록 수정 (decisionTree1~5, predictMatch 등 다른 로직은 변경 없음).
  const hForm = (h.formArr||[]).reduce((s,x)=>s+x,0);
  const aForm = (a.formArr||[]).reduce((s,x)=>s+x,0);
  return {
    // ★ 버그수정: eloDiff에 홈 어드밴티지(homeAdv)를 반영. 이전에는 누락되어
    //   ML 트리 앙상블(40% 비중)이 홈 이점을 전혀 못 봐서, 막상막하 경기에서
    //   확률이 50:50으로 눌리거나 약체 홈팀이 과대평가되는 문제가 있었음.
    eloDiff: getDynElo(home,"base") - getDynElo(away,"base") + homeAdv,
    spiDiff: hSpi - aSpi,
    optaDiff: hOpta - aOpta,
    xgDiff: getDynElo(home,"xG") - getDynElo(away,"xG"),
    xgaDiff: getDynElo(away,"xGA") - getDynElo(home,"xGA"),
    formDiff: hForm - aForm,
    ppdaDiff: (a.ppda ?? 14) - (h.ppda ?? 14),
    fieldTiltDiff: (h.fieldTilt ?? 45) - (a.fieldTilt ?? 45),
    setPxgDiff: (h.setPxg ?? 0.25) - (a.setPxg ?? 0.25),
  };
}
function decisionTree1(f) { // ELO 기반
  if (f.eloDiff > 150) return {homeWin:0.65, draw:0.20, awayWin:0.15};
  if (f.eloDiff > 50)  return {homeWin:0.50, draw:0.27, awayWin:0.23};
  if (f.eloDiff > -50) return {homeWin:0.38, draw:0.30, awayWin:0.32};
  if (f.eloDiff > -150)return {homeWin:0.25, draw:0.27, awayWin:0.48};
  return {homeWin:0.13, draw:0.20, awayWin:0.67};
}
function decisionTree2(f) { // SPI 기반
  if (f.spiDiff > 15) return {homeWin:0.60, draw:0.22, awayWin:0.18};
  if (f.spiDiff > 5)  return {homeWin:0.48, draw:0.28, awayWin:0.24};
  if (f.spiDiff > -5) return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (f.spiDiff > -15)return {homeWin:0.26, draw:0.28, awayWin:0.46};
  return {homeWin:0.16, draw:0.22, awayWin:0.62};
}
function decisionTree3(f) { // xG 공수 밸런스
  const d = f.xgDiff + f.xgaDiff;
  if (d > 0.6)  return {homeWin:0.58, draw:0.24, awayWin:0.18};
  if (d > 0.2)  return {homeWin:0.46, draw:0.29, awayWin:0.25};
  if (d > -0.2) return {homeWin:0.36, draw:0.31, awayWin:0.33};
  if (d > -0.6) return {homeWin:0.26, draw:0.29, awayWin:0.45};
  return {homeWin:0.15, draw:0.23, awayWin:0.62};
}
function decisionTree4(f) { // 폼 + 필드틸트
  const d = f.formDiff * 8 + f.fieldTiltDiff;
  if (d > 12)  return {homeWin:0.56, draw:0.24, awayWin:0.20};
  if (d > 4)   return {homeWin:0.46, draw:0.29, awayWin:0.25};
  if (d > -4)  return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (d > -12) return {homeWin:0.28, draw:0.29, awayWin:0.43};
  return {homeWin:0.18, draw:0.24, awayWin:0.58};
}
function decisionTree5(f) { // Opta + 세트피스
  const d = f.optaDiff + f.setPxgDiff * 40;
  if (d > 12)  return {homeWin:0.59, draw:0.23, awayWin:0.18};
  if (d > 4)   return {homeWin:0.47, draw:0.28, awayWin:0.25};
  if (d > -4)  return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (d > -12) return {homeWin:0.27, draw:0.28, awayWin:0.45};
  return {homeWin:0.17, draw:0.22, awayWin:0.61};
}
function randomForestWinProb(f) {
  const trees = [decisionTree1(f), decisionTree2(f), decisionTree3(f), decisionTree4(f), decisionTree5(f)];
  const sum = {homeWin:0, draw:0, awayWin:0};
  trees.forEach(t => { sum.homeWin+=t.homeWin; sum.draw+=t.draw; sum.awayWin+=t.awayWin; });
  const total = sum.homeWin + sum.draw + sum.awayWin;
  return { homeWin: sum.homeWin/total, draw: sum.draw/total, awayWin: sum.awayWin/total, trees };
}
function mlAdjustedLambda(lambda, mlSkew) {
  // mlSkew: -1(원정 압도) ~ +1(홈 압도)
  const safeLambda = Number.isFinite(lambda) ? lambda : 1.2;
  const safeSkew = Number.isFinite(mlSkew) ? mlSkew : 0;
  return Math.max(0.15, safeLambda * (1 + safeSkew * 0.15));
}

// 🎯 핸디캡(Asian Handicap) 커버 확률 — 몬테카를로 결과 재활용
// ═══════════════════════════════════════════════════════════
function getHandicapProbs(scoreCounts, totalSims) {
  const handicaps = [-1.5, -1.0, -0.5, 0, 0.5, 1.0, 1.5];
  const result = {};
  for (const h of handicaps) {
    let cover = 0;
    for (const [score, cnt] of Object.entries(scoreCounts)) {
      const [hg, ag] = score.split("-").map(Number);
      if (hg + h > ag) cover += cnt;
    }
    const key = h > 0 ? `+${h}` : `${h}`;
    result[key] = cover / totalSims;
  }
  return result;
}

// ═══════════════════════════════════════════════════════════
// 💰 Value Bet (기대수익, EV) — 내부 모델 확률 vs 시장 배당
// ═══════════════════════════════════════════════════════════
function computeEV(modelProb, oddsDecimal) {
  if (typeof modelProb !== "number" || !oddsDecimal || oddsDecimal <= 1) return null;
  return (modelProb * oddsDecimal) - 1; // 양수면 기대수익 있음
}
// 오버/언더 라인 1개({point,over,under} 배당)를 마진제거해 {over,under} 확률로 정규화
function devigTotalsLine(entry) {
  if (!entry || typeof entry.over !== "number" || typeof entry.under !== "number") return null;
  const io = 1/entry.over, iu = 1/entry.under;
  const sum = io + iu;
  if (sum <= 0) return null;
  return { over: io/sum, under: iu/sum };
}
function calcValueBets(result) {
  if (!result.marketProbs || !result.marketTotals) return null;
  // 역배당(implied prob)에서 odds 역산 (마진제거 안된 원본 배당 필요하나 없으면 근사)
  const mp = result.marketProbs; // devigOdds 이미 마진제거됨 → 역수가 fair odds
  const fairOddsH = mp.home > 0 ? 1 / mp.home : null;
  const fairOddsD = mp.draw > 0 ? 1 / mp.draw : null;
  const fairOddsA = mp.away > 0 ? 1 / mp.away : null;
  return {
    home: computeEV(result.homeWinProb, fairOddsH),
    draw: computeEV(result.drawProb, fairOddsD),
    away: computeEV(result.awayWinProb, fairOddsA),
  };
}

function getTravelInfo(team) {
  const km = TRAVEL_KM[team] ?? null;
  if (km === null) return null;
  // 거리 구간별 피로도 등급
  let penalty = 0, grade = "없음", gradeColor = T.green;
  if (km < 1000) { penalty = 0; grade = "홈/인근"; gradeColor = T.green; }
  else if (km < 5000) { penalty = -0.01; grade = "낮음"; gradeColor = T.cyan; }
  else if (km < 9000) { penalty = -0.02; grade = "보통"; gradeColor = T.gold; }
  else if (km < 12000) { penalty = -0.03; grade = "높음"; gradeColor = T.red; }
  else { penalty = -0.04; grade = "매우 높음"; gradeColor = T.red; }
  return { km, penalty, grade, gradeColor };
}


function getRestDays(team, matchDate) {
  const prev = SCHEDULE.filter(m =>
    (m.home === team || m.away === team) && m.date < matchDate
  ).sort((a, b) => a.date < b.date ? 1 : -1)[0];
  if (!prev) return null;
  return (new Date(matchDate) - new Date(prev.date)) / (1000 * 3600 * 24);
}
function getRestPenalty(team, matchDate) {
  if (!matchDate) return 0;
  const days = getRestDays(team, matchDate);
  if (days === null) return 0;
  if (days < 3) return -0.04;   // 3일 미만 휴식 → 피로 패널티
  if (days > 6) return +0.02;   // 7일 이상 → 충분한 휴식 보너스
  return 0;
}

// ═══════════════════════════════════════════════════════════
// 🔥 동기부여 지수 — 조별리그 경기 차수 기반
// ═══════════════════════════════════════════════════════════
function getMotivationFactor(team, matchDate) {
  if (!matchDate) return 1.0;
  const teamMatches = SCHEDULE
    .filter(m => m.home === team || m.away === team)
    .sort((a, b) => a.date < b.date ? -1 : 1);
  const idx = teamMatches.findIndex(m => m.date === matchDate);
  if (idx < 0) return 1.0;
  const total = teamMatches.length;
  // 3차전(마지막)이면 탈락 위기감 or 조 1위 이미 확정 시나리오는
  // ELO 데이터 없이는 알 수 없으므로, 차수에 따른 기본 보정만 적용
  if (idx === total - 1) return 1.05;  // 마지막 경기: 결전 의지 상승
  if (idx === 0) return 1.02;          // 1차전: 첫 경기 긴장감
  return 1.0;
}

// ═══════════════════════════════════════════════════════════
// 🎯 predictMatch — 8단계 하이브리드 ELO + ML + 몬테카를로 (원본 그대로, 손대지 않음)
// ═══════════════════════════════════════════════════════════
const STAGE_WEIGHTS = { base:0.20, xgElo:0.15, atk:0.10, def:0.10, form:0.15, market:0.15, player:0.15 };

function compositeElo(team) {
  let total = 0;
  for (const [field, w] of Object.entries(STAGE_WEIGHTS)) total += getDynElo(team, field) * w;
  total -= playerEloPenalty(team);
  return total;
}

function predictMatch(homeName, awayName, sims = 100000, liveOverride = {}) {
  const dateISO = liveOverride.dateISO || null;
  const homeRestBonus = getRestPenalty(homeName, dateISO);
  const awayRestBonus = getRestPenalty(awayName, dateISO);
  const homeMotivation = getMotivationFactor(homeName, dateISO);
  const awayMotivation = getMotivationFactor(awayName, dateISO);

  const homeEloRaw = compositeElo(homeName) * (1 + homeRestBonus) * homeMotivation;
  const awayEloRaw = compositeElo(awayName) * (1 + awayRestBonus) * awayMotivation;
  const homeAdv = liveOverride.neutralVenue ? 25 : 60;
  const homeElo = homeEloRaw + homeAdv;
  const awayElo = awayEloRaw;

  const eloDiff = homeElo - awayElo;
  const winProbRaw = expScore(homeElo, awayElo);
  const drawProbRaw = calcDrawProb(eloDiff);
  let homeWinProb = winProbRaw * (1 - drawProbRaw);
  let awayWinProb = (1 - winProbRaw) * (1 - drawProbRaw);
  let drawProb = drawProbRaw;

  // ML 앙상블 블렌딩 (40%)
  const features = buildFeatureVector(homeName, awayName, homeAdv);
  const mlProbs = randomForestWinProb(features);
  homeWinProb = bayesianBlend(homeWinProb, mlProbs.homeWin, 0.4);
  awayWinProb = bayesianBlend(awayWinProb, mlProbs.awayWin, 0.4);
  drawProb    = bayesianBlend(drawProb,    mlProbs.draw,    0.4);
  let normTotal = homeWinProb + awayWinProb + drawProb;
  homeWinProb /= normTotal; awayWinProb /= normTotal; drawProb /= normTotal;

  // 기대 득점(λ) 산출
  const hData = ELO[homeName] || {}, aData = ELO[awayName] || {};
  const hXg = getDynElo(homeName, "xG"), hXga = getDynElo(homeName, "xGA");
  const aXg = getDynElo(awayName, "xG"), aXga = getDynElo(awayName, "xGA");
  // ★ 버그수정(#2): 홈 어드밴티지 λ 계수를 중립 경기에선 약화.
  //   일반 홈경기는 홈팀 +8%/원정 -5%, 중립 구장은 양팀 대칭(±0)에 가깝게.
  const homeLambdaMul = liveOverride.neutralVenue ? 1.00 : 1.08;
  const awayLambdaMul = liveOverride.neutralVenue ? 1.00 : 0.95;
  let lambdaHome = ((hXg + aXga) / 2) * homeLambdaMul;
  let lambdaAway = ((aXg + hXga) / 2) * awayLambdaMul;

  // ★ 핵심수정: λ를 ELO 차이와 연동.
  //   기존엔 λ(평균 xG)와 ELO 승률이 따로 놀아서, ELO 강팀이 xG가 약하게 입력되면
  //   몬테카를로가 우세를 희석시켜 확률이 뭉개지는 문제가 있었음.
  //   ELO 차 200점당 약 ±18% 득점력 보정 (강팀 λ↑, 약팀 λ↓).
  const eloLambdaFactor = Math.max(-0.35, Math.min(0.35, eloDiff / 200 * 0.18));
  lambdaHome *= (1 + eloLambdaFactor);
  lambdaAway *= (1 - eloLambdaFactor);
  lambdaHome = Math.max(0.15, lambdaHome);
  lambdaAway = Math.max(0.15, lambdaAway);
  const mlSkew = mlProbs.homeWin - mlProbs.awayWin;
  lambdaHome = mlAdjustedLambda(lambdaHome, mlSkew);
  lambdaAway = mlAdjustedLambda(lambdaAway, -mlSkew);

  if (typeof liveOverride.lambdaHomeAdj === "number") lambdaHome = Math.max(0.15, lambdaHome + liveOverride.lambdaHomeAdj);
  if (typeof liveOverride.lambdaAwayAdj === "number") lambdaAway = Math.max(0.15, lambdaAway + liveOverride.lambdaAwayAdj);

  // ★ v2: PSxG 골키퍼 품질 보정
  const psxgAdj = psxgLambdaAdjust(lambdaHome, lambdaAway, homeName, awayName);
  lambdaHome = psxgAdj.lH;
  lambdaAway = psxgAdj.lA;

  // ⭐ v5: 핵심 선수(스타) 능력치 보정 — 데이터 없는 팀은 영향 없음(보정 0)
  const starAdj = starPlayerLambdaBoost(lambdaHome, lambdaAway, homeName, awayName);
  lambdaHome = starAdj.lH;
  lambdaAway = starAdj.lA;

  // ★ v2: 빅찬스 기반 확률 스큐 적용
  const bcSkew = bigChanceSkew(homeName, awayName);
  homeWinProb = Math.max(0.02, Math.min(0.96, homeWinProb + bcSkew));
  awayWinProb = Math.max(0.02, Math.min(0.96, awayWinProb - bcSkew * 0.6));
  drawProb    = Math.max(0.02, 1 - homeWinProb - awayWinProb);

  // ★ 몬테카를로 시뮬레이션 (sims 횟수, 기본 30,000회)
  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 100000;
  let hw=0, dr=0, aw=0;
  const scoreCounts = {};
  for (let i=0;i<safeSims;i++) {
    const hg = poissonRandom(lambdaHome);
    const ag = poissonRandom(lambdaAway);
    if (hg>ag) hw++; else if (hg<ag) aw++; else dr++;
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key]||0)+1;
  }
  const mcHome = hw/safeSims, mcDraw = dr/safeSims, mcAway = aw/safeSims;

  // ELO+ML(50%) ↔ 몬테카를로(50%) 최종 블렌딩
  const finalHome = (homeWinProb + mcHome) / 2;
  const finalDraw = (drawProb + mcDraw) / 2;
  const finalAway = (awayWinProb + mcAway) / 2;

  const allBaseScores = Object.entries(scoreCounts)
    .sort((a,b)=>b[1]-a[1])
    .map(([score,count])=>({ score, prob: count/safeSims }));

  // 우세팀 방향 스코어 우선 배치 (포아송 최빈값이 무승부로 고정되는 문제 방지)
  const bFav = homeWinProb > awayWinProb && homeWinProb > drawProb ? "home"
    : awayWinProb > homeWinProb && awayWinProb > drawProb ? "away" : "draw";
  let topScores;
  if (bFav !== "draw") {
    const fwins = allBaseScores.filter(s => {
      const [hg,ag] = s.score.split("-").map(Number);
      return bFav === "home" ? hg > ag : ag > hg;
    });
    const rest = allBaseScores.filter(s => !fwins.includes(s));
    topScores = [...fwins, ...rest].slice(0, 5);
  } else {
    topScores = allBaseScores.slice(0, 5);
  }

  const overUnder = computeOverUnder(scoreCounts, safeSims);
  const handicapProbs = getHandicapProbs(scoreCounts, safeSims);

  return {
    home: homeName, away: awayName,
    homeWinProb: finalHome, drawProb: finalDraw, awayWinProb: finalAway,
    eloOnly: { homeWinProb, drawProb, awayWinProb },
    monteCarlo: { homeWinProb: mcHome, drawProb: mcDraw, awayWinProb: mcAway },
    lambdaHome, lambdaAway,
    homeElo, awayElo, eloDiff,
    topScores,
    overUnder,
    handicapProbs,
    restInfo: { homeRestBonus, awayRestBonus, homeMotivation, awayMotivation },
    sims: safeSims,
    mlProbs, features,
    timestamp: Date.now(),
  };
}

// ★ scoreCounts({"2-1":count,...})로부터 오버/언더 2.5·3.5 확률 계산 (원본 그대로)
function computeOverUnder(scoreCounts, totalSims) {
  const lines = [2.5, 3.5];
  const result = {};
  for (const line of lines) {
    let over = 0;
    for (const [score, count] of Object.entries(scoreCounts)) {
      const [h, a] = score.split("-").map(Number);
      if ((h + a) > line) over += count;
    }
    result[line] = { over: over / totalSims, under: 1 - over / totalSims };
  }
  return result;
}

// ═══════════════════════════════════════════════════════════
// 🔬 교차검증(Cross-Validation) 헬퍼 (원본 그대로)
// ═══════════════════════════════════════════════════════════
function impliedProbabilityFromOdds(odds) {
  if (typeof odds !== "number" || !isFinite(odds) || odds <= 1) return null;
  return 1 / odds;
}

// 배당 3종 → 마진(오버라운드) 제거한 정규화 확률 {home,draw,away}
function devigOdds(oddsObj) {
  if (!oddsObj) return null;
  const ih = impliedProbabilityFromOdds(oddsObj.home);
  const id = impliedProbabilityFromOdds(oddsObj.draw);
  const ia = impliedProbabilityFromOdds(oddsObj.away);
  if (ih == null || id == null || ia == null) return null;
  const sum = ih + id + ia;
  if (sum <= 0) return null;
  return { home: ih/sum, draw: id/sum, away: ia/sum, source: oddsObj.source || null };
}

// ★ 실시간 예측: 정적 모델 결과에 라이브 배당 + 예측을 가중 혼합
//   고정값 방지의 핵심. 외부 데이터가 하나도 없으면 정적 결과를 그대로 반환(liveApplied:false).
//   v5: getMotivationFactorV2(Football-Data.org 조 순위 기반) 실제 반영
async function predictMatchLive(homeName, awayName, sims = 100000, dateISO = null) {
  // ── 동기부여 v2: Football-Data.org 조 순위 기반으로 λ 보정 ──
  const [homeMot, awayMot] = await Promise.all([
    getMotivationFactorV2(homeName, dateISO).catch(() => getMotivationFactor(homeName, dateISO)),
    getMotivationFactorV2(awayName,  dateISO).catch(() => getMotivationFactor(awayName,  dateISO)),
  ]);
  // predictMatch 내부의 정적 motivation과 차이(delta)만 추가 보정
  const baseMot = {
    home: getMotivationFactor(homeName, dateISO),
    away: getMotivationFactor(awayName,  dateISO),
  };
  const homeDelta = homeMot - baseMot.home; // 0이면 변화 없음
  const awayDelta = awayMot - baseMot.away;

  const base = predictMatch(homeName, awayName, sims, { dateISO, neutralVenue: true });

  // 동기부여 delta가 있으면 λ를 비례 보정 후 간단히 재정산
  let lambdaHome = base.lambdaHome * (1 + homeDelta);
  let lambdaAway = base.lambdaAway * (1 + awayDelta);
  lambdaHome = Math.max(0.15, lambdaHome);
  lambdaAway = Math.max(0.15, lambdaAway);

  if (!RUNTIME_CONFIG.useLiveOdds) return { ...base, lambdaHome, lambdaAway, liveApplied: false, liveSources: [], motivationApplied: (homeDelta!==0||awayDelta!==0) };

  const [oddsRaw, bsdPred, afPred] = await Promise.all([
    fetchMatchOdds(homeName, awayName).catch(() => null),
    fetchBsdPrediction(homeName, awayName).catch(() => null),
    fetchApiFootballPrediction(homeName, awayName, dateISO).catch(() => null),
  ]);

  const marketProbs = devigOdds(oddsRaw);
  const sources = [];
  // 외부 소스들을 평균내어 하나의 "시장/예측 컨센서스"로
  const ext = { home: [], draw: [], away: [] };
  if (marketProbs) { ext.home.push(marketProbs.home); ext.draw.push(marketProbs.draw); ext.away.push(marketProbs.away); sources.push("market"); }
  const addPred = (p) => {
    if (!p || p.home == null) return;
    const s = (p.home||0)+(p.draw||0)+(p.away||0);
    if (s > 0) { ext.home.push(p.home/s); ext.draw.push((p.draw||0)/s); ext.away.push(p.away/s); sources.push(p.source || "apiPrediction"); }
  };
  addPred(bsdPred);
  addPred(afPred);
  const apiPred = afPred || bsdPred; // 카드/요약 표시용 (API-Football 우선)

  if (!sources.length) {
    return { ...base, lambdaHome, lambdaAway, liveApplied: false, liveSources: [], marketProbs: null, apiPrediction: apiPred || null };
  }

  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const consensus = { home: avg(ext.home), draw: avg(ext.draw), away: avg(ext.away) };

  const w = Math.min(0.8, Math.max(0, RUNTIME_CONFIG.liveOddsWeight));
  let h = base.homeWinProb*(1-w) + consensus.home*w;
  let d = base.drawProb*(1-w) + consensus.draw*w;
  let a = base.awayWinProb*(1-w) + consensus.away*w;
  const tot = h+d+a;
  h/=tot; d/=tot; a/=tot;

  // 승률이 바뀌면 기대득점(λ)도 비례 조정 (동기부여 보정된 lambdaHome/Away 기반)
  const homeShift = base.homeWinProb > 0 ? h/base.homeWinProb : 1;
  const awayShift = base.awayWinProb > 0 ? a/base.awayWinProb : 1;
  lambdaHome = Math.max(0.2, lambdaHome * Math.pow(homeShift, 0.6));
  lambdaAway = Math.max(0.2, lambdaAway * Math.pow(awayShift, 0.6));

  // 스코어라인 재시뮬 (가벼운 8천회)
  const reSims = 8000;
  const scoreCounts = {};
  for (let i=0;i<reSims;i++) {
    const hg = poissonRandom(lambdaHome), ag = poissonRandom(lambdaAway);
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key]||0)+1;
  }
  const allScores = Object.entries(scoreCounts).sort((x,y)=>y[1]-x[1])
    .map(([score,count])=>({ score, prob: count/reSims }));

  // 단순 빈도 1위가 무승부 스코어인데 우세팀이 있으면, 우세 방향 스코어를 앞으로 배치
  // 예) 브라질 λ=1.8 vs 모로코 λ=0.7 → "2:0", "2:1" 등을 1위로
  const favored = h > a && h > d ? "home" : a > h && a > d ? "away" : "draw";
  let topScores;
  if (favored !== "draw") {
    const favWins = allScores.filter(s => {
      const [hg,ag] = s.score.split("-").map(Number);
      return favored === "home" ? hg > ag : ag > hg;
    });
    const rest = allScores.filter(s => !favWins.includes(s));
    // 우세팀 스코어 + 나머지 섞어서 Top5 (우세팀 스코어 최소 1개는 포함)
    const combined = [...favWins, ...rest];
    topScores = combined.slice(0, 5);
  } else {
    topScores = allScores.slice(0, 5);
  }

  const overUnder = computeOverUnder(scoreCounts, reSims);

  return {
    ...base,
    homeWinProb: h, drawProb: d, awayWinProb: a,
    lambdaHome, lambdaAway, topScores, overUnder,
    staticOverUnder: base.overUnder,
    staticProbs: { home: base.homeWinProb, draw: base.drawProb, away: base.awayWinProb },
    marketProbs, marketTotals: oddsRaw?.totals || null, marketTotalsSource: oddsRaw?.totalsSource || null, apiPrediction: apiPred || null,
    consensus,
    liveApplied: true,
    liveWeight: w,
    liveSources: sources,
    motivationApplied: (homeDelta!==0||awayDelta!==0),
    timestamp: Date.now(),
  };
}

function calcVariance(values) {
  const valid = values.filter(v => typeof v === "number" && !isNaN(v));
  if (valid.length < 2) return 0;
  const mean = valid.reduce((a,b)=>a+b,0) / valid.length;
  return valid.reduce((a,b)=>a + (b-mean)**2, 0) / valid.length;
}
function calculateConsensus(items) {
  // items: [{value, weight}]
  const valid = items.filter(it => typeof it.value === "number" && !isNaN(it.value));
  if (!valid.length) return null;
  const totalW = valid.reduce((a,b)=>a+b.weight, 0);
  if (totalW === 0) return null;
  return valid.reduce((a,b)=>a + b.value*b.weight, 0) / totalW;
}
function calculateDeviation(ourProb, consensusProb) {
  if (consensusProb === null || typeof ourProb !== "number") return null;
  return Math.abs(ourProb - consensusProb);
}
function calculateConfidenceScore(deviation, variance) {
  if (deviation === null) return 50;
  const devPenalty = Math.min(40, deviation * 150);
  const varPenalty = Math.min(20, (variance || 0) * 200);
  return Math.max(10, Math.round(100 - devPenalty - varPenalty));
}

// SPI/Opta 점수차 → 승률 변환 (간이 로지스틱)
function ratingDiffToProbs(diff, scale = 15, capDraw = 0.85) {
  const homeRaw = 1 / (1 + Math.pow(10, -diff / scale));
  const home = homeRaw * capDraw;
  const away = (1 - homeRaw) * capDraw;
  const draw = Math.max(0, 1 - home - away);
  return { home, draw, away };
}

async function crossValidate(homeName, awayName, ourProbs, dateISO = null) {
  try {
    const hSpi = SPI_RATINGS[homeName], aSpi = SPI_RATINGS[awayName];
    const hOpta = OPTA_RANKINGS[homeName], aOpta = OPTA_RANKINGS[awayName];

    const spiP = (hSpi && aSpi) ? ratingDiffToProbs(hSpi.spi - aSpi.spi) : null;
    const optaP = (hOpta && aOpta) ? ratingDiffToProbs(hOpta.powerScore - aOpta.powerScore) : null;

    // 실시간 소스 병렬 조회 (배당 + 예측)
    let marketP = null, apiP = null;
    const [odds, afPred, bsdPred] = await Promise.all([
      fetchMatchOdds(homeName, awayName).catch(() => null),
      fetchApiFootballPrediction(homeName, awayName, dateISO).catch(() => null),
      fetchBsdPrediction(homeName, awayName).catch(() => null),
    ]);
    marketP = devigOdds(odds); // 마진 제거된 정규화 확률
    const apiPred = afPred || bsdPred;
    if (apiPred && apiPred.home != null) {
      const s = (apiPred.home||0)+(apiPred.draw||0)+(apiPred.away||0);
      if (s > 0) apiP = { home: apiPred.home/s, draw: (apiPred.draw||0)/s, away: apiPred.away/s, advice: apiPred.advice, underOver: apiPred.underOver, goalsAvg: apiPred.goalsAvg, source: apiPred.source };
    }

    const consensusHome = calculateConsensus([
      { value: spiP?.home ?? null, weight: 0.20 },
      { value: optaP?.home ?? null, weight: 0.30 },
      { value: marketP?.home ?? null, weight: 0.30 },
      { value: apiP?.home ?? null, weight: 0.20 },
    ]);
    const variance = calcVariance([spiP?.home, optaP?.home, marketP?.home, apiP?.home, ourProbs?.homeWinProb]);
    const deviation = calculateDeviation(ourProbs?.homeWinProb, consensusHome);
    const confidence = calculateConfidenceScore(deviation, variance);

    return { spi: spiP, opta: optaP, market: marketP, apiFootball: apiP, consensusHome, deviation, variance, confidence };
  } catch (e) {
    return { spi: null, opta: null, market: null, apiFootball: null, consensusHome: null, deviation: null, variance: 0, confidence: 50, error: true };
  }
}

function withProxy(url) {
  const p = RUNTIME_CONFIG.corsProxy;
  return p ? p + encodeURIComponent(url) : url;
}
// ★ 다중 프록시 폴백 목록 — 첫 번째(설정값) 실패 시 순차로 다음 프록시 시도
const PROXY_FALLBACKS = [
  "DIRECT", // 프록시 없이 직접 호출 — CORS 허용하는 API(odds-api.io, BSD, OWM 등)는 이게 가장 빠르고 안정적
  null,     // null = RUNTIME_CONFIG.corsProxy(설정값) 그대로 사용
  "https://corsproxy.io/?url=",
  "https://api.allorigins.win/raw?url=",
  "https://thingproxy.freeboard.io/fetch/",
  "https://api.codetabs.com/v1/proxy?quest=",
  "https://proxy.cors.sh/",
  "https://corsproxy.org/?",
];

// ★ fetch + 타임아웃 (AbortController)
async function fetchWithTimeout(url, options = {}, timeoutMs = 6000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    return res;
  } finally {
    clearTimeout(timer);
  }
}

// ★ 진단용: DIRECT 호출의 실제 HTTP 상태/본문을 그대로 반환 (ok 여부와 무관하게 노출)
async function rawFetch(url, headers = {}, timeoutMs = 8000) {
  try {
    const res = await fetchWithTimeout(url, { headers }, timeoutMs);
    const text = await res.text();
    let json = null;
    try { json = JSON.parse(text); } catch (e) {}
    return { ok: res.ok, status: res.status, text, json };
  } catch (e) {
    return { ok: false, status: 0, text: "", json: null, error: e?.message || String(e) };
  }
}

// 여러 프록시를 순차 시도해 첫 성공 응답을 반환. 전부 실패시 null.
async function fetchViaProxies(url, options = {}, timeoutMs = 4000) {
  const tried = new Set();
  for (const proxy of PROXY_FALLBACKS) {
    const p = proxy === null ? RUNTIME_CONFIG.corsProxy : proxy;
    if (!p || tried.has(p)) continue;
    tried.add(p);
    try {
      const target = p === "DIRECT" ? url : (p + encodeURIComponent(url));
      const res = await fetchWithTimeout(target, options, timeoutMs);
      if (res.ok) return res;
    } catch (e) { /* 다음 프록시로 */ }
  }
  return null;
}

function normTeamStr(s) {
  return String(s || "").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, "");
}
// 한글 팀명(koName) ↔ 외부 API가 준 팀명(foreignName) 동일 여부
function isSameTeam(koName, foreignName) {
  if (!foreignName) return false;
  const target = normTeamStr(foreignName);
  if (!target) return false;
  const aliases = TEAM_NAME_EN[koName] || [koName];
  for (const a of aliases) {
    const na = normTeamStr(a);
    if (!na) continue;
    if (na === target || target.includes(na) || na.includes(target)) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════
// 💰 실시간 배당
//   • 승/무/패(1X2): odds-api.io (1순위, ✅ 작동 확인됨) → The Odds API (보조)
//   • 오버/언더(Totals): The Odds API (메인) → odds-api.io totals (보조)
// ═══════════════════════════════════════════════════════════
// odds-api.io /v3/odds 응답을 다양한 포맷에 대응해 {home,draw,away,totals?} 로 정규화
function parseOddsApiIoOdds(data, swapped) {
  if (!data) return null;
  // 후보 경로들을 순서대로 시도: data, data.odds, data.bookmakers[0].markets...
  const candidates = [];
  if (Array.isArray(data?.bookmakers)) candidates.push(...data.bookmakers);
  if (Array.isArray(data?.data?.bookmakers)) candidates.push(...data.data.bookmakers);
  if (Array.isArray(data)) candidates.push(...data);

  let h2h = null, totalsMarket = null;
  for (const bk of candidates) {
    const markets = bk?.markets || bk?.odds || [];
    if (!Array.isArray(markets)) continue;
    for (const m of markets) {
      const key = (m.key || m.market || m.name || "").toLowerCase();
      if (!h2h && (key.includes("h2h") || key.includes("1x2") || key.includes("moneyline") || key.includes("match winner"))) h2h = m;
      if (!totalsMarket && key.includes("total")) totalsMarket = m;
    }
    if (h2h) break;
  }
  // 단순 {home,draw,away} 또는 {h2h:[h,d,a]} 형태도 시도
  if (!h2h) {
    if (data?.h2h && Array.isArray(data.h2h) && data.h2h.length === 3) {
      const [a,b,c] = data.h2h;
      return swapped ? { home: c, draw: b, away: a, source: "odds-api.io" } : { home: a, draw: b, away: c, source: "odds-api.io" };
    }
    if (typeof data?.home === "number" && typeof data?.away === "number") {
      return swapped
        ? { home: data.away, draw: data.draw, away: data.home, source: "odds-api.io" }
        : { home: data.home, draw: data.draw, away: data.away, source: "odds-api.io" };
    }
    return null;
  }
  const outcomes = h2h.outcomes || h2h.selections || [];
  let oh=null, od=null, oa=null;
  for (const o of outcomes) {
    const name = (o.name || o.label || "").toLowerCase();
    const price = o.price ?? o.odds ?? o.value;
    if (typeof price !== "number") continue;
    if (name.includes("draw") || name === "x" || name.includes("무")) od = price;
    else if (oh === null) oh = price;
    else oa = price;
  }
  if (oh == null || oa == null) return null;
  const result = swapped ? { home: oa, draw: od, away: oh } : { home: oh, draw: od, away: oa };
  // totals(오버/언더) 추가 정보 — odds-api.io에서도 제공되면 보조용으로 보관
  if (totalsMarket) {
    const tOutcomes = totalsMarket.outcomes || totalsMarket.selections || [];
    result.totalsRaw = tOutcomes.map(o => ({ name: o.name, point: o.point, price: o.price ?? o.odds }));
  }
  result.source = "odds-api.io";
  return result;
}

// {name, point, price}[] → 라인(point)별로 그룹핑해 {point, over, under}[] 로 정규화
function groupTotalsByPoint(outcomes) {
  if (!Array.isArray(outcomes)) return null;
  const byPoint = {};
  for (const o of outcomes) {
    const point = typeof o.point === "number" ? o.point : Number(o.point);
    const price = o.price ?? o.odds;
    const name = String(o.name || o.label || "").toLowerCase();
    if (!isFinite(point) || typeof price !== "number") continue;
    const key = point.toFixed(2);
    byPoint[key] = byPoint[key] || { point };
    if (name.includes("over") || name.includes("오버")) byPoint[key].over = price;
    else if (name.includes("under") || name.includes("언더")) byPoint[key].under = price;
  }
  const lines = Object.values(byPoint).filter(l => l.over && l.under);
  return lines.length ? lines.sort((a,b)=>a.point-b.point) : null;
}

// 🏆 API-Football — fixtures(league=1,season=2026) 캐시 + 경기 ID 매칭
//   odds/predictions 엔드포인트는 fixture id가 필요하므로, 전체 104경기를
//   1회(24시간 캐시) 받아 home/away/날짜로 매칭한다.
// ═══════════════════════════════════════════════════════════
async function loadApiFootballFixtures(force = false) {
  const FX_TTL = 24 * 3600 * 1000;
  try {
    const r = await window.storage.get("wc:afFixtures", false);
    if (r?.value) {
      const data = JSON.parse(r.value);
      if (!force && data.ts && (Date.now() - data.ts) < FX_TTL && Array.isArray(data.fixtures)) {
        return data.fixtures;
      }
    }
  } catch (e) {}
  if (!RUNTIME_CONFIG.apiFootballKey) return [];
  try {
    const headers = { "x-apisports-key": RUNTIME_CONFIG.apiFootballKey };
    const res = await fetchViaProxies(`https://v3.football.api-sports.io/fixtures?league=1&season=2026`, { headers }, 8000);
    const j = res ? await res.json().catch(()=>null) : null;
    if (Array.isArray(j?.response)) {
      const fixtures = j.response.map(f => ({
        id: f.fixture?.id,
        date: f.fixture?.date,
        home: f.teams?.home?.name || "",
        away: f.teams?.away?.name || "",
      })).filter(f => f.id);
      await window.storage.set("wc:afFixtures", JSON.stringify({ fixtures, ts: Date.now() }), false).catch(()=>{});
      return fixtures;
    }
  } catch (e) {}
  return [];
}

async function getApiFootballFixture(home, away) {
  const fixtures = await loadApiFootballFixtures();
  if (!fixtures.length) return null;
  const direct = fixtures.find(f => isSameTeam(home, f.home) && isSameTeam(away, f.away));
  if (direct) return { ...direct, swapped:false };
  const swapped = fixtures.find(f => isSameTeam(home, f.away) && isSameTeam(away, f.home));
  if (swapped) return { ...swapped, swapped:true };
  return null;
}

// 캐시 헬퍼 (per-fixture, 6시간)
async function afCached(key, ttlMs, fetcher) {
  try {
    const r = await window.storage.get(key, false);
    if (r?.value) {
      const cached = JSON.parse(r.value);
      if (cached.ts && (Date.now() - cached.ts) < ttlMs) return cached.data;
    }
  } catch (e) {}
  const data = await fetcher();
  if (data != null) {
    try { await window.storage.set(key, JSON.stringify({ ts: Date.now(), data }), false); } catch (e) {}
  }
  return data;
}

// ⚽ API-Football 배당 (1X2 + 오버/언더) — odds-api.io/The Odds API 모두 실패 시 3순위 보조
async function fetchApiFootballOdds(home, away) {
  if (!RUNTIME_CONFIG.apiFootballKey) return null;
  const fx = await getApiFootballFixture(home, away);
  if (!fx) return null;
  return await afCached(`wc:afOdds:${fx.id}`, 6*3600*1000, async () => {
    try {
      const headers = { "x-apisports-key": RUNTIME_CONFIG.apiFootballKey };
      const res = await fetchViaProxies(`https://v3.football.api-sports.io/odds?fixture=${fx.id}`, { headers }, 8000);
      const j = res ? await res.json().catch(()=>null) : null;
      const bookmakers = j?.response?.[0]?.bookmakers;
      if (!Array.isArray(bookmakers) || !bookmakers.length) return null;
      let h2h = null, totals = null, bkName = null;
      for (const bk of bookmakers) {
        for (const bet of (bk.bets || [])) {
          if (!h2h && /match winner/i.test(bet.name || "")) {
            const ho = bet.values?.find(v=>v.value==="Home")?.odd;
            const dr = bet.values?.find(v=>v.value==="Draw")?.odd;
            const ao = bet.values?.find(v=>v.value==="Away")?.odd;
            if (ho && dr && ao) { h2h = { home:+ho, draw:+dr, away:+ao }; bkName = bk.name; }
          }
          if (!totals && /over\/under|goals over/i.test(bet.name || "")) {
            const grouped = {};
            for (const v of (bet.values || [])) {
              const m = String(v.value||"").match(/(Over|Under)\s*([\d.]+)/i);
              if (m) {
                const point = m[2];
                grouped[point] = grouped[point] || { point: +point };
                grouped[point][m[1].toLowerCase()] = +v.odd;
              }
            }
            const arr = Object.values(grouped).filter(o => o.over && o.under);
            if (arr.length) totals = arr.sort((a,b)=>a.point-b.point);
          }
        }
        if (h2h && totals) break;
      }
      if (!h2h && !totals) return null;
      if (h2h && fx.swapped) { const t = h2h.home; h2h.home = h2h.away; h2h.away = t; }
      return { ...(h2h||{}), totals, source: `API-Football(${bkName||"avg"})` };
    } catch (e) { return null; }
  });
}

// 👤 API-Football 개인 기여도 (/fixtures/players?fixture=ID)
//   골/어시스트/슈팅/패스/태클/평점/드리블 — 종료/진행 경기에서 제공.
//   ⚠️ 월드컵(league=1) 커버 시 작동, 미커버면 null → UI에서 "데이터 없음".
async function fetchApiFootballPlayerStats(home, away, dateISO) {
  if (!RUNTIME_CONFIG.apiFootballKey) return null;
  const fx = await getApiFootballFixture(home, away);
  if (!fx) return null;
  return await afCached(`wc:afPlayers:${fx.id}`, 2*3600*1000, async () => {
    try {
      const headers = { "x-apisports-key": RUNTIME_CONFIG.apiFootballKey };
      const res = await fetchViaProxies(`https://v3.football.api-sports.io/fixtures/players?fixture=${fx.id}`, { headers }, 8000);
      const j = res ? await res.json().catch(()=>null) : null;
      const teams = j?.response;
      if (!Array.isArray(teams) || !teams.length) return null;

      // 두 팀(teams[0]=home측, teams[1]=away측) → 우리 home/away로 매핑
      const out = { home: [], away: [] };
      for (const teamBlock of teams) {
        const teamName = teamBlock.team?.name || "";
        // fx.swapped면 API의 home이 우리 away
        let side = isSameTeam(home, teamName) ? "home" : isSameTeam(away, teamName) ? "away" : null;
        if (!side) continue;
        for (const p of (teamBlock.players || [])) {
          const st = p.statistics?.[0];
          if (!st) continue;
          const num = v => { const n = parseFloat(v); return isFinite(n) ? n : null; };
          out[side].push({
            name: p.player?.name || "?",
            goals: num(st.goals?.total) ?? 0,
            assists: num(st.goals?.assists) ?? 0,
            shots: num(st.shots?.total),
            shotsOnTarget: num(st.shots?.on),
            tackles: num(st.tackles?.total),
            passes: num(st.passes?.total),
            keyPasses: num(st.passes?.key),
            rating: num(st.games?.rating),
            minutes: num(st.games?.minutes),
          });
        }
      }
      if (!out.home.length && !out.away.length) return null;
      return out;
    } catch (e) { return null; }
  });
}

// 전체 football 이벤트 중 우리 매치를 찾아 배당까지 가져옴
async function fetchMatchOdds(home, away) {
  if (!RUNTIME_CONFIG.useLiveOdds) return null;

  let h2hResult = null;        // {home, draw, away, source}
  let eventMeta = {};
  let fallbackTotals = null;   // odds-api.io totals (오버/언더 보조)

  // 1) odds-api.io — 승무패(1X2) 1순위
  if (RUNTIME_CONFIG.oddsApiIoKey) {
    try {
      const evUrl = `https://api.odds-api.io/v3/events?apiKey=${RUNTIME_CONFIG.oddsApiIoKey}&sport=football&status=pending`;
      const res = await fetchViaProxies(evUrl, {}, 8000);
      if (res) {
        const events = await res.json().catch(()=>null);
        const list = Array.isArray(events) ? events : (Array.isArray(events?.data) ? events.data : null);
        if (Array.isArray(list)) {
          const direct = list.find(ev => isSameTeam(home, ev.home) && isSameTeam(away, ev.away));
          const swapped = direct ? null : list.find(ev => isSameTeam(home, ev.away) && isSameTeam(away, ev.home));
          const match = direct || swapped;
          if (match) {
            const oddsUrl = `https://api.odds-api.io/v3/odds?apiKey=${RUNTIME_CONFIG.oddsApiIoKey}&eventId=${match.id}`;
            const oddsRes = await fetchViaProxies(oddsUrl, {}, 8000);
            if (oddsRes) {
              const oddsData = await oddsRes.json().catch(()=>null);
              const parsed = parseOddsApiIoOdds(oddsData, !!swapped);
              if (parsed) {
                h2hResult = { home: parsed.home, draw: parsed.draw, away: parsed.away, source: parsed.source };
                if (parsed.totalsRaw) fallbackTotals = groupTotalsByPoint(parsed.totalsRaw);
                eventMeta = { eventId: match.id, matchedHome: match.home, matchedAway: match.away };
              }
            }
          }
        }
      }
    } catch (e) { /* 다음 소스로 */ }
  }

  // 2) The Odds API — 오버/언더(Totals) 메인 소스 + 승무패 보조
  let mainTotals = null;
  let totalsSource = null;
  if (RUNTIME_CONFIG.oddsApiKey) {
    try {
      const oddsUrl = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds?apiKey=${RUNTIME_CONFIG.oddsApiKey}&regions=eu&markets=h2h,totals&oddsFormat=decimal`;
      const res = await fetchViaProxies(oddsUrl, {}, 8000);
      if (res) {
        const j = await res.json().catch(()=>null);
        if (Array.isArray(j)) {
          const ev = j.find(e => isSameTeam(home, e.home_team) && isSameTeam(away, e.away_team));
          if (ev) {
            for (const bk of (ev.bookmakers || [])) {
              const markets = bk.markets || [];
              // 오버/언더(Totals) — 메인 소스
              if (!mainTotals) {
                const totalsMkt = markets.find(m => m.key === "totals");
                if (totalsMkt) {
                  const grouped = groupTotalsByPoint(totalsMkt.outcomes || []);
                  if (grouped) { mainTotals = grouped; totalsSource = `the-odds-api(${bk.key})`; }
                }
              }
              // 승무패(1X2) — odds-api.io 실패 시 보조
              if (!h2hResult) {
                const h2h = markets.find(m => m.key === "h2h");
                if (h2h) {
                  const oh = h2h.outcomes.find(o => isSameTeam(home, o.name))?.price;
                  const oa = h2h.outcomes.find(o => isSameTeam(away, o.name))?.price;
                  const od = h2h.outcomes.find(o => o.name === "Draw")?.price;
                  if (oh && oa && od) h2hResult = { home: oh, draw: od, away: oa, source: `the-odds-api(${bk.key})` };
                }
              }
              if (mainTotals && h2hResult) break;
            }
          }
        }
      }
    } catch (e) { /* 무시 */ }
  }

  // 3) API-Football — 승무패/오버언더 3순위 보조 (위 2개 모두 실패 시)
  if ((!h2hResult || !mainTotals) && RUNTIME_CONFIG.apiFootballKey) {
    try {
      const afOdds = await fetchApiFootballOdds(home, away);
      if (afOdds) {
        if (!h2hResult && afOdds.home && afOdds.draw && afOdds.away) {
          h2hResult = { home: afOdds.home, draw: afOdds.draw, away: afOdds.away, source: afOdds.source };
        }
        if (!mainTotals && Array.isArray(afOdds.totals) && afOdds.totals.length) {
          mainTotals = afOdds.totals;
          totalsSource = afOdds.source;
        }
      }
    } catch (e) { /* 무시 */ }
  }

  if (!h2hResult) return null;
  const totals = mainTotals || fallbackTotals || null;
  return {
    ...h2hResult, ...eventMeta,
    totals,
    totalsSource: totalsSource || (fallbackTotals ? "odds-api.io" : null),
  };
}

// ═══════════════════════════════════════════════════════════
let _newsCache = {}; // { [team]: { ts, items } }
const NEWS_TTL = 30 * 60 * 1000; // 30분 캐시

async function fetchTeamNews(team) {
  const cached = _newsCache[team];
  if (cached && Date.now() - cached.ts < NEWS_TTL) return cached.items;
  try {
    const q = `${team} 월드컵 부상 OR 결장 OR 라인업`;
    const gnewsUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(gnewsUrl)}&count=6`;
    const res = await fetchViaProxies(url, {}, 8000);
    if (!res) { _newsCache[team] = { ts: Date.now(), items: [] }; return []; }
    const j = await res.json().catch(()=>null);
    const items = (j?.status === "ok" && Array.isArray(j.items))
      ? j.items.slice(0, 6).map(it => ({
          title: (it.title || "").replace(/\s*-\s*[^-]+$/, ""), // 끝의 " - 출처명" 제거
          link: it.link, source: it.title?.split(" - ").pop() || "",
          pubDate: it.pubDate,
        }))
      : [];
    _newsCache[team] = { ts: Date.now(), items };
    return items;
  } catch (e) {
    _newsCache[team] = { ts: Date.now(), items: [] };
    return [];
  }
}

// 🤖 BSD (Bzzoiro Sports Data) — CatBoost ML 예측. API-Football predictions 대체 1순위
//   GET https://sports.bzzoiro.com/api/predictions/  (Authorization: Token ...)
// ═══════════════════════════════════════════════════════════
async function fetchBsdPrediction(home, away) {
  if (!RUNTIME_CONFIG.bsdToken) return null;
  try {
    const url = "https://sports.bzzoiro.com/api/predictions/";
    const res = await fetchViaProxies(url, { headers: { "Authorization": `Token ${RUNTIME_CONFIG.bsdToken}` } }, 8000);
    if (!res) return null;
    const j = await res.json().catch(()=>null);
    const list = j?.results || j?.data || (Array.isArray(j) ? j : null);
    if (!Array.isArray(list)) return null;
    const hit = list.find(p => {
      const ev = p.event || p;
      return (isSameTeam(home, ev.home_team) && isSameTeam(away, ev.away_team)) ||
             (isSameTeam(home, ev.away_team) && isSameTeam(away, ev.home_team));
    });
    if (!hit) return null;
    const ev = hit.event || hit;
    const swapped = isSameTeam(home, ev.away_team);
    // 다양한 필드명 후보를 방어적으로 탐색 (CatBoost 결과 스키마가 바뀔 수 있음)
    const pick = (...keys) => { for (const k of keys) { const v = hit[k] ?? hit?.prediction?.[k] ?? hit?.probabilities?.[k]; if (typeof v === "number") return v; } return null; };
    let pHome = pick("home_win_probability","home_win_prob","home_win","prob_home","p_home","home");
    let pDraw = pick("draw_probability","draw_prob","draw","prob_draw","p_draw");
    let pAway = pick("away_win_probability","away_win_prob","away_win","prob_away","p_away","away");
    if (pHome == null || pAway == null) return null;
    // 0~1 범위가 아니라 %(0~100)로 올 수도 있음 → 정규화
    if (pHome > 1 || pAway > 1 || (pDraw && pDraw > 1)) { pHome/=100; pAway/=100; if (pDraw!=null) pDraw/=100; }
    if (swapped) { const t = pHome; pHome = pAway; pAway = t; }
    return { home: pHome, draw: pDraw ?? Math.max(0, 1-pHome-pAway), away: pAway, source: "bsd" };
  } catch (e) { return null; }
}

// 이미 동기부여/폼 용도로 키가 등록·확인된 상태 → 스코어 조회까지 확장
let _fdMatchesCache = null;
let _fdMatchesCacheTime = 0;
const FD_MATCHES_TTL = 5 * 60 * 1000; // 5분 캐시

async function fetchFDMatches() {
  if (_fdMatchesCache && Date.now() - _fdMatchesCacheTime < FD_MATCHES_TTL) return _fdMatchesCache;
  if (!RUNTIME_CONFIG.footballDataOrgKey) return null;
  try {
    const url = "https://api.football-data.org/v4/competitions/2000/matches?season=2026";
    const res = await fetchViaProxies(url, { headers: { "X-Auth-Token": RUNTIME_CONFIG.footballDataOrgKey } }, 10000);
    if (!res) return null;
    const j = await res.json().catch(()=>null);
    if (!j?.matches) return null;
    _fdMatchesCache = j.matches;
    _fdMatchesCacheTime = Date.now();
    return j.matches;
  } catch (e) { return null; }
}

async function fetchScoreFromFD(home, away) {
  try {
    const matches = await fetchFDMatches();
    if (!Array.isArray(matches)) return null;
    for (const m of matches) {
      const hn = m.homeTeam?.name || m.homeTeam?.shortName || "";
      const an = m.awayTeam?.name || m.awayTeam?.shortName || "";
      const direct  = isSameTeam(home, hn) && isSameTeam(away, an);
      const swapped = !direct && isSameTeam(home, an) && isSameTeam(away, hn);
      if (!direct && !swapped) continue;
      const status = (m.status || "").toUpperCase();
      const finished = ["FINISHED","AWARDED"].includes(status);
      if (!finished) return null; // 아직 진행 중
      let hs = m.score?.fullTime?.home ?? m.score?.regularTime?.home;
      let as_ = m.score?.fullTime?.away ?? m.score?.regularTime?.away;
      if (hs == null || as_ == null) return null;
      if (swapped) { const t=hs; hs=as_; as_=t; }
      return { homeGoals: hs, awayGoals: as_, source: "football-data.org", status };
    }
  } catch (e) {}
  return null;
}

// ─── 2순위: openfootball GitHub Raw JSON ───────────────────
// https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json
// 자원봉사자 수동 업데이트 → 수 시간 딜레이 가능하지만 CORS 허용·키 불필요
let _ofbCache = null;
let _ofbCacheTime = 0;
const OFB_TTL = 15 * 60 * 1000; // 15분 캐시 (수동 업데이트이므로 느슨하게)

async function fetchOpenFootballMatches() {
  if (_ofbCache && Date.now() - _ofbCacheTime < OFB_TTL) return _ofbCache;
  try {
    const url = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
    const res = await fetchViaProxies(url, {}, 10000);
    if (!res) return null;
    const j = await res.json().catch(()=>null);
    // 포맷 A(2026, 평면): { name, matches: [ { team1, team2, score:{ft:[h,a]} } ] }
    // 포맷 B(구버전, 라운드별): { rounds: [ { matches: [ ... ] } ] }
    let all = null;
    if (Array.isArray(j?.matches)) {
      all = j.matches;
    } else if (Array.isArray(j?.rounds)) {
      all = [];
      for (const round of j.rounds) {
        for (const m of (round.matches || [])) all.push(m);
      }
    }
    if (!all) return null;
    _ofbCache = all;
    _ofbCacheTime = Date.now();
    return all;
  } catch (e) { return null; }
}

async function fetchScoreFromOpenFootball(home, away) {
  try {
    const matches = await fetchOpenFootballMatches();
    if (!Array.isArray(matches)) return null;
    for (const m of matches) {
      const hn = m.team1?.name || m.team1 || "";
      const an = m.team2?.name || m.team2 || "";
      const direct  = isSameTeam(home, hn) && isSameTeam(away, an);
      const swapped = !direct && isSameTeam(home, an) && isSameTeam(away, hn);
      if (!direct && !swapped) continue;
      const ft = m.score?.ft;
      if (!Array.isArray(ft) || ft.length < 2) return null;
      let [hs, as_] = ft;
      if (swapped) { const t=hs; hs=as_; as_=t; }
      return { homeGoals: hs, awayGoals: as_, source: "openfootball/github", status: "ft" };
    }
  } catch (e) {}
  return null;
}

// ─── 3순위: worldcup26.ir (완전 무료, CORS 미확인) ─────────
async function fetchScoreFromWorldcup26(home, away) {
  try {
    const url = "https://worldcup26.ir/get/games";
    const res = await fetchViaProxies(url, {}, 8000);
    if (!res) return null;
    const j = await res.json().catch(()=>null);
    const list = Array.isArray(j) ? j : (Array.isArray(j?.games) ? j.games : null);
    if (!Array.isArray(list)) return null;
    for (const m of list) {
      const hn = m.home_team || m.home || m.team1 || "";
      const an = m.away_team || m.away || m.team2 || "";
      const direct  = isSameTeam(home, hn) && isSameTeam(away, an);
      const swapped = !direct && isSameTeam(home, an) && isSameTeam(away, hn);
      if (!direct && !swapped) continue;
      const status = (m.status || m.state || "").toLowerCase();
      if (!["finished","ft","ended","completed"].some(s=>status.includes(s))) return null;
      let hs = m.home_score ?? m.score_home ?? m.goals_home;
      let as_ = m.away_score ?? m.score_away ?? m.goals_away;
      if (hs == null || as_ == null) return null;
      if (swapped) { const t=hs; hs=as_; as_=t; }
      return { homeGoals: hs, awayGoals: as_, source: "worldcup26.ir", status };
    }
  } catch (e) {}
  return null;
}

// ─── 통합 스코어 조회 (3단 폴백) ───────────────────────────
async function fetchSportScore(home, away, dateISO) {
  // 1순위: Football-Data.org (이미 키 확인됨)

// 🆕 v2 — 동기부여 보정 (조별 순위 기반, 외부 API 없이 로컬 계산)
//   ★ 2026-06: Football-Data.org 순위 API는 X-Auth-Token 헤더 때문에
//     브라우저 직접호출이 CORS로 막히고, 무료 프록시도 인증 헤더를
//     전달하지 못해 항상 실패 확인됨 → 완전히 제거.
//   대신 SCHEDULE + SQUADS의 group 정보 + 자동조회된 경기결과(_liveResults,
//   openfootball/worldcup26.ir로 채워짐)로 calcGroupStandings()를 그대로
//   재사용해 조 순위를 즉시(네트워크 호출 없이) 계산한다.
// ═══════════════════════════════════════════════════════════

// 팀의 현재 조별 순위/전적 (calcGroupStandings 기반, 외부 API 불필요)
function getLocalTeamStanding(team) {
  const grp = SQUADS[team]?.group;
  if (!grp) return null;
  const table = calcGroupStandings()[grp];
  if (!Array.isArray(table) || !table.length) return null;
  const idx = table.findIndex(r => r.team === team);
  if (idx < 0) return null;
  const row = table[idx];
  if (!row.played) return null; // 아직 치른 경기 없음 → 순위 보정 의미 없음
  return {
    group: grp, position: idx + 1, playedGames: row.played,
    won: row.won, draw: row.drawn, lost: row.lost,
    points: row.pts, goalsFor: row.gf, goalsAgainst: row.ga,
  };
}

// 동기부여 지수 v2: 조 순위 기반 보정 (네트워크 호출 없음 — 즉시 반환)
async function getMotivationFactorV2(team, matchDate) {
  const base = getMotivationFactor(team, matchDate); // 원본 함수 유지
  try {
    const standing = getLocalTeamStanding(team);
    if (!standing) return base;
    // 조 3위 이하(탈락권) → 절박함 보너스
    if (standing.position >= 3) return Math.min(1.12, base * 1.07);
    // 조 1위 + 승점 6 이상(다음 라운드 진출 유력) → 여유(소폭 하락)
    if (standing.position === 1 && standing.points >= 6) return Math.max(0.97, base * 0.99);
  } catch (e) {}
  return base;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, rad = Math.PI/180;
  const dLat = (lat2-lat1)*rad, dLon = (lon2-lon1)*rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

// 원정 피로도 패널티 v2 (이동거리 기반)
function getTravelFatiguePenalty(team, venueCity) {
  const homeCoord = TEAM_HOME_COORDS[team];
  const venueCoord = VENUE_COORDS[venueCity];
  if (!homeCoord || !venueCoord) return 0;
  const km = haversineKm(homeCoord[0], homeCoord[1], venueCoord[0], venueCoord[1]);
  // 1000km 이하: 0, 5000km: -0.02, 10000km+: -0.045
  if (km < 1000) return 0;
  if (km < 5000) return -(km-1000)/4000 * 0.02;
  return -0.02 - (Math.min(km,12000)-5000)/7000 * 0.025;
}

async function autoFetchAndStoreResult(home, away, dateISO) {
  const existing = getStoredResult(home, away);
  // 이미 조회됐고 1시간 이내면 재조회 생략
  if (existing && existing.source !== "manual" && (Date.now() - (existing.fetched||0)) < 3600000) return existing;
  const score = await fetchSportScore(home, away, dateISO).catch(()=>null);
  if (!score) return existing;
  setStoredResult(home, away, score.homeGoals, score.awayGoals, score.source || "api-sports");
  await saveLiveResults();
  return getStoredResult(home, away);
}

// 조별 순위 자동 계산 (실제 결과 기반)
function calcGroupStandings() {
  const standings = {}; // { teamName: {played,won,drawn,lost,gf,ga,gd,pts} }
  const initTeam = (t) => {
    if (!standings[t]) standings[t] = {team:t,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0};
  };
  for (const match of SCHEDULE) {
    const res = getStoredResult(match.home, match.away);
    if (!res) continue;
    const hg = res.home ?? (res.home === match.home ? res.home : res.away);
    const ag = res.away ?? (res.away === match.away ? res.away : res.home);
    // 키 방향 보정
    const stored = _liveResults[resultKey(match.home, match.away)] || _liveResults[resultKey(match.away, match.home)];
    if (!stored) continue;
    const isSwapped = !!_liveResults[resultKey(match.away, match.home)] && !_liveResults[resultKey(match.home, match.away)];
    const homeGoals = isSwapped ? stored.away : stored.home;
    const awayGoals = isSwapped ? stored.home : stored.away;

    initTeam(match.home); initTeam(match.away);
    standings[match.home].played++;
    standings[match.away].played++;
    standings[match.home].gf += homeGoals;
    standings[match.home].ga += awayGoals;
    standings[match.away].gf += awayGoals;
    standings[match.away].ga += homeGoals;
    standings[match.home].gd = standings[match.home].gf - standings[match.home].ga;
    standings[match.away].gd = standings[match.away].gf - standings[match.away].ga;
    if (homeGoals > awayGoals) {
      standings[match.home].won++; standings[match.home].pts+=3;
      standings[match.away].lost++;
    } else if (homeGoals < awayGoals) {
      standings[match.away].won++; standings[match.away].pts+=3;
      standings[match.home].lost++;
    } else {
      standings[match.home].drawn++; standings[match.home].pts++;
      standings[match.away].drawn++; standings[match.away].pts++;
    }
  }
  // 조별로 묶기
  const byGroup = {};
  for (const [team, stat] of Object.entries(standings)) {
    const grp = SQUADS[team]?.group || "PO";
    if (grp === "PO") continue;
    if (!byGroup[grp]) byGroup[grp] = [];
    byGroup[grp].push({...stat});
  }
  // 각 조 정렬: 승점 → 득실차 → 득점
  for (const grp of Object.keys(byGroup)) {
    byGroup[grp].sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  }
  return byGroup;
}

// PSxG 기반 λ 보정 (골키퍼 품질 반영)
function psxgLambdaAdjust(lambdaHome, lambdaAway, home, away) {
  const hAdv = ADVANCED_STATS[home];
  const aAdv = ADVANCED_STATS[away];
  if (!hAdv || !aAdv) return { lH: lambdaHome, lA: lambdaAway };
  // 홈팀 공격 품질(PSxG/게임) vs 원정팀 골키퍼 허용(PSxGAllowed)
  const hAtkFactor = hAdv.psxg > 0 ? hAdv.psxg / 1.75 : 1;
  const aGkFactor  = aAdv.psxgAllowed > 0 ? 1.0 / (aAdv.psxgAllowed / 1.0) : 1;
  const aAtkFactor = aAdv.psxg > 0 ? aAdv.psxg / 1.75 : 1;
  const hGkFactor  = hAdv.psxgAllowed > 0 ? 1.0 / (hAdv.psxgAllowed / 1.0) : 1;
  const lH = Math.max(0.2, lambdaHome * Math.pow(hAtkFactor * aGkFactor, 0.25));
  const lA = Math.max(0.2, lambdaAway * Math.pow(aAtkFactor * hGkFactor, 0.25));
  return { lH, lA };
}

// 빅찬스 기반 추가 승률 보정
function bigChanceSkew(home, away) {
  const h = ADVANCED_STATS[home], a = ADVANCED_STATS[away];
  if (!h || !a) return 0;
  const diff = (h.bigChances - h.bigChancesAllowed) - (a.bigChances - a.bigChancesAllowed);
  // diff 1 = 약 +0.015 승률 보정
  return Math.max(-0.06, Math.min(0.06, diff * 0.015));
}

function starPlayerLambdaBoost(lambdaHome, lambdaAway, home, away) {
  const hS = STAR_PLAYERS[home];
  const aS = STAR_PLAYERS[away];
  let lH = lambdaHome, lA = lambdaAway;
  // 홈 공격수 보너스 - 원정 GK 선방
  if (hS) lH = lH + (hS.atkBoost || 0);
  if (aS) lH = Math.max(0.15, lH - (aS.gkSave || 0) * 0.5);
  // 원정 공격수 보너스 - 홈 GK 선방
  if (aS) lA = lA + (aS.atkBoost || 0);
  if (hS) lA = Math.max(0.15, lA - (hS.gkSave || 0) * 0.5);
  return { lH, lA };
}

function espnTeamToKorean(name) {
  for (const ko of Object.keys(TEAM_NAME_EN)) {
    if (isSameTeam(ko, name)) return ko;
  }
  return name || "?";
}

//   누적 공식 집계라 ESPN 경기별 집계의 지연 문제를 보완.
//   하루 100회 한도 보호를 위해 6시간에 1번만 호출(캐시).
// ═══════════════════════════════════════════════════════════
async function updateLeaderboardsFromApiFootball(force = false) {
  if (!RUNTIME_CONFIG.apiFootballKey) return null;
  const state = await loadLeaderboardState();
  if (!state.scorersAF) state.scorersAF = {};
  if (!state.assistsAF) state.assistsAF = {};

  const COOLDOWN_MS = 6 * 3600 * 1000; // 6시간
  if (!force && state.apiFootballLastFetch && (Date.now() - state.apiFootballLastFetch) < COOLDOWN_MS) {
    return state; // 캐시 유지 (API 호출 안 함)
  }

  const headers = { "x-apisports-key": RUNTIME_CONFIG.apiFootballKey };
  try {
    const [scRes, asRes] = await Promise.all([
      fetchViaProxies(`https://v3.football.api-sports.io/players/topscorers?league=1&season=2026`, { headers }, 8000),
      fetchViaProxies(`https://v3.football.api-sports.io/players/topassists?league=1&season=2026`, { headers }, 8000),
    ]);
    const scJ = scRes ? await scRes.json().catch(()=>null) : null;
    const asJ = asRes ? await asRes.json().catch(()=>null) : null;

    if (Array.isArray(scJ?.response)) {
      const fresh = {};
      for (const entry of scJ.response) {
        const name = entry.player?.name;
        const stat = entry.statistics?.[0];
        const goals = stat?.goals?.total;
        const teamName = espnTeamToKorean(stat?.team?.name || "");
        if (name && goals != null) fresh[`${name}|${teamName}`] = goals;
      }
      if (Object.keys(fresh).length) state.scorersAF = fresh;
    }
    if (Array.isArray(asJ?.response)) {
      const fresh = {};
      for (const entry of asJ.response) {
        const name = entry.player?.name;
        const stat = entry.statistics?.[0];
        const assists = stat?.goals?.assists;
        const teamName = espnTeamToKorean(stat?.team?.name || "");
        if (name && assists != null && assists > 0) fresh[`${name}|${teamName}`] = assists;
      }
      if (Object.keys(fresh).length) state.assistsAF = fresh;
    }
    state.apiFootballLastFetch = Date.now();
    await saveLeaderboardState(state);
  } catch (e) { /* 실패 시 기존 캐시 유지 */ }
  return state;
}

async function saveApiFootballInjuries(data) {
