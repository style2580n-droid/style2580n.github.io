                    <td style={{padding:"7px 4px", textAlign:"center", color:T.muted}}>{r.drawn}</td>
                    <td style={{padding:"7px 4px", textAlign:"center", color:T.red}}>{r.lost}</td>
                    <td style={{padding:"7px 4px", textAlign:"center"}}>{r.gf}</td>
                    <td style={{padding:"7px 4px", textAlign:"center"}}>{r.ga}</td>
                    <td style={{padding:"7px 4px", textAlign:"center", color: r.gd>0?T.green:r.gd<0?T.red:T.muted, fontWeight:700}}>
                      {r.gd>0?"+":""}{r.gd}
                    </td>
                    <td style={{padding:"7px 4px", textAlign:"center", fontWeight:900, color:T.gold}}>{r.pts}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      ))}
    </>
  );
}

// 🏆 대회 기록 뷰 — 득점왕/어시스트/골키퍼 클린시트
function LeaderboardView() {
  const [state, setState] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lbType, setLbType] = useState("scorers"); // scorers | assists | gk
  const [showManual, setShowManual] = useState(false);
  const [mName, setMName] = useState("");
  const [mTeam, setMTeam] = useState(ALL_TEAMS[0]);
  const [mVal1, setMVal1] = useState("1"); // 골/도움/클린시트
  const [mVal2, setMVal2] = useState("1"); // GK 출전수

  useEffect(() => { loadLeaderboardState().then(setState); }, []);

  const refresh = async () => {
    setLoading(true);
    try {
      let s = await updateLeaderboards(4);
      s = await updateLeaderboardsFromApiFootball() || s;
      setState({...s});
    } finally { setLoading(false); }
  };

  // 득점/도움은 API-Football 누적 데이터가 있으면 그것을 우선 사용 (ESPN 경기별 집계 지연 보완)
  const scorerKey = (state?.scorersAF && Object.keys(state.scorersAF).length) ? "scorersAF" : "scorers";
  const assistKey = (state?.assistsAF && Object.keys(state.assistsAF).length) ? "assistsAF" : "assists";

  const handleManualAdd = async () => {
    const name = mName.trim();
    if (!name || !state) return;
    const key = `${name}|${mTeam}`;
    const s = JSON.parse(JSON.stringify(state));
    if (lbType === "gk") {
      if (!s.gk) s.gk = {};
      const cur = s.gk[key] || { apps:0, cs:0, conceded:0 };
      s.gk[key] = { apps: cur.apps + (parseInt(mVal2)||0), cs: cur.cs + (parseInt(mVal1)||0), conceded: cur.conceded };
    } else if (lbType === "cards") {
      if (!s.cards) s.cards = {};
      const cur = s.cards[key] || { yellow:0, red:0 };
      s.cards[key] = { yellow: cur.yellow + (parseInt(mVal1)||0), red: cur.red + (parseInt(mVal2)||0) };
    } else if (lbType === "ownGoals") {
      if (!s.ownGoals) s.ownGoals = {};
      s.ownGoals[key] = (s.ownGoals[key]||0) + (parseInt(mVal1)||1);
    } else {
      const tgt = lbType === "scorers" ? scorerKey : assistKey;
      if (!s[tgt]) s[tgt] = {};
      s[tgt][key] = (s[tgt][key]||0) + (parseInt(mVal1)||1);
    }
    await saveLeaderboardState(s);
    setState(s);
    setMName("");
  };

  const handleDelete = async (name, team) => {
    if (!state) return;
    const key = `${name}|${team}`;
    const s = JSON.parse(JSON.stringify(state));
    const tgt = lbType === "gk" ? "gk" : lbType === "cards" ? "cards" : lbType === "ownGoals" ? "ownGoals"
      : lbType === "scorers" ? scorerKey : assistKey;
    if (s[tgt]) delete s[tgt][key];
    await saveLeaderboardState(s);
    setState(s);
  };

  const list = useMemo(() => {
    if (lbType === "gk") {
      // 정적 데이터(16경기) + ESPN 추가분(state.gk, 같은 키는 정적값 유지)
      const merged = { ...(state?.gk || {}) };
      for (const [k, v] of Object.entries(STATIC_LEADERBOARD.gk)) merged[k] = v; // 정적값으로 덮어써 정확성 보장
      return Object.entries(merged).map(([k,v]) => {
        const [name, team] = k.split("|");
        return { name, team, cs:v.cs, apps:v.apps, conceded:v.conceded };
      }).sort((a,b) => (b.cs - a.cs) || ((a.conceded??0) - (b.conceded??0))).slice(0,15);
    }
    if (lbType === "cards") {
      if (!state) return [];
      return Object.entries(state.cards || {}).map(([k,v]) => {
        const [name, team] = k.split("|");
        return { name, team, yellow:v.yellow||0, red:v.red||0 };
      }).sort((a,b) => (b.red - a.red) || (b.yellow - a.yellow)).slice(0,15);
    }
    if (lbType === "ownGoals") {
      const merged = { ...(state?.ownGoals || {}) };
      for (const [k, v] of Object.entries(STATIC_LEADERBOARD.ownGoals)) merged[k] = v;
      return Object.entries(merged).map(([k,v]) => {
        const [name, team] = k.split("|");
        return { name, team, count:v };
      }).sort((a,b) => b.count - a.count).slice(0,15);
    }
    // 득점왕/어시스트: 정적(16경기 정답값)을 베이스로, ESPN/API-Football이 더 최신 경기를 잡았으면 그 차이만 보완
    const staticSrc = lbType === "scorers" ? STATIC_LEADERBOARD.scorers : STATIC_LEADERBOARD.assists;
    const espnSrc = (state && lbType === "scorers") ? state[scorerKey] : (state ? state[assistKey] : null);
    const merged = { ...(espnSrc || {}) };
    for (const [k, v] of Object.entries(staticSrc)) merged[k] = v; // 정적값이 항상 정답
    return Object.entries(merged).map(([k,v]) => {
      const [name, team] = k.split("|");
      return { name, team, count:v };
    }).sort((a,b) => b.count - a.count).slice(0,15);
  }, [state, lbType, scorerKey, assistKey]);

  return (
    <div>
      <Card style={{marginBottom:10}}>
        <div style={{fontSize:12.5, color:T.muted, lineHeight:1.6}}>
          득점왕·어시스트·골키퍼 클린시트·자책골은 경기 통계 리포트(네이버 스포츠 기준) 16경기 데이터를 정확히 반영합니다.
          카드(경고/퇴장)는 선수별 기록이 제공되지 않아 ESPN 자동 집계 또는 직접 추가한 값만 표시됩니다.
          "경기결과 반영"을 누르면 17번째 경기부터는 ESPN으로 추가 보완됩니다.
        </div>
      </Card>

      <div style={{display:"flex", gap:6, marginBottom:10}}>
        {[{id:"scorers",label:"⚽ 득점왕"},{id:"assists",label:"🎯 어시스트"},{id:"gk",label:"🧤 골키퍼"},{id:"cards",label:"🟨 카드"},{id:"ownGoals",label:"🥅 자책골"}].map(v => (
          <button key={v.id} onClick={()=>setLbType(v.id)}
            style={{flex:1, padding:"9px", borderRadius:8, border:"none", cursor:"pointer",
              fontSize:12.5, fontWeight:700,
              background: lbType===v.id ? T.accent : T.surface,
              color: lbType===v.id ? "#fff" : T.muted}}>
            {v.label}
          </button>
        ))}
      </div>

      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
        <span style={{fontSize:11, color:T.muted}}>
          {state?.lastDate ? `최신 반영: ${state.lastDate}까지` : "아직 갱신 안 됨"}
          {(lbType==="scorers" || lbType==="assists") && (
            <span style={{marginLeft:6, color: (lbType==="scorers"?scorerKey:assistKey).endsWith("AF") ? T.green : T.dim}}>
              · {(lbType==="scorers"?scorerKey:assistKey).endsWith("AF") ? "API-Football 누적" : "ESPN 경기별"}
            </span>
          )}
        </span>
        <button onClick={refresh} disabled={loading}
          style={{padding:"7px 14px", borderRadius:8, border:"none", background:T.cyan, color:"#001018",
            fontWeight:700, fontSize:12, cursor: loading ? "default" : "pointer", opacity: loading ? 0.7 : 1}}>
          {loading ? "⏳ 갱신 중..." : "🔄 경기결과 반영"}
        </button>
      </div>

      {list.length === 0 ? (
        <Card>
          <div style={{fontSize:12.5, color:T.muted, textAlign:"center", padding:"10px 0"}}>
            {lbType === "cards"
              ? "선수별 카드 기록이 아직 없습니다 — 위 \"경기결과 반영\"으로 ESPN에서 가져오거나, 아래 \"수동 추가\"로 직접 입력하세요."
              : "데이터 없음 — 위 \"경기결과 반영\" 버튼을 눌러 종료된 경기 결과를 가져오거나, 아래 \"수동 추가\"로 직접 입력하세요."}
          </div>
        </Card>
      ) : (
        <Card style={{padding:"6px 10px"}}>
          {list.map((p,i) => (
            <div key={i} style={{display:"flex", alignItems:"center", gap:8, padding:"7px 4px",
              borderBottom: i < list.length-1 ? `1px solid ${T.border}` : "none", fontSize:12.5}}>
              <span style={{color:T.muted, width:20, textAlign:"right"}}>{i+1}</span>
              <span style={{flex:1, color:T.text}}>{p.name} <span style={{color:T.dim, fontSize:11}}>({p.team})</span></span>
              <b style={{color:T.accent, whiteSpace:"nowrap"}}>
                {lbType === "gk" ? `클린시트 ${p.cs} · ${p.apps}경기`
                  : lbType === "cards" ? `🟨${p.yellow} 🟥${p.red}`
                  : lbType === "ownGoals" ? `${p.count}회`
                  : (lbType==="scorers" ? `${p.count}골` : `${p.count}도움`)}
              </b>
              {lbType === "cards" && p.red === 0 && p.yellow >= 2 && (
                <span style={{fontSize:10, color:T.gold, whiteSpace:"nowrap"}}>⚠️ 누적경고</span>
              )}
              <button onClick={()=>handleDelete(p.name, p.team)}
                style={{background:"none", border:"none", color:T.dim, fontSize:14, padding:"0 2px", cursor:"pointer", lineHeight:1}}>✕</button>
            </div>
          ))}
        </Card>
      )}

      <div style={{marginTop:12}}>
        <button onClick={()=>setShowManual(v=>!v)}
          style={{width:"100%", padding:"9px", borderRadius:8, border:`1px solid ${T.border}`, background:"none",
            color:T.muted, fontSize:12.5, fontWeight:700, cursor:"pointer"}}>
          {showManual ? "▲ 수동 추가 닫기" : "✏️ ESPN에 안 잡힌 선수 수동 추가"}
        </button>
        {showManual && (
          <Card style={{marginTop:8}}>
            <div style={{fontSize:11, color:T.muted, marginBottom:8}}>
              {lbType==="gk" ? "선수명·국가·클린시트·출전수를 입력해 추가합니다 (기존 값에 더해집니다)."
                : lbType==="cards" ? "선수명·국가·옐로카드·레드카드 수를 입력해 추가합니다 (기존 값에 더해집니다)."
                : lbType==="ownGoals" ? "선수명·국가·자책골 수를 입력해 추가합니다 (기존 값에 더해집니다)."
                : `선수명·국가·${lbType==="scorers"?"골":"도움"} 수를 입력해 추가합니다 (기존 값에 더해집니다).`}
            </div>
            <div style={{display:"flex", gap:6, marginBottom:6}}>
              <input value={mName} onChange={e=>setMName(e.target.value)} placeholder="선수명"
                style={{flex:1, minWidth:0, padding:"8px 10px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bg, color:T.text, fontSize:12.5}}/>
              <select value={mTeam} onChange={e=>setMTeam(e.target.value)}
                style={{padding:"8px 6px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bg, color:T.text, fontSize:12.5, maxWidth:120}}>
                {ALL_TEAMS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div style={{display:"flex", gap:6}}>
              <input type="number" value={mVal1} onChange={e=>setMVal1(e.target.value)}
                placeholder={lbType==="gk" ? "클린시트" : lbType==="cards" ? "옐로카드" : (lbType==="scorers" ? "골 수" : "도움 수")}
                style={{flex:1, minWidth:0, padding:"8px 10px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bg, color:T.text, fontSize:12.5}}/>
              {(lbType==="gk" || lbType==="cards") && (
                <input type="number" value={mVal2} onChange={e=>setMVal2(e.target.value)}
                  placeholder={lbType==="gk" ? "출전수" : "레드카드"}
                  style={{flex:1, minWidth:0, padding:"8px 10px", borderRadius:8, border:`1px solid ${T.border}`, background:T.bg, color:T.text, fontSize:12.5}}/>
              )}
              <button onClick={handleManualAdd}
                style={{padding:"8px 14px", borderRadius:8, border:"none", background:T.cyan, color:"#001018", fontWeight:700, fontSize:12.5, cursor:"pointer", whiteSpace:"nowrap"}}>
                추가
              </button>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

function RankingTab({eloVersion}) {
  const [sortKey, setSortKey] = useState("spi");
  const [view, setView] = useState("standings"); // "standings" | "ratings"

  const rows = useMemo(() => {
    const list = ALL_TEAMS.map(team => ({
      team,
      spi: SPI_RATINGS[team]?.spi ?? 0,
      opta: OPTA_RANKINGS[team]?.powerScore ?? 0,
      optaRank: OPTA_RANKINGS[team]?.rank ?? 999,
      elo: compositeElo(team),
    }));
    const dir = sortKey === "optaRank" ? 1 : -1;
    return [...list].sort((a,b) => (a[sortKey]-b[sortKey]) * dir);
  }, [sortKey, eloVersion]);

  const Header = ({k, children, w}) => (
    <th onClick={()=>setSortKey(k)} style={{padding:"8px 4px", fontSize:11, color: sortKey===k ? T.accent : T.muted,
        cursor:"pointer", textAlign: w==="left" ? "left" : "right", whiteSpace:"nowrap"}}>
      {children}{sortKey===k ? " ▾" : ""}
    </th>
  );

  return (
    <div>
      {/* 뷰 전환 */}
      <div style={{display:"flex", gap:8, marginBottom:10}}>
        {[{id:"standings",label:"🏆 조별 순위"},{id:"ratings",label:"📈 레이팅 비교"},{id:"leaderboard",label:"⚽ 대회 기록"}].map(v => (
          <button key={v.id} onClick={()=>setView(v.id)}
            style={{flex:1, padding:"10px", borderRadius:10, border:"none", cursor:"pointer",
              fontSize:13, fontWeight:700,
              background: view===v.id ? T.accent : T.surface,
              color: view===v.id ? "#fff" : T.muted}}>
            {v.label}
          </button>
        ))}
      </div>

      {view === "standings" ? (
        <>
          <Card style={{marginBottom:10}}>
            <div style={{fontSize:12, color:T.muted, lineHeight:1.6}}>
              실제 경기 결과 기반 조별 순위입니다. 일정 탭에서 결과를 입력하거나 자동 조회하면 반영됩니다.
              <span style={{color:T.accent, fontWeight:700}}> 파란색 배경</span>은 16강 진출권.
            </div>
          </Card>
          <GroupStandingsPanel eloVersion={eloVersion}/>
        </>
      ) : view === "leaderboard" ? (
        <LeaderboardView/>
      ) : (
        <>
          <Card>
            <div style={{fontSize:12.5, color:T.muted, lineHeight:1.6}}>
              SPI(FiveThirtyEight식), Opta 파워랭킹, 자체 하이브리드 ELO를 비교합니다. 열 제목을 탭하면 정렬됩니다.
            </div>
          </Card>
          <Card style={{marginTop:10, padding:0, overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%", borderCollapse:"collapse", fontSize:12.5}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${T.border}`}}>
                    <th style={{padding:"8px 4px", fontSize:11, color:T.muted, textAlign:"left"}}>#</th>
                    <Header k="spi" w="left">국가</Header>
                    <Header k="spi">SPI</Header>
                    <Header k="elo">ELO</Header>
                    <Header k="opta">Opta파워</Header>
                    <Header k="optaRank">Opta순위</Header>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i) => (
                    <tr key={r.team} style={{borderBottom:`1px solid ${T.border}`}}>
                      <td style={{padding:"7px 4px", color:T.muted}}>{i+1}</td>
                      <td style={{padding:"7px 4px", whiteSpace:"nowrap"}}>{flag(r.team)} {r.team}</td>
                      <td style={{padding:"7px 4px", textAlign:"right", color:T.gold, fontWeight:700}}>{r.spi.toFixed(1)}</td>
                      <td style={{padding:"7px 4px", textAlign:"right", color:T.cyan, fontWeight:700}}>{Math.round(r.elo)}</td>
                      <td style={{padding:"7px 4px", textAlign:"right"}}>{r.opta.toFixed(1)}</td>
                      <td style={{padding:"7px 4px", textAlign:"right", color:T.muted}}>{r.optaRank}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </>
      )}
    </div>
  );
}

// 📝 예측기록 탭
// ═══════════════════════════════════════════════════════════
function HistoryEntry({entry, onSettle, onDelete}) {
  const [hg, setHg] = useState("");
  const [ag, setAg] = useState("");

  const predicted = entry.homeWinProb > entry.awayWinProb
    ? (entry.homeWinProb > entry.drawProb ? "home" : "draw")
    : (entry.awayWinProb > entry.drawProb ? "away" : "draw");

  let actualOutcome = null;
  if (entry.settled) {
    if (entry.actualHome > entry.actualAway) actualOutcome = "home";
    else if (entry.actualHome < entry.actualAway) actualOutcome = "away";
    else actualOutcome = "draw";
  }
  const hit = entry.settled && actualOutcome === predicted;

  return (
    <Card style={{marginTop:10}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <div style={{fontSize:13.5, fontWeight:700}}>
          {flag(entry.home)} {entry.home} <span style={{color:T.muted, fontWeight:400}}>vs</span> {entry.away} {flag(entry.away)}
        </div>
        <button onClick={()=>onDelete(entry.id)} style={{background:"transparent", border:"none", color:T.muted, fontSize:16, cursor:"pointer"}}>✕</button>
      </div>
      <div style={{fontSize:11.5, color:T.muted, marginTop:4}}>
        예측: 홈 {pct(entry.homeWinProb)} · 무 {pct(entry.drawProb)} · 원정 {pct(entry.awayWinProb)} · 최다 스코어 {entry.topScore}
      </div>

      {!entry.settled ? (
        <div>
          <div style={{display:"flex", alignItems:"center", gap:8, marginTop:10}}>
            <span style={{fontSize:12, color:T.muted}}>실제 결과</span>
            <input type="number" min="0" value={hg} onChange={e=>setHg(e.target.value)}
              style={{width:46, padding:"6px", borderRadius:7, background:T.surface, border:`1px solid ${T.border}`, color:T.text, textAlign:"center"}}/>
            <span style={{color:T.muted}}>:</span>
            <input type="number" min="0" value={ag} onChange={e=>setAg(e.target.value)}
              style={{width:46, padding:"6px", borderRadius:7, background:T.surface, border:`1px solid ${T.border}`, color:T.text, textAlign:"center"}}/>
            <button onClick={()=>{
                if (hg==="" || ag==="") return;
                onSettle(entry.id, Number(hg), Number(ag));
              }}
              style={{flex:1, padding:"7px", borderRadius:8, border:"none", background:T.accent, color:"#fff", fontSize:12.5, fontWeight:700, cursor:"pointer"}}>
              결과 입력 (ELO 갱신)
            </button>
          </div>
          <div style={{fontSize:11, color:T.dim, marginTop:6}}>💡 경기 종료 후 실제 스코어를 위에 직접 입력하면 동적 ELO에 반영됩니다.</div>
        </div>
      ) : (
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10,
                      padding:"8px 10px", borderRadius:8, background:T.surface}}>
          <span style={{fontSize:13, fontWeight:700}}>최종 스코어 {entry.actualHome} : {entry.actualAway}</span>
          <span style={{fontSize:12.5, fontWeight:800, color: hit ? T.green : T.red}}>
            {hit ? "✅ 예측 적중" : "❌ 예측 실패"}
          </span>
        </div>
      )}
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════
// 💾 데이터 백업/복원 — localStorage(wc:*, config:runtime) 전체를
//   JSON으로 내보내기/가져오기. content:// 로 파일을 새로 열 때마다
//   브라우저 저장소 출처(origin)가 바뀌어 기존 데이터가 사라지는
//   문제를 해결하기 위한 수동 이전 기능.
// ═══════════════════════════════════════════════════════════
function BackupRestorePanel() {
  const [exportText, setExportText] = useState("");
  const [importText, setImportText] = useState("");
  const [status, setStatus] = useState("");

  const collect = () => {
    const data = {};
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith("user:wc:") || k.startsWith("user:config:") || k.startsWith("shared:wc:"))) {
        data[k] = localStorage.getItem(k);
      }
    }
    return data;
  };

  const handleExport = () => {
    const data = collect();
    const n = Object.keys(data).length;
    if (n === 0) { setStatus("내보낼 데이터가 없습니다 (저장된 항목 0개)."); setExportText(""); return; }
    setExportText(JSON.stringify(data));
    setStatus(`✅ ${n}개 항목을 아래 텍스트로 내보냈습니다. 전체 선택해서 복사해두거나, 파일로 다운로드하세요.`);
  };

  const handleDownload = () => {
    const text = exportText || JSON.stringify(collect());
    if (!text || text === "{}") { setStatus("내보낼 데이터가 없습니다."); return; }
    const blob = new Blob([text], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `wc26_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  };

  const handleImport = () => {
    try {
      const data = JSON.parse(importText.trim());
      let count = 0;
      for (const [k, v] of Object.entries(data)) {
        if (typeof k === "string" && (k.startsWith("user:wc:") || k.startsWith("user:config:") || k.startsWith("shared:wc:"))) {
          localStorage.setItem(k, v);
          count++;
        }
      }
      setStatus(`✅ ${count}개 항목 복원 완료! 아래 "새로고침" 버튼을 눌러 적용하세요.`);
    } catch (e) {
      setStatus("❌ 형식 오류 — 내보내기로 받은 JSON 텍스트를 그대로 붙여넣어주세요.");
    }
  };

  return (
    <Card style={{marginTop:10}}>
      <SectionTitle sub="파일을 새로 받을 때마다 예측기록·부상메모·대회기록 등이 사라진다면, 새 파일을 열기 전 여기서 내보내고 새 파일에서 가져오세요">
        💾 데이터 백업 / 복원
      </SectionTitle>
      <div style={{fontSize:11.5, color:T.muted, lineHeight:1.6, marginBottom:10}}>
        예측기록, 부상 메모, 대회 기록(득점/카드 등), 동적 ELO, API 설정이 모두 포함됩니다.
        API 키도 포함되니 백업 파일은 다른 사람에게 공유하지 마세요.
      </div>
      <div style={{display:"flex", gap:6, marginBottom:8}}>
        <button onClick={handleExport}
          style={{flex:1, padding:"9px", borderRadius:8, border:"none", background:T.cyan, color:"#001018", fontWeight:700, fontSize:12.5, cursor:"pointer"}}>
          📤 내보내기
        </button>
        <button onClick={handleDownload}
          style={{flex:1, padding:"9px", borderRadius:8, border:`1px solid ${T.border}`, background:"transparent", color:T.text, fontWeight:700, fontSize:12.5, cursor:"pointer"}}>
          📥 파일로 다운로드
        </button>
      </div>
      {exportText && (
        <textarea readOnly value={exportText} onClick={e=>e.target.select()}
          style={{width:"100%", height:90, marginBottom:10, padding:8, borderRadius:8, border:`1px solid ${T.border}`,
            background:T.bg, color:T.text, fontSize:10.5, fontFamily:"monospace", resize:"vertical"}}/>
      )}

      <div style={{fontSize:11.5, color:T.muted, marginBottom:6, marginTop:6}}>
        새 파일에서 복원하려면 위에서 받은 텍스트(또는 다운로드한 파일 내용)를 아래에 붙여넣으세요.
      </div>
      <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder='내보낸 JSON 텍스트를 여기에 붙여넣기'
        style={{width:"100%", height:90, marginBottom:8, padding:8, borderRadius:8, border:`1px solid ${T.border}`,
          background:T.bg, color:T.text, fontSize:10.5, fontFamily:"monospace", resize:"vertical"}}/>
      <div style={{display:"flex", gap:6}}>
        <button onClick={handleImport}
          style={{flex:1, padding:"9px", borderRadius:8, border:"none", background:T.green, color:"#001018", fontWeight:700, fontSize:12.5, cursor:"pointer"}}>
          📋 복원하기
        </button>
        <button onClick={()=>window.location.reload()}
          style={{flex:1, padding:"9px", borderRadius:8, border:`1px solid ${T.border}`, background:"transparent", color:T.text, fontWeight:700, fontSize:12.5, cursor:"pointer"}}>
          🔄 새로고침
        </button>
      </div>

      {status && <div style={{fontSize:11.5, color:T.gold, marginTop:8, lineHeight:1.5}}>{status}</div>}
    </Card>
  );
}

function HistoryTab({history, onSettle, onDelete, onClear, onResetElo}) {
  const settled = history.filter(h=>h.settled);
  const hits = settled.filter(h => {
    const predicted = h.homeWinProb > h.awayWinProb ? (h.homeWinProb > h.drawProb ? "home":"draw") : (h.awayWinProb > h.drawProb ? "away":"draw");
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    return predicted === actual;
  }).length;

  return (
    <div>
      <Card>
        <div style={{display:"flex", justifyContent:"space-around", textAlign:"center"}}>
          <div>
            <div style={{fontSize:20, fontWeight:800}}>{history.length}</div>
            <div style={{fontSize:11, color:T.muted}}>저장된 예측</div>
          </div>
          <div>
            <div style={{fontSize:20, fontWeight:800}}>{settled.length}</div>
            <div style={{fontSize:11, color:T.muted}}>결과 확정</div>
          </div>
          <div>
            <div style={{fontSize:20, fontWeight:800, color:T.green}}>{settled.length ? pct(hits/settled.length) : "-"}</div>
            <div style={{fontSize:11, color:T.muted}}>적중률</div>
          </div>
        </div>
      </Card>

      <BackupRestorePanel/>

      {history.length === 0 && (
        <Card style={{marginTop:10}}>
          <div style={{fontSize:12.5, color:T.muted, textAlign:"center"}}>
            예측 탭에서 "📌 예측기록에 저장"을 누르면 여기에 기록됩니다.
          </div>
        </Card>
      )}

      {history.map(h => <HistoryEntry key={h.id} entry={h} onSettle={onSettle} onDelete={onDelete}/>)}

      {history.length > 0 && (
        <button onClick={onClear} style={{width:"100%", marginTop:14, padding:"10px", borderRadius:9,
                border:`1px solid ${T.border}`, background:"transparent", color:T.red, fontSize:12.5, fontWeight:700, cursor:"pointer"}}>
          🗑️ 예측기록 전체 삭제
        </button>
      )}
      <button onClick={onResetElo} style={{width:"100%", marginTop:8, padding:"10px", borderRadius:9,
              border:`1px solid ${T.border}`, background:"transparent", color:T.muted, fontSize:12.5, fontWeight:700, cursor:"pointer"}}>
        ♻️ 동적 ELO 초기화 (경기결과로 갱신된 레이팅을 기본값으로 되돌리기)
      </button>
    </div>
  );
}

function TravelFatigueCard({home, away}) {
  const hInfo = getTravelInfo(home);
  const aInfo = getTravelInfo(away);

  if (!hInfo && !aInfo) return null;

  const maxKm = 18000;
  const TeamRow = ({team, info}) => {
    if (!info) return null;
    const barWidth = Math.min(100, (info.km / maxKm) * 100);
    return (
      <div style={{marginBottom:12}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5}}>
          <span style={{fontSize:13, fontWeight:700}}>{flag(team)} {team}</span>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            <span style={{fontSize:12, color:T.muted}}>{info.km.toLocaleString()}km</span>
            <span style={{padding:"2px 8px", borderRadius:10, fontSize:11, fontWeight:700,
              background: info.gradeColor+"26", border:`1px solid ${info.gradeColor}`, color: info.gradeColor}}>
              {info.grade}
            </span>
            {info.penalty < 0 && (
              <span style={{fontSize:12, fontWeight:800, color: T.red}}>
                {(info.penalty*100).toFixed(0)}%
              </span>
            )}
          </div>
        </div>
        <div style={{height:7, borderRadius:4, background:T.dim, overflow:"hidden"}}>
          <div style={{height:"100%", width:`${barWidth}%`, borderRadius:4,
            background: info.gradeColor,
            transition:"width 0.4s ease"}}/>
        </div>
      </div>
    );
  };

  return (
    <div style={{background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:14, marginTop:12}}>
      <div style={{fontSize:13, fontWeight:700, color:T.text, marginBottom:10}}>✈️ 원정 이동거리 & 피로도</div>
      <TeamRow team={home} info={hInfo}/>
      <TeamRow team={away} info={aInfo}/>
      <div style={{fontSize:11, color:T.dim, marginTop:4}}>
        📍 2026 월드컵 개최지(미국·캐나다·멕시코) 기준 비행거리 추정값. 피로도는 ELO 연산에 이미 반영됨.
      </div>
    </div>
  );
}

  const [tab, setTab] = useState("predict");
  const [home, setHome] = useState(ALL_TEAMS[0]);
  const [away, setAway] = useState(ALL_TEAMS[1]);
  const [sims, setSims] = useState(100000);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [squadTeam, setSquadTeam] = useState(ALL_TEAMS[0]);
  const [history, setHistory] = useState([]);
  const [eloVersion, setEloVersion] = useState(0);
  const [config, setConfig] = useState(RUNTIME_CONFIG);
  const [ready, setReady] = useState(false);
  const [liveResults, setLiveResults] = useState({});

  useEffect(() => {
    (async () => {
      await loadDynamicElo();
      await loadLiveResults();
      await loadCustomInjuries();
      const cfg = await loadRuntimeConfig();
      setConfig(cfg);
      try {
        let hist = [];
        let loadedFromStorage = false;
        try {
          const r = await window.storage.get("wc:history", false);
          if (r?.value) { hist = JSON.parse(r.value); loadedFromStorage = true; }
        } catch (e) {}

        // 📦 백업 전체 데이터 복원 — localStorage가 비었거나 막혀도 항상 BACKUP_SEED로 채움
        //   (content:// 로 열린 파일은 localStorage 접근이 막혀 hist가 빈 채로 남는 문제 방지)
        try {
          let seededFlag = null;
          try { seededFlag = await window.storage.get("wc:seededBackup_v1", false); } catch(e){}

          // 저장된 기록이 없거나(=막힘/최초), 시드 플래그가 없으면 → BACKUP_SEED 병합
          if (!seededFlag?.value || hist.length === 0) {
            // 1) 기록(history) 병합 (중복은 갱신)
            BACKUP_SEED.history.forEach((bh) => {
              const i = hist.findIndex(h => h.home===bh.home && h.away===bh.away && h.date===bh.date);
              if (i >= 0) hist[i] = { ...hist[i], ...bh };
              else hist.push(bh);
            });

            // 1-b) results에만 있고 history에 없는 종료 경기 보강
            Object.entries(BACKUP_SEED.results).forEach(([key, r], idx) => {
              const us = key.indexOf("_");
              const home = key.slice(0, us), away = key.slice(us+1);
              const exists = hist.some(h => h.home===home && h.away===away);
              if (!exists) {
                const op = OPENING_RESULTS.find(o => o.home===home && o.away===away);
                hist.push({
                  id: Date.now() + 10000 + idx,
                  home, away, date: r.date,
                  homeWinProb: op?.homeWinProb ?? 0.4,
                  drawProb: op?.drawProb ?? 0.28,
                  awayWinProb: op?.awayWinProb ?? 0.32,
                  topScore: op?.topScore ?? `${r.home}-${r.away}`,
                  liveApplied: false,
                  actualHome: r.home, actualAway: r.away, settled: true,
                });
              }
            });

            hist.sort((a,b) => (b.date||"").localeCompare(a.date||"") || (b.id||0)-(a.id||0));

            // 2) 동적 ELO 복원
            try {
              Object.entries(BACKUP_SEED.dynamicElo).forEach(([team, val]) => { _dynamicElo[team] = val; });
              await saveDynamicElo();
            } catch (e) {}

            // 3) 경기 결과 복원
            try {
              Object.entries(BACKUP_SEED.results).forEach(([key, val]) => { _liveResults[key] = val; });
              await saveLiveResults();
            } catch (e) {}

            // 4) 리더보드 복원 (저장 시도 — 막혀도 무시)
            try { await window.storage.set("wc:leaderboard", JSON.stringify(BACKUP_SEED.leaderboard), false); } catch (e) {}

            // 5) 저장 시도 (막혀도 메모리 hist는 이미 채워짐)
            try {
              await window.storage.set("wc:history", JSON.stringify(hist), false);
              await window.storage.set("wc:seededBackup_v1", "1", false);
            } catch (e) {}
            setEloVersion(v => v + 1);
          }
        } catch (e) {}

        setHistory(hist);
      } catch (e) {}
      setLiveResults({..._liveResults});
      setReady(true);
    })();
  }, []);

  // 결과 갱신 콜백 — 일정탭에서 결과 저장 후 호출
  const onResultFetched = useCallback(() => {
    setLiveResults({..._liveResults});
    setEloVersion(v => v + 1);
  }, []);

  const persistHistory = useCallback(async (list) => {
    setHistory(list);
    try { await window.storage.set("wc:history", JSON.stringify(list), false); } catch (e) {}
  }, []);

  const runPredict = useCallback(async () => {
    if (home === away) return;
    setLoading(true);
    try {
      const matchInfo = SCHEDULE.find(g => (g.home===home&&g.away===away)||(g.home===away&&g.away===home));
      const dateISO = matchInfo?.date || null;
      const live = await predictMatchLive(home, away, sims, dateISO);
      const cv = await crossValidate(home, away, live, dateISO);
      setResult({ ...live, cv });
    } catch (e) {
      // 실시간 호출 자체가 실패해도 정적 모델로는 항상 결과가 나오게 함
      const base = predictMatch(home, away, sims, { neutralVenue: true });
      const cv = await crossValidate(home, away, base).catch(()=>null);
      setResult({ ...base, liveApplied:false, liveSources:[], cv });
    } finally {
      setLoading(false);
    }
  }, [home, away, sims]);

  const saveToHistory = useCallback(() => {
    if (!result) return;
    const matchInfo = SCHEDULE.find(g => (g.home===home&&g.away===away)||(g.home===away&&g.away===home));
    const entry = {
      id: Date.now(),
      home, away,
      date: matchInfo?.date || null,
      homeWinProb: result.homeWinProb, drawProb: result.drawProb, awayWinProb: result.awayWinProb,
      topScore: result.topScores[0]?.score,
      liveApplied: result.liveApplied,
      actualHome: null, actualAway: null, settled: false,
    };
    persistHistory([entry, ...history]);
  }, [result, home, away, history, persistHistory]);

  const settleEntry = useCallback(async (id, hg, ag) => {
    const entry = history.find(h => h.id === id);
    if (!entry) return;
    const list = history.map(h => h.id === id ? { ...h, actualHome: hg, actualAway: ag, settled: true } : h);
    updateEloAfterMatch(entry.home, entry.away, hg, ag, undefined, undefined, "group");
    await saveDynamicElo();
    setEloVersion(v => v + 1);
    persistHistory(list);
  }, [history, persistHistory]);

  const deleteEntry = useCallback((id) => {
    persistHistory(history.filter(h => h.id !== id));
  }, [history, persistHistory]);

  const clearHistory = useCallback(() => {
    if (!confirm("저장된 예측기록을 모두 삭제할까요?")) return;
    persistHistory([]);
  }, [persistHistory]);

  const resetElo = useCallback(async () => {
    if (!confirm("경기결과로 갱신된 동적 ELO를 기본값으로 초기화할까요?")) return;
    await resetDynamicElo();
    setEloVersion(v => v + 1);
  }, []);

  const onSelectMatch = useCallback((h, a) => {
    setHome(h); setAway(a); setResult(null); setTab("predict");
  }, []);

  return (
    <div style={{maxWidth:520, margin:"0 auto", minHeight:"100vh", paddingBottom:30}}>
      <div style={{padding:"18px 14px 10px", textAlign:"center"}}>
        <div style={{fontSize:20, fontWeight:900, color:T.text}}>🏆 2026 FIFA 월드컵 예측기 <span style={{fontSize:13, color:T.cyan, fontWeight:600}}>v5.1</span></div>
        <div style={{fontSize:11.5, color:T.muted, marginTop:3}}>
          하이브리드 ELO · xG · ML 앙상블 · 몬테카를로 · 실시간 결과 · 조별 순위 자동집계 · 동기부여v2
        </div>
      </div>

      <div style={{display:"flex", overflowX:"auto", gap:6, padding:"0 12px 10px", borderBottom:`1px solid ${T.border}`}}>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:"0 0 auto", padding:"8px 14px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:13, fontWeight:700, whiteSpace:"nowrap",
                    background: tab===t.id ? T.accent : T.surface,
                    color: tab===t.id ? "#fff" : T.muted}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 12px 0"}}>
        {!ready ? (
          <Card><div style={{textAlign:"center", color:T.muted, fontSize:13}}>불러오는 중...</div></Card>
        ) : (
          <>
            {tab === "predict" && (
              <PredictTab home={home} away={away} setHome={setHome} setAway={setAway}
                sims={sims} setSims={setSims}
                result={result} loading={loading} onPredict={runPredict} onSave={saveToHistory}/>
            )}
            {tab === "schedule" && <ScheduleTab onSelectMatch={onSelectMatch} liveResults={liveResults} onResultFetched={onResultFetched}/>}
            {tab === "squads" && <SquadTab team={squadTeam} setTeam={setSquadTeam}/>}
            {tab === "rankings" && <RankingTab eloVersion={eloVersion}/>}
            {tab === "settings" && <SettingsTab config={config} setConfig={setConfig} sampleHome={home} sampleAway={away}/>}
            {tab === "history" && (
              <HistoryTab history={history} onSettle={settleEntry} onDelete={deleteEntry}
                onClear={clearHistory} onResetElo={resetElo}/>
            )}
          </>
        )}
      </div>

      <div style={{textAlign:"center", marginTop:24, fontSize:10.5, color:T.dim}}>
        ⚠️ 본 예측은 통계 모델 + 실시간 배당/예측 기반 시뮬레이션이며 실제 결과와 다를 수 있습니다.<br/>
        v5.1 · 스코어: Football-Data.org→openfootball→worldcup26.ir 3단폴백 · 동기부여v2 · ELO 자동갱신 · MC 100,000회
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch (e) {
  // 최후의 방어선 — 렌더 자체가 실패하면 빈 화면 대신 오류를 보여줌
  const el = document.getElementById("root");
  if (el) el.innerHTML = '<div style="padding:20px;color:#ff6b6b;font-family:sans-serif;font-size:14px;line-height:1.6">'
    + '⚠️ 앱 로딩 중 오류가 발생했습니다.<br/><br/>'
    + '브라우저 메뉴 → 방문 기록/캐시 삭제 후 다시 열어보세요.<br/><br/>'
    + '<small style="color:#888">' + (e && e.message ? e.message : e) + '</small></div>';
}
</script>
</body>
</html>
