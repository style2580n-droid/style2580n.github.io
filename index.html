async function fetchApiFootballInjuries(force = false) {
  if (!RUNTIME_CONFIG.apiFootballKey) return null;
  const data = await loadApiFootballInjuries();
  const COOLDOWN_MS = 6 * 3600 * 1000; // 6시간
  if (!force && data.lastFetch && (Date.now() - data.lastFetch) < COOLDOWN_MS) return data;

  try {
    const headers = { "x-apisports-key": RUNTIME_CONFIG.apiFootballKey };
    const res = await fetchViaProxies(`https://v3.football.api-sports.io/injuries?league=1&season=2026`, { headers }, 8000);
    const j = res ? await res.json().catch(()=>null) : null;
    if (Array.isArray(j?.response)) {
      const byTeam = {};
      for (const entry of j.response) {
        const teamName = espnTeamToKorean(entry.team?.name || "");
        const name = entry.player?.name;
        const type = entry.player?.type || entry.type || "Injury";
        const reason = entry.player?.reason || entry.reason || "";
        if (!name) continue;
        if (!byTeam[teamName]) byTeam[teamName] = [];
        if (!byTeam[teamName].some(p => p.name === name && p.reason === reason)) {
          byTeam[teamName].push({ name, type, reason });
        }
      }
      data.byTeam = byTeam;
      data.lastFetch = Date.now();
      await saveApiFootballInjuries(data);
    }
  } catch (e) { /* 실패 시 기존 캐시 유지 */ }
  return data;
}

async function updateLeaderboards(maxDates = 4) {
  const state = await loadLeaderboardState();
  if (!state.scorers) state.scorers = {};
  if (!state.assists) state.assists = {};
  if (!state.gk) state.gk = {};
  if (!state.cards) state.cards = {};
  if (!state.ownGoals) state.ownGoals = {};
  const processedSet = new Set(state.processedEvents || []);

  const _ld = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  const today = _ld();
  const dates = [...new Set(SCHEDULE.map(m => m.date))].sort();
  // lastDate는 "이 날짜까지 완료"를 의미 → 그 다음 날짜부터 처리 (재처리 무한루프 방지)
  const pending = dates.filter(d => d <= today && (!state.lastDate || d > state.lastDate));

  let datesDone = 0;
  for (const date of pending) {
    if (datesDone >= maxDates) break;
    // ESPN의 dates= 그룹핑은 UTC 기준이라 SCHEDULE의 날짜와 1일 정도 어긋날 수 있음
    // (예: 한국시간 기준 날짜의 경기가 ESPN상 전날/다음날 묶음으로 잡힘) →
    // 전후 1일을 포함한 범위로 조회해 누락을 방지
    const d0 = new Date(date + "T00:00:00Z");
    const dPrev = new Date(d0); dPrev.setUTCDate(d0.getUTCDate() - 1);
    const dNext = new Date(d0); dNext.setUTCDate(d0.getUTCDate() + 1);
    const fmt = dt => dt.toISOString().slice(0,10).replace(/-/g,"");
    const rangeStr = `${fmt(dPrev)}-${fmt(dNext)}`;
    try {
      const sbRes = await fetchViaProxies(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${rangeStr}&limit=50`, {}, 8000);
      const sb = sbRes ? await sbRes.json().catch(()=>null) : null;
      const events = sb?.events || [];
      // ⚠️ 범위조회(±1일)엔 다른 날짜 경기도 섞임 → allDone은 "이 date 경기"만 기준으로 판정.
      //   안 그러면 다음날 진행중 경기 때문에 오늘치 lastDate가 영영 안 올라감(집계 멈춤 버그).
      let pendingThisDate = 0;

      for (const ev of events) {
        // 이 이벤트가 어느 SCHEDULE 날짜인지 — ESPN date(UTC)를 한국시간으로 보정해 매칭
        const evDateUTC = ev.date ? new Date(ev.date) : null;
        const completed = !!ev.status?.type?.completed;

        if (processedSet.has(ev.id)) { continue; }

        // 미완료 경기는 집계 안 함 (단, 날짜 판정용으로만 카운트)
        if (!completed) {
          // 이 경기가 정확히 현재 date에 해당하는지 느슨하게 확인
          if (evDateUTC) {
            const kst = new Date(evDateUTC.getTime() + 9*3600*1000);
            const kstDate = `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,"0")}-${String(kst.getUTCDate()).padStart(2,"0")}`;
            if (kstDate === date) pendingThisDate++;
          }
          continue;
        }

        const sumRes = await fetchViaProxies(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${ev.id}`, {}, 8000);
        const sum = sumRes ? await sumRes.json().catch(()=>null) : null;
        if (!sum) { continue; }

        // 골 / 어시스트 / 카드 — ESPN 축구 summary는 이벤트를 여러 위치에 둠.
        //   keyEvents, scoringPlays, plays, competitions[].details 를 모두 모아서 처리.
        const comp0 = sum.header?.competitions?.[0] || sum.competitions?.[0] || {};
        const eventArrays = [
          sum.keyEvents,
          sum.scoringPlays,
          sum.plays,
          comp0.details,
          comp0.keyEvents,
        ].filter(Array.isArray);
        const allEvents = [].concat(...eventArrays);

        for (const ke of allEvents) {
          // 이벤트 타입 — type.text, type.name, text, play.type 등 다양
          const t = (ke.type?.text || ke.type?.name || ke.text || ke.shortText || "").toLowerCase();
          // 선수 — athletesInvolved 또는 participants
          const players = ke.athletesInvolved || ke.participants || [];
          const teamName = espnTeamToKorean(ke.team?.displayName || ke.team?.name || "");
          // 골 판정 — scoringPlay 플래그 또는 텍스트에 goal
          const isGoal = ke.scoringPlay === true || (t.includes("goal") && !t.includes("no goal"));

          if (isGoal && !t.includes("missed") && !t.includes("disallowed") && !t.includes("penalty shootout")) {
            const isOwn = t.includes("own");
            const getName = p => p?.displayName || p?.shortName || p?.athlete?.displayName || p?.athlete?.shortName;
            if (players.length && !isOwn) {
              const scorer = getName(players[0]);
              if (scorer) state.scorers[`${scorer}|${teamName}`] = (state.scorers[`${scorer}|${teamName}`] || 0) + 1;
              const assister = getName(players[1]);
              if (assister) state.assists[`${assister}|${teamName}`] = (state.assists[`${assister}|${teamName}`] || 0) + 1;
            } else if (players.length && isOwn) {
              const player = getName(players[0]);
              if (player) state.ownGoals[`${player}|${teamName}`] = (state.ownGoals[`${player}|${teamName}`] || 0) + 1;
            }
          } else if (t.includes("card") || t.includes("caution") || t.includes("sent off")) {
            const player = players[0]?.displayName || players[0]?.shortName || players[0]?.athlete?.displayName;
            if (player) {
              const ckey = `${player}|${teamName}`;
              if (!state.cards[ckey]) state.cards[ckey] = { yellow:0, red:0 };
              if (t.includes("red") || t.includes("second yellow") || t.includes("sent off")) state.cards[ckey].red += 1;
              else if (t.includes("yellow") || t.includes("caution")) state.cards[ckey].yellow += 1;
            }
          }
        }

        // 골키퍼 클린시트
        const comps = sum.header?.competitions?.[0]?.competitors || [];
        for (const c of comps) {
          const opp = comps.find(o => o.id !== c.id);
          const oppScore = Number(opp?.score ?? NaN);
          if (Number.isNaN(oppScore)) continue;
          const myTeamName = espnTeamToKorean(c.team?.displayName || c.team?.name || "");
          const roster = (sum.rosters || []).find(r => String(r.team?.id) === String(c.team?.id) || r.homeAway === c.homeAway);
          const startGk = (roster?.roster || []).find(p => p.starter &&
            (p.position?.abbreviation === "G" || (p.position?.name || "").toLowerCase().includes("goalkeeper")));
          const gkName = startGk?.athlete?.displayName || startGk?.athlete?.shortName;
          if (gkName) {
            const gkey = `${gkName}|${myTeamName}`;
            if (!state.gk[gkey]) state.gk[gkey] = { apps:0, cs:0, conceded:0 };
            state.gk[gkey].apps += 1;
            state.gk[gkey].conceded += oppScore;
            if (oppScore === 0) state.gk[gkey].cs += 1;
          }
        }

        processedSet.add(ev.id);
      }

      // 이 날짜의 미완료 경기가 없으면(전부 끝났으면) lastDate 전진
      if (pendingThisDate === 0) { state.lastDate = date; datesDone++; }
      else break; // 이 날짜에 아직 진행 중 경기 → 다음 갱신에서 재시도
    } catch (e) { break; }
  }

  state.processedEvents = [...processedSet];
  await saveLeaderboardState(state);
  return state;
}

// ESPN 비공식 API — soccer/fifa.world (키 불필요)
// dates=YYYYMMDD 의 스코어보드에서 이벤트를 찾고, summary?event=ID 에서
// rosters(확정 라인업)와 keyEvents(이 경기 카드)를 추출한다.
async function fetchEspnLineup(home, away, dateISO) {
  try {
    // ⚠️ ESPN은 경기를 UTC 날짜로 묶음 → 한국시간 날짜와 1일 어긋날 수 있어
    //   단일 날짜로 조회하면 끝난 경기를 못 찾는 문제. 전후 1일 포함 범위로 조회.
    const baseISO = dateISO || (() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
    const d0 = new Date(baseISO + "T12:00:00Z");
    const dPrev = new Date(d0); dPrev.setUTCDate(d0.getUTCDate() - 1);
    const dNext = new Date(d0); dNext.setUTCDate(d0.getUTCDate() + 1);
    const fmt = dt => `${dt.getUTCFullYear()}${String(dt.getUTCMonth()+1).padStart(2,"0")}${String(dt.getUTCDate()).padStart(2,"0")}`;
    const rangeStr = `${fmt(dPrev)}-${fmt(dNext)}`;
    const sbUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${rangeStr}&limit=50`;
    const sbRes = await fetchViaProxies(sbUrl, {}, 8000);
    if (!sbRes) return null;
    const sb = await sbRes.json().catch(()=>null);
    const events = sb?.events || [];

    let eventId = null;
    for (const ev of events) {
      const teams = ev.competitions?.[0]?.competitors || [];
      const h = teams.find(t=>t.homeAway==="home");
      const a = teams.find(t=>t.homeAway==="away");
      const hn = h?.team?.displayName || h?.team?.name || "";
      const an = a?.team?.displayName || a?.team?.name || "";
      if ((isSameTeam(home, hn) && isSameTeam(away, an)) || (isSameTeam(home, an) && isSameTeam(away, hn))) {
        eventId = ev.id; break;
      }
    }
    if (!eventId) return null;

    const sumUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`;
    const sumRes = await fetchViaProxies(sumUrl, {}, 8000);
    if (!sumRes) return null;
    const sum = await sumRes.json().catch(()=>null);
    if (!sum) return null;

    // ESPN 팀ID ↔ 우리쪽 home/away 매핑
    const competitors = sum.header?.competitions?.[0]?.competitors || [];
    let ourHomeId = null, ourAwayId = null;
    for (const c of competitors) {
      const tn = c.team?.displayName || c.team?.name || "";
      if (isSameTeam(home, tn)) ourHomeId = c.team?.id;
      else if (isSameTeam(away, tn)) ourAwayId = c.team?.id;
    }

    // 확정 라인업 (보통 킥오프 1시간 전부터 채워짐)
    let homeNames = [], awayNames = [];
    for (const r of (sum.rosters || [])) {
      const names = (r.roster || []).filter(p => p.starter)
        .map(p => p.athlete?.displayName || p.athlete?.shortName || p.athlete?.fullName)
        .filter(Boolean);
      if (!names.length) continue;
      const tid = r.team?.id ?? r.homeAway; // 일부 응답은 team.id 없이 homeAway만 있을 수 있음
      if (String(tid) === String(ourHomeId)) homeNames = names;
      else if (String(tid) === String(ourAwayId)) awayNames = names;
    }

    // 이 경기에서 나온 카드 / 교체 / PK 실패·막힘 / 자책골 / VAR (경기 시작/종료 후에만 존재)
    const cards = { home: [], away: [] };
    const subs = { home: [], away: [] };
    const penalties = { home: [], away: [] };
    const ownGoals = { home: [], away: [] };
    const varEvents = [];
    for (const ke of (sum.keyEvents || [])) {
      const typeText = (ke.type?.text || ke.text || "").toLowerCase();
      const tid = ke.team?.id;
      const side = String(tid) === String(ourHomeId) ? "home" : String(tid) === String(ourAwayId) ? "away" : null;
      const players = ke.athletesInvolved || [];
      const minute = ke.clock?.displayValue || "";

      if (typeText.includes("card")) {
        const isRed = typeText.includes("red");
        const player = players[0];
        const pname = player?.displayName || player?.shortName || "선수";
        const label = `${pname} ${isRed ? "🟥" : "🟨"}`;
        if (side) cards[side].push(label);
      } else if (typeText.includes("substitution")) {
        const out = players.find(p => (p.subType||p.type||"").toLowerCase().includes("out")) || players[0];
        const inP = players.find(p => (p.subType||p.type||"").toLowerCase().includes("in")) || players[1];
        const outName = out?.displayName || out?.shortName;
        const inName = inP?.displayName || inP?.shortName;
        if (side && (outName || inName)) subs[side].push({ minute, out: outName || "?", in: inName || "?" });
      } else if (typeText.includes("penalty") && (typeText.includes("missed") || typeText.includes("saved"))) {
        const player = players[0]?.displayName || players[0]?.shortName || "선수";
        if (side) penalties[side].push({ player, result: typeText.includes("saved") ? "막힘" : "실패", minute });
      } else if (typeText.includes("own goal")) {
        const player = players[0]?.displayName || players[0]?.shortName || "선수";
        if (side) ownGoals[side].push({ player, minute });
      } else if (typeText.includes("var") || typeText.includes("video review") || typeText.includes("review")) {
        varEvents.push({ desc: ke.type?.text || ke.text || "VAR 판독", minute, side });
      }
    }

    // 선수별 개인 기여도 — boxscore.players[].statistics[].athletes[]
    // ESPN의 key명은 통계 유형마다 달라서, 자주 쓰이는 후보 key들을 방어적으로 매칭
    const playerStats = { home: [], away: [] };
    const numFrom = v => { const n = parseFloat(String(v).replace(/[^\d.\-]/g,"")); return isFinite(n) ? n : null; };
    const findKey = (keys, ...patterns) => {
      for (const p of patterns) {
        const idx = keys.findIndex(k => (k||"").toLowerCase() === p);
        if (idx >= 0) return idx;
      }
      for (const p of patterns) {
        const idx = keys.findIndex(k => (k||"").toLowerCase().includes(p));
        if (idx >= 0) return idx;
      }
      return -1;
    };
    for (const tb of (sum.boxscore?.players || [])) {
      const tid = tb.team?.id;
      const side = String(tid) === String(ourHomeId) ? "home" : String(tid) === String(ourAwayId) ? "away" : null;
      if (!side) continue;
      for (const grp of (tb.statistics || [])) {
        const keys = (grp.keys || grp.names || []).map(k => String(k||"").toLowerCase());
        if (!keys.length) continue;
        const iGoals = findKey(keys, "goals", "totalgoals");
        const iAssists = findKey(keys, "goalassists", "assists");
        const iShots = findKey(keys, "totalshots", "shotstotal", "shots");
        const iShotsOn = findKey(keys, "shotsontarget", "ontargetscoringattempt");
        const iTackles = findKey(keys, "totaltackles", "tackles", "effectivetackles");
        const iRating = findKey(keys, "rating", "matchrating");
        const iPasses = findKey(keys, "totalpasses", "accuratepasses", "touches");
        for (const a of (grp.athletes || [])) {
          const name = a.athlete?.displayName || a.athlete?.shortName;
          if (!name) continue;
          const stats = a.stats || [];
          const entry = {
            name,
            goals: iGoals>=0 ? numFrom(stats[iGoals]) : null,
            assists: iAssists>=0 ? numFrom(stats[iAssists]) : null,
            shots: iShots>=0 ? numFrom(stats[iShots]) : null,
            shotsOnTarget: iShotsOn>=0 ? numFrom(stats[iShotsOn]) : null,
            tackles: iTackles>=0 ? numFrom(stats[iTackles]) : null,
            rating: iRating>=0 ? numFrom(stats[iRating]) : null,
            passes: iPasses>=0 ? numFrom(stats[iPasses]) : null,
          };
          // 모든 값이 비어있으면(출전 안 함 등) 제외
          if (Object.values(entry).slice(1).some(v => v != null)) playerStats[side].push(entry);
        }
      }
    }

    // 팀 통계 (점유율/슈팅/유효슈팅/코너/파울) — boxscore.teams[].statistics[]
    const teamStats = { home: null, away: null };
    for (const tb of (sum.boxscore?.teams || [])) {
      const tid = tb.team?.id;
      const side = String(tid) === String(ourHomeId) ? "home" : String(tid) === String(ourAwayId) ? "away" : null;
      if (!side) continue;
      const out = {};
      for (const s of (tb.statistics || [])) {
        const n = (s.name || s.label || s.displayName || "").toLowerCase().replace(/\s+/g,"");
        const v = s.displayValue ?? s.value;
        if (v == null) continue;
        if (n.includes("possession")) out.possession = v;
        else if (n.includes("shotsontarget") || n.includes("ontargetshots")) out.shotsOnTarget = v;
        else if (n === "totalshots" || n === "shots" || n.includes("totalshots")) out.shots = v;
        else if (n.includes("corner")) out.corners = v;
        else if (n.includes("foul")) out.fouls = v;
      }
      if (Object.keys(out).length) teamStats[side] = out;
    }

    // 주심
    let referee = null;
    const officials = sum.gameInfo?.officials || sum.officials || [];
    const refObj = officials.find(o => /referee/i.test(o.position?.name || o.position?.displayName || "") && !/assistant/i.test(o.position?.name || ""))
      || officials[0];
    if (refObj) referee = refObj.displayName || refObj.fullName || null;

    // 승부차기 (무승부 토너먼트 경기)
    let shootout = null;
    const homeComp = competitors.find(c => String(c.team?.id) === String(ourHomeId));
    const awayComp = competitors.find(c => String(c.team?.id) === String(ourAwayId));
    const hSO = homeComp?.shootoutScore, aSO = awayComp?.shootoutScore;
    if (hSO != null || aSO != null) shootout = { home: Number(hSO||0), away: Number(aSO||0) };

    const hasLineup = homeNames.length > 0 || awayNames.length > 0;
    const hasCards = cards.home.length > 0 || cards.away.length > 0;
    const hasPlayerStats = playerStats.home.length > 0 || playerStats.away.length > 0;
    const hasExtra = subs.home.length || subs.away.length || penalties.home.length || penalties.away.length ||
      ownGoals.home.length || ownGoals.away.length || varEvents.length || teamStats.home || teamStats.away || shootout || hasPlayerStats;
    if (!hasLineup && !hasCards && !hasExtra) return null;

    return {
      home: homeNames, away: awayNames, cards,
      subs, penalties, ownGoals, varEvents, teamStats, referee, shootout, playerStats,
      confirmed: hasLineup,
      status: sum.header?.competitions?.[0]?.status?.type?.description || null,
      source: "espn",
    };
  } catch (e) { return null; }
}

// ═══════════════════════════════════════════════════════════
// 💾 경기 상세 기록 캐시 — ESPN에서 가져온 라인업/카드/교체/PK/VAR/
//   팀통계/심판/승부차기를 경기별로 저장. 매번 새로 조회하지 않고
//   마지막으로 받아온 기록을 보존(특히 종료된 경기).
// ═══════════════════════════════════════════════════════════
function matchDetailKey(home, away, dateISO) {
  return `wc:match:${(dateISO||"").replace(/-/g,"")}_${home}_${away}`;
}
async function loadMatchDetail(home, away, dateISO) {
  try {
    const r = await window.storage.get(matchDetailKey(home, away, dateISO), false);
    if (r?.value) return JSON.parse(r.value);
  } catch (e) {}
  return null;
}
async function saveMatchDetail(home, away, dateISO, data) {
  try { await window.storage.set(matchDetailKey(home, away, dateISO), JSON.stringify(data), false); } catch (e) {}
}

async function fetchLiveLineup(home, away, dateISO) {
  // 1) football-data.org (CORS로 자주 실패 — 가능하면 시도)
  const key = RUNTIME_CONFIG.footballDataOrgKey;
  if (key) {
    try {
      const today = dateISO || new Date().toISOString().slice(0,10);
      const url = `https://api.football-data.org/v4/matches?dateFrom=${today}&dateTo=${today}&competitions=2000`;
      const res = await fetchViaProxies(url, { headers: { "X-Auth-Token": key } }, 8000);
      if (res) {
        const j = await res.json().catch(() => null);
        const matches = j?.matches || [];
        const match = matches.find(m => {
          const hn = m.homeTeam?.name || "", an = m.awayTeam?.name || "";
          return (isSameTeam(home, hn) && isSameTeam(away, an)) ||
                 (isSameTeam(home, an) && isSameTeam(away, hn));
        });
        if (match) {
          const swapped = match.homeTeam && isSameTeam(away, match.homeTeam.name);
          const homeLu = swapped ? match.awayTeam?.lineup : match.homeTeam?.lineup;
          const awayLu = swapped ? match.homeTeam?.lineup : match.awayTeam?.lineup;
          if (homeLu?.length || awayLu?.length) {
            return {
              home: homeLu?.map(p => p.name || p.player?.name) || [],
              away: awayLu?.map(p => p.name || p.player?.name) || [],
              cards: { home: [], away: [] },
              source: "football-data.org",
              confirmed: true,
            };
          }
        }
      }
    } catch (e) { /* 2) ESPN으로 폴백 */ }
  }
  // 2) ESPN 비공식 API (키 불필요) — 확정 라인업 + 이 경기 카드
  const espn = await fetchEspnLineup(home, away, dateISO);
  if (espn) return espn;
  return null;
}


// 👤 개인 기여도 패널 — ESPN summary boxscore 기반 (Goals/Assists/Shots/Tackles/Rating/Passes)
//   라인업 패널과 같은 ESPN summary를 사용하므로 경기 시작 후(특히 종료 후)에 채워짐.
function PlayerContributionPanel({home, away, matchDate}) {
  const staticKey = `${home}_${away}`;
  const staticData = STATIC_MATCH_STATS[staticKey] || null;

  const [stats, setStats] = useState(staticData ? { home: staticData.home, away: staticData.away } : null);
  const [loading, setLoading] = useState(!staticData);
  const [tried, setTried] = useState(!!staticData);
  const [source, setSource] = useState(staticData ? "경기 통계 리포트" : null);
  const [expanded, setExpanded] = useState(false);

  useEffect(() => {
    let cancelled = false;

    // 내장 정적 기록이 있으면 그것을 즉시 표시(가장 상세함: xG/xA/키패스/인터셉트/태클/걷어내기 포함)
    const sd = STATIC_MATCH_STATS[`${home}_${away}`];
    if (sd) {
      setStats({ home: sd.home, away: sd.away });
      setSource("경기 통계 리포트");
      setLoading(false);
      setTried(true);
      return; // 정적 기록이 가장 충실하므로 API 조회로 덮어쓰지 않음
    }

    setLoading(true);

    // 1) 저장된 ESPN 기록 먼저 표시 (즉시)
    loadMatchDetail(home, away, matchDate).then(cached => {
      if (cancelled) return;
      if (cached?.playerStats) setStats(cached.playerStats);
    });

    // 2) API-Football 개인 통계 우선 시도 (축구 전문 — 슈팅/태클/평점 충실)
    (async () => {
      try {
        const af = await fetchApiFootballPlayerStats(home, away, matchDate);
        if (!cancelled && af && (af.home.length || af.away.length)) {
          setStats(af);
          setSource("API-Football");
          setLoading(false);
          setTried(true);
          return;
        }
      } catch (e) {}
      // 3) 폴백: ESPN summary boxscore
      try {
        const result = await fetchLiveLineup(home, away, matchDate);
        if (cancelled) return;
        if (result?.playerStats && (result.playerStats.home.length || result.playerStats.away.length)) {
          setStats(result.playerStats);
          setSource("ESPN");
        }
      } catch (e) {}
      if (!cancelled) { setLoading(false); setTried(true); }
    })();

    return () => { cancelled = true; };
  }, [home, away, matchDate]);

  const hasDetailed = !!staticData; // xG/xA/키패스/인터셉트/걷어내기까지 있는지 여부

  const all = [
    ...(stats?.home||[]).map(p=>({...p, team: home})),
    ...(stats?.away||[]).map(p=>({...p, team: away})),
  ];
  const ranked = all
    .filter(p => (p.goals||0) > 0 || (p.assists||0) > 0 || (p.rating!=null) || (p.xg||0) > 0 || (p.shots||0) > 0)
    .sort((a,b) => (b.goals||0)-(a.goals||0) || (b.assists||0)-(a.assists||0) || (b.rating||0) - (a.rating||0) || (b.xg||0)-(a.xg||0));
  const top = expanded ? ranked : ranked.slice(0, 8);

  return (
    <Card style={{marginTop:12}}>
      <SectionTitle sub={hasDetailed
        ? `${source} 기반 (골·도움·슈팅·xG·xA·인터셉트·태클·걷어내기 전체)`
        : `${source || "API-Football/ESPN"} 경기 통계 기반 (골·어시스트·슈팅·태클·평점) — 경기 진행/종료 후 표시`}>
        👤 개인 기여도
      </SectionTitle>
      {loading && top.length===0 ? (
        <div style={{fontSize:12, color:T.muted, textAlign:"center", padding:"8px 0"}}>⏳ 조회 중...</div>
      ) : top.length === 0 ? (
        <div style={{fontSize:12, color:T.muted, lineHeight:1.6}}>
          {tried ? "아직 표시할 개인 기록이 없습니다 (경기 시작 전이거나 API 미제공)." : "데이터 없음"}
        </div>
      ) : hasDetailed ? (
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {top.map((p, i) => (
            <div key={i} style={{padding:"8px 6px", borderTop: i===0 ? "none" : `1px solid ${T.border}`}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4}}>
                <span style={{fontWeight:700, fontSize:13, color:T.text}}>
                  {p.name} <span style={{color:T.dim, fontWeight:400, fontSize:10.5}}>({p.team}· {p.pos||"-"})</span>
                </span>
                <span style={{display:"flex", gap:6, fontSize:11.5, fontWeight:700}}>
                  {(p.goals||0) > 0 && <span style={{color:T.green}}>⚽{p.goals}</span>}
                  {(p.assists||0) > 0 && <span style={{color:T.blue||T.text}}>🅰{p.assists}</span>}
                </span>
              </div>
              <div style={{display:"flex", flexWrap:"wrap", gap:"4px 10px", fontSize:10.5, color:T.muted}}>
                <span>슈팅 {p.shots ?? "-"}{p.shotsOnTarget!=null ? `(유효${p.shotsOnTarget})` : ""}</span>
                <span>xG {p.xg!=null ? p.xg.toFixed(2) : "-"}</span>
                <span>xA {p.xa!=null ? p.xa.toFixed(2) : "-"}</span>
                <span>패스 {p.passes ?? "-"}</span>
                <span>인터셉트 {p.interceptions ?? 0}</span>
                <span>태클 {p.tackles ?? 0}</span>
                <span>걷어내기 {p.clearances ?? 0}</span>
              </div>
            </div>
          ))}
          {ranked.length > 8 && (
            <button onClick={() => setExpanded(e => !e)} style={{
              marginTop:2, padding:"6px 0", fontSize:11.5, color:T.dim,
              background:"transparent", border:"none", cursor:"pointer", textAlign:"center"
            }}>
              {expanded ? "▲ 접기" : `▼ 전체 ${ranked.length}명 보기`}
            </button>
          )}
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          <div style={{display:"flex", fontSize:10.5, color:T.dim, padding:"0 4px"}}>
            <span style={{flex:2}}>선수</span>
            <span style={{flex:"0 0 30px", textAlign:"center"}}>골</span>
            <span style={{flex:"0 0 30px", textAlign:"center"}}>도움</span>
            <span style={{flex:"0 0 36px", textAlign:"center"}}>슈팅</span>
            <span style={{flex:"0 0 36px", textAlign:"center"}}>태클</span>
            <span style={{flex:"0 0 40px", textAlign:"center"}}>평점</span>
          </div>
          {top.map((p, i) => (
            <div key={i} style={{display:"flex", alignItems:"center", fontSize:12, padding:"6px 4px",
              borderTop:`1px solid ${T.border}`}}>
              <span style={{flex:2, color:T.text}}>{p.name} <span style={{color:T.dim, fontSize:10.5}}>({p.team})</span></span>
              <span style={{flex:"0 0 30px", textAlign:"center", color:T.muted}}>{p.goals ?? "-"}</span>
              <span style={{flex:"0 0 30px", textAlign:"center", color:T.muted}}>{p.assists ?? "-"}</span>
              <span style={{flex:"0 0 36px", textAlign:"center", color:T.muted}}>{p.shots ?? "-"}</span>
              <span style={{flex:"0 0 36px", textAlign:"center", color:T.muted}}>{p.tackles ?? "-"}</span>
              <span style={{flex:"0 0 40px", textAlign:"center", fontWeight:800,
                color: p.rating>=7.5 ? T.green : p.rating!=null && p.rating<6 ? T.red : T.text}}>
                {p.rating!=null ? p.rating.toFixed(1) : "-"}
              </span>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

function LiveLineupPanel({home, away, matchDate}) {
  const [lineup, setLineup] = useState(null);
  const [loading, setLoading] = useState(true);
  const [fromCache, setFromCache] = useState(false);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setFromCache(false);

    // 1) 저장된 기록 먼저 표시 (즉시)
    loadMatchDetail(home, away, matchDate).then(cached => {
      if (cancelled) return;
      if (cached) { setLineup(cached); setFromCache(true); }
    });

    // 2) ESPN에서 최신 데이터 조회 → 갱신 + 저장
    fetchLiveLineup(home, away, matchDate).then(result => {
      if (cancelled) return;
      if (result) {
        setLineup(result);
        setFromCache(false);
        saveMatchDetail(home, away, matchDate, result);
      }
      setLoading(false);
    }).catch(() => { if (!cancelled) setLoading(false); });

    return () => { cancelled = true; };
  }, [home, away, matchDate]);

  // 항상 정적 XI 폴백 준비
  const homeXi = SQUADS[home]?.xi || [];
  const awayXi = SQUADS[away]?.xi || [];
  const staticMatch = STATIC_MATCH_STATS[`${home}_${away}`] || null;
  const isLive = lineup?.confirmed && (lineup.home?.length || lineup.away?.length);
  const homeList = isLive ? lineup.home : homeXi;
  const awayList = isLive ? lineup.away : awayXi;
  const cards = lineup?.cards || { home: [], away: [] };
  const hasCards = cards.home.length > 0 || cards.away.length > 0;
  const subs = lineup?.subs || { home: [], away: [] };
  const hasSubs = subs.home.length > 0 || subs.away.length > 0;
  const pens = lineup?.penalties || { home: [], away: [] };
  const hasPens = pens.home.length > 0 || pens.away.length > 0;
  const ownGoals = lineup?.ownGoals || { home: [], away: [] };
  const hasOwnGoals = ownGoals.home.length > 0 || ownGoals.away.length > 0;
  const varEvents = lineup?.varEvents || [];
  const teamStats = staticMatch ? staticMatch.team : (lineup?.teamStats || { home:null, away:null });
  const hasTeamStats = !!(teamStats.home || teamStats.away);
  const hasDetailedTeamStats = !!staticMatch;
  const shootout = lineup?.shootout || null;
  const referee = lineup?.referee || null;
  const sourceLabel = lineup?.source === "espn" ? "ESPN" : lineup?.source === "football-data.org" ? "football-data.org" : null;

  return (
    <div style={{background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:14, marginTop:12}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8}}>
        <div style={{fontSize:13, fontWeight:700, color:T.text}}>👕 선발 라인업</div>
        {loading && !lineup ? (
          <span style={{fontSize:11, color:T.muted}}>⏳ 실시간 조회 중...</span>
        ) : isLive ? (
          <span style={{fontSize:11, color:T.green, fontWeight:700}}>
            🟢 확정 라인업 ({sourceLabel}){fromCache && loading ? " · 저장된 기록" : ""}
          </span>
        ) : (
          <span style={{fontSize:11, color:T.gold, fontWeight:700}}>📋 예상 XI (정적)</span>
        )}

// 🆕 v2 — 오류 경계 (ErrorBoundary) 컴포넌트
// ═══════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  render() {
    if (this.state.hasError) return (
      <div style={{background:"rgba(255,61,87,0.1)",border:`1px solid ${T.red}`,borderRadius:12,padding:14,margin:"10px 0",color:T.red,fontSize:12}}>
        ⚠️ 렌더링 오류: {this.state.error?.message || "알 수 없는 오류"}<br/>
        <button onClick={()=>this.setState({hasError:false,error:null})}
          style={{marginTop:8,padding:"6px 12px",borderRadius:8,border:`1px solid ${T.red}`,background:"transparent",color:T.red,cursor:"pointer",fontSize:11}}>
          다시 시도
        </button>
      </div>
    );
    return this.props.children;
  }
}

// 팀 목록 (SPI 순) / 그룹 매핑 — UI에서 사용
const ALL_TEAMS = Object.keys(SQUADS).sort((a,b)=> (SPI_RATINGS[b]?.spi||0) - (SPI_RATINGS[a]?.spi||0));
const GROUPS = (() => {
  const g = {};
  for (const [team, sq] of Object.entries(SQUADS)) {
    const grp = sq.group || "PO";
    if (!g[grp]) g[grp] = [];
    g[grp].push(team);
  }
  return g;
})();

const pct = x => (typeof x === "number" && !isNaN(x)) ? (x*100).toFixed(1)+"%" : "-";

function Card({children, style={}}) {
  return (
    <div style={{background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:14, ...style}}>
      {children}

function SectionTitle({children, sub}) {

function ProbBar({home, draw, away, homeLabel, awayLabel}) {
  const h = Math.max(0, home||0), d = Math.max(0, draw||0), a = Math.max(0, away||0);
  return (
    <div style={{marginTop:8}}>
      <div style={{display:"flex", height:12, borderRadius:7, overflow:"hidden", background:T.dim}}>
        <div style={{width:pct(h), background:T.accent}}/>

function PredictTab({home, away, setHome, setAway, sims, setSims,
                      result, loading, onPredict, onSave}) {
  const swap = () => { const h=home; setHome(away); setAway(h); };

  const matchInfo = useMemo(() => SCHEDULE.find(g =>
    (g.home===home && g.away===away) || (g.home===away && g.away===home)
  ), [home, away]);

  // 이미 결과가 있는 경기인지 확인
  const knownResult = useMemo(() => {
    const stored = getStoredResult(home, away);
    if (!stored) return null;
    const isSwapped = !!_liveResults[resultKey(away, home)] && !_liveResults[resultKey(home, away)];
    return { hg: isSwapped ? stored.away : stored.home, ag: isSwapped ? stored.home : stored.away, source: stored.source };
  }, [home, away]);

  return (
    <div>
      <Card>
        <div style={{display:"flex", gap:8, alignItems:"flex-end"}}>
          <GroupedTeamSelect value={home} onChange={setHome} label="🏠 홈팀" exclude={away}/>
          <button onClick={swap} title="교체" style={{padding:"10px 10px", borderRadius:9, background:T.surface,
                  border:`1px solid ${T.border}`, color:T.accent, fontSize:15, cursor:"pointer"}}>⇄</button>
          <GroupedTeamSelect value={away} onChange={setAway} label="✈️ 원정팀" exclude={home}/>
        </div>

        <div style={{marginTop:14}}>
          <div style={{display:"flex", justifyContent:"space-between", fontSize:11.5, color:T.muted}}>
            <span>몬테카를로 시뮬레이션 횟수</span>
            <span style={{color:T.text, fontWeight:700}}>{sims.toLocaleString()}회</span>
          </div>
          <input type="range" min="10000" max="100000" step="10000" value={sims}
                 onChange={e=>setSims(Number(e.target.value))} style={{width:"100%", marginTop:6}}/>
        </div>

        <button onClick={onPredict} disabled={loading || home===away}
          style={{width:"100%", marginTop:14, padding:"13px", borderRadius:10, border:"none",
                  background: (loading||home===away) ? T.dim : T.accent, color:"#fff",
                  fontSize:15, fontWeight:800, cursor: (loading||home===away)?"default":"pointer"}}>
          {loading ? "분석 중... (실시간 데이터 조회 포함)" : (home===away ? "서로 다른 팀을 선택하세요" : "🔮 예측 실행")}
        </button>

        {knownResult && (
          <div style={{marginTop:10, padding:"10px 14px", borderRadius:10,
            background:"rgba(0,200,83,0.12)", border:`1px solid ${T.green}`,
            display:"flex", alignItems:"center", justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:12, color:T.green, fontWeight:700}}>🏁 이미 종료된 경기</div>
              <div style={{fontSize:11, color:T.muted, marginTop:2}}>
                {knownResult.source === "manual" ? "✏️ 수동 입력" : "🤖 자동 조회"} 결과
              </div>
            </div>
            <div style={{fontSize:26, fontWeight:900, color:T.text, fontFamily:"monospace"}}>
              <span style={{color: knownResult.hg > knownResult.ag ? T.green : T.text}}>{knownResult.hg}</span>
              <span style={{color:T.dim}}> : </span>
              <span style={{color: knownResult.ag > knownResult.hg ? T.green : T.text}}>{knownResult.ag}</span>
            </div>
          </div>
        )}
      </Card>

      {result && (
        <>
          <Card style={{marginTop:12}}>
            <div style={{textAlign:"center", fontSize:17, fontWeight:800}}>
              {flag(home)} {home} <span style={{color:T.muted, fontWeight:400}}>vs</span> {away} {flag(away)}
            </div>
            {matchInfo && (
              <div style={{textAlign:"center", marginTop:6}}>
                <span style={{display:"inline-block", padding:"4px 12px", borderRadius:20, background:T.surface,
                              border:`1px solid ${T.border}`, fontSize:11.5, color:T.cyan, fontWeight:700}}>
                  📅 {matchInfo.date} {matchInfo.time} 경기
                </span>
              </div>
            )}
            <div style={{textAlign:"center", marginTop:8}}>
              {result.liveApplied ? (
                <span style={{display:"inline-block", padding:"5px 12px", borderRadius:20, background:"rgba(0,200,83,0.15)",
                              border:`1px solid ${T.green}`, fontSize:11.5, color:T.green, fontWeight:700}}>
                  🟢 실시간 연동 ({result.liveSources.join(", ")} · 가중치 {Math.round(result.liveWeight*100)}%)
                </span>
              ) : (
                <span style={{display:"inline-block", padding:"5px 12px", borderRadius:20, background:"rgba(245,166,35,0.15)",
                              border:`1px solid ${T.gold}`, fontSize:11.5, color:T.gold, fontWeight:700}}>
                  📁 정적 모델 (실시간 미연동 — 설정에서 프록시/키 확인)
                </span>
              )}
            </div>
            <ProbBar home={result.homeWinProb} draw={result.drawProb} away={result.awayWinProb} homeLabel={home} awayLabel={away}/>
            {result.liveApplied && result.staticProbs && (
              <div style={{fontSize:11, color:T.muted, marginTop:8, textAlign:"center"}}>
                정적 모델 기준: 홈 {pct(result.staticProbs.home)} · 무 {pct(result.staticProbs.draw)} · 원정 {pct(result.staticProbs.away)}
              </div>
            )}
          </Card>

          <Card style={{marginTop:12, textAlign:"center"}}>
            <SectionTitle sub="자체 모델이 가장 높은 확률로 예측한 단일 스코어">🎯 자체 분석 예상 스코어</SectionTitle>
            {(() => {
              const top = result.topScores?.[0];
              if (!top) return null;
              const [hg, ag] = top.score.split("-").map(Number);
              const { homeWinProb:hw, drawProb:dw, awayWinProb:aw } = result;
              const maxP = Math.max(hw, dw, aw);
              const favored = hw===maxP ? "home" : aw===maxP ? "away" : "draw";
              const favoredLabel = favored==="home" ? `${home} 승` : favored==="away" ? `${away} 승` : "무승부";
              const isDrawScore = hg === ag;
              const favWinScore = favored !== "draw"
                ? result.topScores.find(s => { const [h2,a2]=s.score.split("-").map(Number); return favored==="home"?h2>a2:a2>h2; })
                : null;
              return (
                <>
                  <div style={{fontSize:36, fontWeight:900, letterSpacing:1, marginTop:4}}>
                    <span style={{color:T.cyan}}>{hg}</span>
                    <span style={{color:T.muted, margin:"0 8px"}}>:</span>
                    <span style={{color:T.cyan}}>{ag}</span>
                  </div>
                  <div style={{fontSize:12, color:T.muted, marginTop:4}}>
                    {home} {hg} - {ag} {away} · 확률 {pct(top.prob)}
                  </div>
                  <div style={{marginTop:10, paddingTop:8, borderTop:`1px dashed ${T.border}`, fontSize:11.5, lineHeight:1.8}}>
                    <div style={{display:"flex", justifyContent:"space-around", marginBottom:6}}>
                      <span><b style={{color:T.accent}}>{home} 승</b><br/><span style={{fontSize:14, fontWeight:800, color:T.accent}}>{pct(hw)}</span></span>
                      <span><b style={{color:T.muted}}>무승부</b><br/><span style={{fontSize:14, fontWeight:800, color:T.muted}}>{pct(dw)}</span></span>
                      <span><b style={{color:T.gold}}>{away} 승</b><br/><span style={{fontSize:14, fontWeight:800, color:T.gold}}>{pct(aw)}</span></span>
                    </div>
                    <div style={{color:T.muted}}>
                      📊 결과 예측: <b style={{color:T.text}}>{favoredLabel}</b> 우세 ({pct(maxP)})
                      {isDrawScore && favored!=="draw" && (
                        <div style={{marginTop:4, fontSize:11}}>
                          💡 최빈 단일 스코어는 무승부지만, 전체 확률로는 {favoredLabel}가 더 높습니다
                          {favWinScore && ` (${favoredLabel} 시 유력: ${favWinScore.score} · ${pct(favWinScore.prob)})`}
                        </div>
                      )}
                    </div>
                  </div>
                </>
              );
            })()}
          </Card>


          <div style={{display:"flex", gap:10, marginTop:12}}>
            <Card style={{flex:1, textAlign:"center"}}>
              <div style={{fontSize:11.5, color:T.muted}}>예상 기대득점 (xG)</div>
              <div style={{fontSize:24, fontWeight:800, marginTop:4}}>{result.lambdaHome.toFixed(2)} : {result.lambdaAway.toFixed(2)}</div>
            </Card>
            <Card style={{flex:1, textAlign:"center"}}>
              <div style={{fontSize:11.5, color:T.muted}}>ELO (홈/원정)</div>
              <div style={{fontSize:24, fontWeight:800, marginTop:4}}>{Math.round(result.homeElo)} : {Math.round(result.awayElo)}</div>
            </Card>
          </div>

          <Card style={{marginTop:12}}>
            <SectionTitle>주요 예상 스코어라인 (Top 5)</SectionTitle>
            <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
              {result.topScores.map((s,i) => (
                <div key={s.score} style={{flex:"1 1 28%", minWidth:90}}>
                  <ScoreRow rank={i+1} score={`${s.score} (${pct(s.prob)})`} prob={s.prob} top={i===0}/>
                </div>
              ))}
            </div>
          </Card>

          <Card style={{marginTop:12}}>
            <SectionTitle sub="모델 예측 vs 실시간 시장 배당">오버/언더 (총 골수 기준)</SectionTitle>
            <div style={{display:"flex", gap:10}}>
              {["2.5","3.5"].map(line => {
                const ou = result.overUnder[line];
                const rec = ou && ou.over > ou.under ? "오버" : "언더";
                const recColor = rec === "오버" ? T.green : T.gold;
                const lineNum = parseFloat(line);
                const mktEntry = Array.isArray(result.marketTotals)
                  ? result.marketTotals.find(t => Math.abs(t.point - lineNum) < 0.01)
                  : null;
                const mktProb = mktEntry ? devigTotalsLine(mktEntry) : null;
                const evOver = mktEntry ? computeEV(ou?.over, mktEntry.over) : null;
                const evUnder = mktEntry ? computeEV(ou?.under, mktEntry.under) : null;
                const bestEv = (evOver != null && evUnder != null)
                  ? (evOver >= evUnder ? {label:"오버", ev:evOver, color:T.green} : {label:"언더", ev:evUnder, color:T.gold})
                  : null;
                return (
                  <div key={line} style={{flex:1, textAlign:"center"}}>
                    <div style={{fontSize:12, color:T.muted}}>라인 {line}</div>
                    <div style={{fontSize:14, fontWeight:700, marginTop:4}}>
                      <span style={{color:T.green}}>오버 {pct(ou?.over)}</span>{" "}
                      <span style={{color:T.gold}}>언더 {pct(ou?.under)}</span>
                    </div>
                    <div style={{marginTop:6, height:6, borderRadius:3, background:T.dim, overflow:"hidden"}}>
                      <div style={{height:"100%", width:pct(ou?.over), background:T.green}}/>
                    </div>
                    <span style={{display:"inline-block", marginTop:8, padding:"4px 12px", borderRadius:16,
                                  background: recColor+"26", border:`1px solid ${recColor}`, color:recColor, fontSize:11.5, fontWeight:800}}>
                      예측: {rec} {line}
                    </span>

                    {mktEntry ? (
                      <div style={{marginTop:10, paddingTop:8, borderTop:`1px dashed ${T.border}`}}>
                        <div style={{fontSize:10.5, color:T.muted}}>실시간 시장 배당</div>
                        <div style={{fontSize:12.5, fontWeight:800, marginTop:3}}>
                          <span style={{color:T.green}}>O {mktEntry.over.toFixed(2)}</span>{" "}
                          <span style={{color:T.gold}}>U {mktEntry.under.toFixed(2)}</span>
                        </div>
                        {mktProb && (
                          <div style={{fontSize:10.5, color:T.muted, marginTop:2}}>
                            시장확률 오버 {pct(mktProb.over)} · 언더 {pct(mktProb.under)}
                          </div>
                        )}
                        {bestEv && (
                          <div style={{fontSize:10.5, marginTop:4, fontWeight:800,
                            color: bestEv.ev > 0.03 ? bestEv.color : T.muted}}>
                            {bestEv.ev > 0.03 ? "💰 " : ""}{bestEv.label} EV {bestEv.ev>=0?"+":""}{(bestEv.ev*100).toFixed(1)}%
                          </div>
                        )}
                      </div>
                    ) : (
                      <div style={{marginTop:10, paddingTop:8, borderTop:`1px dashed ${T.border}`, fontSize:10.5, color:T.dim}}>
                        해당 라인 시장 배당 없음
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10.5, color:T.dim, marginTop:10}}>
              {result.marketTotals
                ? `📡 ${result.marketTotalsSource?.startsWith("the-odds-api") ? "The Odds API" : result.marketTotalsSource?.startsWith("API-Football") ? result.marketTotalsSource : "odds-api.io"} 실시간 오버/언더 배당 기준 · EV는 모델확률×시장배당-1`
                : "ℹ️ 이 경기의 실시간 오버/언더 배당을 찾지 못했습니다 (모델 예측만 표시). 설정탭에서 The Odds API 키 확인."}
            </div>
          </Card>

          {/* ── 핸디캡 확률 카드 (점수/오버언더와 한 묶음으로 표시) ── */}
          {result.handicapProbs && (
            <Card style={{marginTop:12}}>
              <SectionTitle sub="홈팀 기준 아시안 핸디캡 커버 확률">🎯 핸디캡 (Asian Handicap)</SectionTitle>
              <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                {Object.entries(result.handicapProbs).map(([h, prob]) => {
                  const isPos = prob > 0.55, isNeg = prob < 0.45;
                  const color = isPos ? T.green : isNeg ? T.red : T.muted;
                  return (
                    <div key={h} style={{flex:"1 1 22%", minWidth:70, textAlign:"center", padding:"8px 4px",
                      borderRadius:9, background:T.surface, border:`1px solid ${isPos?T.green:isNeg?T.red:T.border}`}}>
                      <div style={{fontSize:11, color:T.muted}}>홈 {h}</div>
                      <div style={{fontSize:15, fontWeight:800, color, marginTop:2}}>{pct(prob)}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:11, color:T.dim, marginTop:8}}>💡 홈팀이 해당 핸디캡을 극복할 확률. 50% 이상이면 홈팀 유리.</div>
            </Card>
          )}


          <div style={{textAlign:"center", marginTop:14, fontSize:12, color:T.muted, lineHeight:1.6}}>
            🎲 몬테카를로 {result.sims.toLocaleString()}회 · ELO+ML 앙상블 50% + 시뮬레이션 50% 블렌딩<br/>
            <span style={{fontSize:11, color:T.dim}}>v2: PSxG 골키퍼 보정 · 빅찬스 스큐 · 원정 피로도 반영</span>
          </div>

          {/* ── v3 신규: 실시간 선발 라인업 ── */}
          <ErrorBoundary>
            <LiveLineupPanel home={home} away={away} matchDate={matchInfo?.date || null}/>
          </ErrorBoundary>

          {/* ── v4 신규: 개인 기여도 (ESPN 통계) ── */}
          <ErrorBoundary>
            <PlayerContributionPanel home={home} away={away} matchDate={matchInfo?.date || null}/>
          </ErrorBoundary>

          {result.cv && <CrossValidationCard cv={result.cv} home={home} away={away} result={result}/>}

          {/* ── v2 신규: 고급 지표 비교 패널 ── */}
          <ErrorBoundary>
            <AdvancedStatsPanel home={home} away={away}/>
          </ErrorBoundary>

          {/* ── v3 신규: 심판 성향 패널 ── */}
          <ErrorBoundary>
            <RefereePanel home={home} away={away}/>
          </ErrorBoundary>

          {/* ── v3 신규: 원정 이동거리 & 피로도 시각화 ── */}
          <ErrorBoundary>
            <TravelFatigueCard home={home} away={away}/>
          </ErrorBoundary>

          {/* ── v2: 조별리그 실시간 순위 (로컬 계산) ── */}
          {RUNTIME_CONFIG.useFootballDataOrg && (
            <ErrorBoundary>
              <LiveStandingPanel home={home} away={away}/>
            </ErrorBoundary>
          )}

          {/* ── Value Bet (EV) 카드 ── */}
          {result.liveApplied && result.marketProbs && (() => {
            const mp = result.marketProbs;
            const evH = computeEV(result.homeWinProb, mp.home > 0 ? 1/mp.home : null);
            const evD = computeEV(result.drawProb, mp.draw > 0 ? 1/mp.draw : null);
            const evA = computeEV(result.awayWinProb, mp.away > 0 ? 1/mp.away : null);
            const hasValue = evH > 0.03 || evD > 0.03 || evA > 0.03;
            return (
              <Card style={{marginTop:12}}>
                <SectionTitle sub="내 모델 vs 시장 배당 기대수익 (양수=가치 베팅 기회)">💰 Value Bet 분석 (EV)</SectionTitle>
                <div style={{display:"flex", gap:10}}>
                  {[
                    {label:`${flag(home)} 홈승`, ev:evH, color:T.accent},
                    {label:"무승부", ev:evD, color:T.muted},
                    {label:`원정승 ${flag(away)}`, ev:evA, color:T.gold},
                  ].map(({label, ev, color}) => (
                    <div key={label} style={{flex:1, textAlign:"center", padding:"10px 4px",
                      borderRadius:9, background:T.surface,
                      border:`1px solid ${ev!==null && ev>0.03 ? T.green : T.border}`}}>
                      <div style={{fontSize:11, color:T.muted}}>{label}</div>
                      <div style={{fontSize:15, fontWeight:800, marginTop:4,
                        color: ev===null?"gray" : ev>0.03?T.green : ev<-0.03?T.red : T.text}}>
                        {ev===null ? "-" : `${ev>=0?"+":""}${(ev*100).toFixed(1)}%`}
                      </div>
                    </div>
                  ))}
                </div>
                {hasValue && <div style={{marginTop:8, fontSize:11.5, color:T.green, fontWeight:700}}>✅ 모델이 시장보다 유리하게 평가하는 베팅이 있습니다.</div>}
                <div style={{fontSize:11, color:T.dim, marginTop:4}}>⚠️ 참고용입니다. 실제 베팅 판단에 단독으로 사용하지 마세요.</div>
              </Card>
            );
          })()}

          {/* ── 휴식일 / 동기부여 보정 정보 ── */}
          {result.restInfo && matchInfo && (
            <Card style={{marginTop:12}}>
              <SectionTitle>📅 경기 컨디션 보정</SectionTitle>
              {[
                {team:home, rest:result.restInfo.homeRestBonus, mot:result.restInfo.homeMotivation},
                {team:away, rest:result.restInfo.awayRestBonus, mot:result.restInfo.awayMotivation},
              ].map(({team, rest, mot}) => {
                const days = getRestDays(team, matchInfo.date);
                return (
                  <div key={team} style={{display:"flex", justifyContent:"space-between", alignItems:"center",
                    padding:"8px 0", borderBottom:`1px solid ${T.border}`}}>
                    <span style={{fontSize:13, fontWeight:700}}>{flag(team)} {team}</span>
                    <span style={{fontSize:12, color:T.muted}}>
                      휴식 {days!==null?`${days.toFixed(0)}일`:"첫 경기"}
                      <span style={{color: rest>0?T.green:rest<0?T.red:T.muted, fontWeight:700, marginLeft:6}}>
                        {rest>0?`+${(rest*100).toFixed(0)}%`:rest<0?`${(rest*100).toFixed(0)}%`:"±0"}
                      </span>
                      {" · 동기"}
                      <span style={{color: mot>1.0?T.cyan:T.muted, fontWeight:700, marginLeft:4}}>
                        {mot>1.0?`+${((mot-1)*100).toFixed(0)}%`:"기본"}
                      </span>
                    </span>
                  </div>
                );
              })}
            </Card>
          )}

          <Card style={{marginTop:12}}>
            <SectionTitle>💾 예측 저장 &amp; 결과 추적</SectionTitle>
            <div style={{fontSize:12, color:T.muted, marginBottom:10}}>
              저장하면 "기록" 탭에서 실제 경기 결과를 입력해 적중 여부를 추적하고, 동적 ELO에도 반영할 수 있어요.
            </div>
            <button onClick={onSave} style={{width:"100%", padding:"10px", borderRadius:9,
                    border:`1px solid ${T.border}`, background:T.surface, color:T.cyan, fontSize:13, fontWeight:700, cursor:"pointer"}}>
              📌 이 예측 저장하기
            </button>
          </Card>
        </>
      )}
    </div>
  );
}

// 🔬 교차검증 (Opta / 시장배당 / API예측 / SPI) — 2x2 그리드 + 신뢰도/편차
function CrossValidationCard({cv, home, away, result}) {
  const Box = ({title, probs, empty}) => (
    <div style={{background:T.surface, border:`1px solid ${T.border}`, borderRadius:10, padding:10}}>
      <div style={{fontSize:11.5, color:T.muted, marginBottom:6}}>{title}</div>
      {probs ? (
        <div style={{fontSize:12.5, lineHeight:1.7}}>
          <span style={{color:T.accent, fontWeight:700}}>{flag(home)} {pct(probs.home)}</span> · 무 {pct(probs.draw)} ·{" "}
          <span style={{color:T.gold, fontWeight:700}}>{pct(probs.away)} {flag(away)}</span>
        </div>
      ) : (
        <div style={{fontSize:12, color:T.dim}}>{empty}</div>
      )}
    </div>
  );
  return (
    <Card style={{marginTop:12}}>
      <SectionTitle sub="외부 랭킹/배당/ML예측을 자체 모델과 비교합니다">🔬 교차검증 (Opta / 시장배당 / API예측 / SPI)</SectionTitle>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
        <Box title="Opta 파워랭킹" probs={cv.opta} empty="데이터 없음"/>
        <Box title="시장 배당 (마진제거)" probs={cv.market} empty={result.liveApplied ? "데이터 없음" : "실시간 배당 미연동"}/>
        <Box title="API 예측 (API-Football/BSD)" probs={cv.apiFootball} empty={result.liveApplied ? "이 경기 데이터 없음" : "미연동 (설정에서 확인)"}/>
        <Box title="SPI (정적)" probs={cv.spi} empty="데이터 없음"/>
      </div>
      <div style={{marginTop:12}}>
        <div style={{display:"flex", justifyContent:"space-between", fontSize:12, color:T.muted}}>
          <span>모델 신뢰도</span>
          <span style={{color:T.gold, fontWeight:800}}>{cv.confidence}/100</span>
        </div>
        <div style={{marginTop:5, height:6, borderRadius:3, background:T.dim, overflow:"hidden"}}>
          <div style={{height:"100%", width:`${cv.confidence}%`, background: cv.confidence>=60?T.green : cv.confidence>=35?T.gold : T.red}}/>
        </div>
      </div>
      {cv.deviation != null && (
        <div style={{display:"flex", justifyContent:"space-between", marginTop:8, fontSize:12, color:T.muted}}>
          <span>모델 vs 컨센서스 편차</span>
          <span style={{color:T.text, fontWeight:700}}>{pct(cv.deviation)}p</span>
        </div>
      )}
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════
// 📅 일정 탭 — 종료 경기 결과 표시 + 자동 조회
// ═══════════════════════════════════════════════════════════
function ScheduleTab({onSelectMatch, liveResults, onResultFetched}) {
  // UTC 기준 toISOString()은 한국(UTC+9) 새벽에 전날 날짜가 나옴 → 로컬 기준 사용
  const d = new Date();
  const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const [fetchingKey, setFetchingKey] = useState(null);
  const [manualScores, setManualScores] = useState({});

  const byDate = useMemo(() => {
    const m = {};
    for (const g of SCHEDULE) {
      if (!m[g.date]) m[g.date] = [];
      m[g.date].push(g);
    }
    return Object.entries(m).sort((a,b)=> a[0]<b[0]?-1:1);
  }, []);

  const isPast = (date) => date < today;
  const isToday = (date) => date === today;

  const handleAutoFetch = async (g) => {
    const key = resultKey(g.home, g.away);
    setFetchingKey(key);
    const res = await autoFetchAndStoreResult(g.home, g.away, g.date).catch(()=>null);
    setFetchingKey(null);
    if (res) onResultFetched();
  };

  const handleManualInput = (g, field, val) => {
    const key = resultKey(g.home, g.away);
    setManualScores(prev => ({...prev, [key]: {...(prev[key]||{}), [field]: val}}));
  };

  const handleManualSave = async (g) => {
    const key = resultKey(g.home, g.away);
    const sc = manualScores[key];
    if (!sc || sc.hg === undefined || sc.ag === undefined || sc.hg === "" || sc.ag === "") return;
    setStoredResult(g.home, g.away, Number(sc.hg), Number(sc.ag), "manual");
    await saveLiveResults();
    // ELO 자동 갱신
    updateEloAfterMatch(g.home, g.away, Number(sc.hg), Number(sc.ag), undefined, undefined, "group");
    await saveDynamicElo();
    onResultFetched();
  };

  return (
    <div>
      <Card>
        <div style={{fontSize:12.5, color:T.muted, lineHeight:1.6}}>
          2026 FIFA 월드컵 조별리그 일정 (총 {SCHEDULE.length}경기).
          <span style={{color:T.green, fontWeight:700}}> 종료 경기</span>는 결과를 자동 조회하거나 직접 입력할 수 있습니다.
        </div>
      </Card>
      {byDate.map(([date, games]) => {
        const past = isPast(date), todayFlag = isToday(date);
        return (
          <Card key={date} style={{marginTop:10}}>
            <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
              <span style={{fontSize:12.5, fontWeight:800, color: todayFlag?T.gold:past?T.muted:T.cyan}}>
                📆 {date}
              </span>
              {todayFlag && <span style={{fontSize:11, padding:"2px 8px", borderRadius:10, background:"rgba(245,166,35,0.2)", color:T.gold, fontWeight:700}}>오늘</span>}
              {past && <span style={{fontSize:11, color:T.dim}}>종료</span>}
            </div>
            {games.map((g,i) => {
              const key = resultKey(g.home, g.away);
              const stored = getStoredResult(g.home, g.away);
              const isFetching = fetchingKey === key;
              const ms = manualScores[key] || {};

              if ((past || todayFlag) && stored) {
                // 결과 있음 — 스코어 표시
                const isSwapped = !!_liveResults[resultKey(g.away, g.home)] && !_liveResults[resultKey(g.home, g.away)];
                const hg = isSwapped ? stored.away : stored.home;
                const ag = isSwapped ? stored.home : stored.away;
                const homeWon = hg > ag, awayWon = ag > hg;
                return (
                  <div key={i} style={{borderTop: i>0?`1px solid ${T.border}`:"none", padding:"9px 0"}}>
                    <div style={{display:"flex", alignItems:"center", gap:6}}>
                      <span style={{fontSize:11, color:T.muted, width:46}}>{g.time}</span>
                      <span style={{flex:1, fontSize:13, fontWeight: homeWon?800:400, color: homeWon?T.text:T.muted}}>
                        {flag(g.home)} {g.home}
                      </span>
                      <span style={{fontSize:16, fontWeight:900, color:T.text, minWidth:52, textAlign:"center"}}>
                        <span style={{color: homeWon?T.green:T.text}}>{hg}</span>
                        <span style={{color:T.dim}}> : </span>
                        <span style={{color: awayWon?T.green:T.text}}>{ag}</span>
                      </span>
                      <span style={{flex:1, fontSize:13, fontWeight: awayWon?800:400, color: awayWon?T.text:T.muted, textAlign:"right"}}>
                        {g.away} {flag(g.away)}
                      </span>
                      <span style={{fontSize:10, color:T.dim, marginLeft:4}}>{stored.source==="manual"?"✏️":"🤖"}</span>
                    </div>
                  </div>
                );
              }

              if (past || todayFlag) {
                // 경기 시작 시간 체크 — 아직 시작 전이면 결과 입력 버튼 안 보임
                const [hh, mm] = (g.time || "00:00").split(":").map(Number);
                const now = new Date();
                const gameStart = new Date(date + "T" + String(hh).padStart(2,"0") + ":" + String(mm||0).padStart(2,"0") + ":00");
                // 경기 시작 후 최소 100분(90분 경기 + 10분 버퍼)은 지나야 결과 입력 가능
                const gameStarted = (now - gameStart) > 100 * 60 * 1000;

                if (!gameStarted) {
                  // 아직 시작 전 or 진행 초반 — 예측 버튼만 표시
                  return (
                    <div key={i} style={{borderTop: i>0?`1px solid ${T.border}`:"none", padding:"9px 0"}}>
                      <div style={{display:"flex", alignItems:"center", gap:6}}>
                        <span style={{fontSize:11, color:T.muted, width:46}}>{g.time}</span>
                        <span style={{flex:1, fontSize:13, color:T.muted}}>{flag(g.home)} {g.home}</span>
                        <span style={{fontSize:13, color:T.dim, padding:"0 8px"}}>vs</span>
                        <span style={{flex:1, fontSize:13, color:T.muted, textAlign:"right"}}>{g.away} {flag(g.away)}</span>
                        <button onClick={()=>onSelectMatch(g.home, g.away)}
                          style={{padding:"5px 10px", borderRadius:7, border:"none",
                            background:T.accent, color:"#fff", fontSize:12, cursor:"pointer"}}>▶</button>
                      </div>
                    </div>
                  );
                }

                // 결과 없음 — 자동조회 or 수동 입력
                return (
                  <div key={i} style={{borderTop: i>0?`1px solid ${T.border}`:"none", padding:"9px 0"}}>
                    <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:6}}>
                      <span style={{fontSize:11, color:T.muted, width:46}}>{g.time}</span>
                      <span style={{flex:1, fontSize:13, color:T.muted}}>{flag(g.home)} {g.home} vs {g.away} {flag(g.away)}</span>
                    </div>
                    <div style={{display:"flex", gap:6, alignItems:"center", paddingLeft:46}}>
                      <button onClick={()=>handleAutoFetch(g)} disabled={isFetching}
                        style={{padding:"5px 10px", borderRadius:7, border:`1px solid ${T.green}`,
                          background:"transparent", color:T.green, fontSize:11, fontWeight:700, cursor:"pointer"}}>
                        {isFetching ? "⏳" : "🤖 자동"}
                      </button>
                      <input type="number" min="0" max="20" placeholder="홈" value={ms.hg??""} onChange={e=>handleManualInput(g,"hg",e.target.value)}
                        style={{width:40,padding:"5px",borderRadius:7,background:T.surface,border:`1px solid ${T.border}`,color:T.text,textAlign:"center",fontSize:13}}/>
                      <span style={{color:T.dim}}>:</span>
                      <input type="number" min="0" max="20" placeholder="원정" value={ms.ag??""} onChange={e=>handleManualInput(g,"ag",e.target.value)}
                        style={{width:40,padding:"5px",borderRadius:7,background:T.surface,border:`1px solid ${T.border}`,color:T.text,textAlign:"center",fontSize:13}}/>
                      <button onClick={()=>handleManualSave(g)}
                        style={{padding:"5px 10px", borderRadius:7, border:`1px solid ${T.accent}`,
                          background:"transparent", color:T.accent, fontSize:11, fontWeight:700, cursor:"pointer"}}>
                        ✏️ 저장
                      </button>
                    </div>
                  </div>
                );
              }

              // 미래 경기 — 클릭하면 예측으로
              return (
                <button key={i} onClick={()=>onSelectMatch(g.home, g.away)}
                  style={{display:"flex", alignItems:"center", width:"100%", background:"transparent", border:"none",
                          borderTop: i>0?`1px solid ${T.border}`:"none", padding:"9px 0", cursor:"pointer", color:T.text, textAlign:"left"}}>
                  <span style={{fontSize:11, color:T.muted, width:46}}>{g.time}</span>
                  <span style={{flex:1, fontSize:13.5, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                    <span>{flag(g.home)} {g.home}</span>
                    <span style={{color:T.muted, fontSize:11, margin:"0 6px"}}>vs</span>
                    <span style={{textAlign:"right"}}>{g.away} {flag(g.away)}</span>
                  </span>
                  <span style={{color:T.accent, fontSize:12, marginLeft:8}}>▶</span>
                </button>
              );
            })}
          </Card>
        );
      })}
    </div>
  );
}

// 👥 스쿼드 탭

function PlayerChips({names, xi}) {
  if (!names || !names.length) return <span style={{color:T.muted, fontSize:12}}>정보 없음</span>;
  return (
    <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
      {names.map(n => {
        const isXi = xi && xi.includes(n);
        return (
          <span key={n} style={{fontSize:12, padding:"4px 9px", borderRadius:8,
                background: isXi ? "rgba(41,121,255,0.18)" : T.surface,
                border: `1px solid ${isXi ? T.accent : T.border}`,
                color: isXi ? T.accent : T.muted, fontWeight: isXi ? 700 : 400}}>
            {n}
          </span>
        );
      })}
    </div>
  );
}

// 📰 팀 관련 최신 뉴스(부상/라인업) 헤드라인 패널 — 구글뉴스 RSS 자동조회
function NewsHeadlinesPanel({team}) {
  const [items, setItems] = useState(null); // null=로딩, []=결과없음/실패

  useEffect(() => {
    let alive = true;
    setItems(null);
    fetchTeamNews(team).then(r => { if (alive) setItems(r); });
    return () => { alive = false; };
  }, [team]);

  return (
    <div style={{marginTop:12, paddingTop:10, borderTop:`1px solid ${T.border}`}}>
      <div style={{fontSize:12, color:T.muted, marginBottom:6}}>📰 {team} 관련 최신 뉴스 (부상/라인업 자동조회)</div>
      {items === null ? (
        <div style={{fontSize:11.5, color:T.dim}}>불러오는 중...</div>
      ) : items.length === 0 ? (
        <div style={{fontSize:11.5, color:T.dim}}>관련 뉴스를 찾지 못했습니다. 직접 검색해 보시는 게 좋아요.</div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:7}}>
          {items.map((it,i) => (
            <a key={i} href={it.link} target="_blank" rel="noopener noreferrer"
               style={{fontSize:12, color:T.cyan, textDecoration:"none", lineHeight:1.4, display:"block"}}>
              · {it.title}
              {it.source ? <span style={{color:T.dim, fontSize:10.5}}> ({it.source})</span> : null}
            </a>
          ))}
        </div>
      )}
      <div style={{fontSize:10, color:T.dim, marginTop:6}}>※ 구글뉴스 자동검색 결과로, 관련 없는 기사가 섞일 수 있습니다.</div>
    </div>
  );
}

// 🚑 API-Football 부상/결장 패널 — 팀별 표시 + 갱신 버튼
function ApiFootballInjuriesPanel({team}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => { loadApiFootballInjuries().then(setData); }, []);

  const refresh = async () => {
    setLoading(true);
    try {
      const d = await fetchApiFootballInjuries(true);
      setData(d);
    } finally { setLoading(false); }
  };

  if (!RUNTIME_CONFIG.apiFootballKey) return null;
  const list = data?.byTeam?.[team] || [];
  const lastFetch = data?.lastFetch ? new Date(data.lastFetch) : null;

  return (
    <div style={{marginTop:12, paddingTop:10, borderTop:`1px solid ${T.border}`}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
        <span style={{fontSize:12, fontWeight:700, color:T.text}}>🚑 API-Football 부상/결장 (자동)</span>
        <button onClick={refresh} disabled={loading}
          style={{padding:"5px 10px", borderRadius:7, border:"none", background:T.cyan, color:"#001018",
            fontWeight:700, fontSize:11, cursor: loading ? "default" : "pointer", opacity: loading ? 0.7 : 1}}>
          {loading ? "⏳ 갱신 중..." : "🔄 갱신"}
        </button>
      </div>
      {list.length > 0 ? (
        <div style={{display:"flex", flexDirection:"column", gap:4}}>
          {list.map((p, i) => (
            <div key={i} style={{fontSize:12, color:T.red}}>
              {p.name} <span style={{color:T.muted}}>— {p.type === "Suspension" ? "징계" : "부상"}{p.reason ? ` (${p.reason})` : ""}</span>
            </div>
          ))}
        </div>
      ) : (
        <div style={{fontSize:11.5, color:T.muted}}>
          {data?.lastFetch ? "현재 API-Football에 등록된 부상/결장 없음" : "아직 갱신 안 됨 — \"🔄 갱신\" 버튼을 눌러보세요"}
        </div>
      )}
      {lastFetch && (
        <div style={{fontSize:10, color:T.dim, marginTop:6}}>
          마지막 갱신: {lastFetch.toLocaleString("ko-KR")} (4시간마다 자동 업데이트되는 데이터)
        </div>
      )}
    </div>
  );
}

function SquadTab({team, setTeam}) {
  const sq = SQUADS[team];
  const elo = ELO[team];
  const spi = SPI_RATINGS[team];
  const [injuryInput, setInjuryInput] = useState("");
  const [customInj, setCustomInj] = useState(() => getCustomInjuries(team));

  useEffect(() => { setCustomInj(getCustomInjuries(team)); setInjuryInput(""); }, [team]);

  const handleAddInjury = async () => {
    const t = injuryInput.trim();
    if (!t) return;
    await addCustomInjury(team, t);
    setCustomInj(getCustomInjuries(team));
    setInjuryInput("");
  };
  const handleRemoveInjury = async (idx) => {
    await removeCustomInjury(team, idx);
    setCustomInj(getCustomInjuries(team));
  };

  return (
    <div>
      <Card>
        <GroupedTeamSelect value={team} onChange={setTeam} label="국가 선택"/>
      </Card>

      {sq && (
        <>
          <Card style={{marginTop:10}}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <span style={{fontSize:32}}>{flag(team)}</span>
              <div>
                <div style={{fontSize:17, fontWeight:800}}>{team}</div>
                <div style={{fontSize:12, color:T.muted}}>
                  {sq.group === "PO" ? "예선/플레이오프" : `${sq.group}조`} · {sq.formation} · 감독 {sq.coach}
                </div>
              </div>
            </div>
            <div style={{display:"flex", gap:14, marginTop:12, fontSize:12}}>
              {spi && <div><span style={{color:T.muted}}>SPI </span><b style={{color:T.gold}}>{spi.spi.toFixed(1)}</b></div>}
              {elo && <div><span style={{color:T.muted}}>ELO </span><b style={{color:T.cyan}}>{Math.round(compositeElo(team))}</b></div>}
              {elo && <div><span style={{color:T.muted}}>xG </span><b>{elo.xG.toFixed(2)}</b></div>}
              {elo && <div><span style={{color:T.muted}}>xGA </span><b>{elo.xGA.toFixed(2)}</b></div>}
            </div>
          </Card>

          <Card style={{marginTop:10}}>
            <SectionTitle sub={`예상 포메이션 ${sq.formation} 선발 11명 (파란색 강조)`}>⭐ 베스트 일레븐</SectionTitle>
            <PlayerChips names={sq.xi} xi={sq.xi}/>
          </Card>

          <Card style={{marginTop:10}}>
            <SectionTitle>🧤 골키퍼</SectionTitle>
            <PlayerChips names={sq.gk} xi={sq.xi}/>
            <SectionTitle>🛡️ 수비수</SectionTitle>
            <PlayerChips names={sq.df} xi={sq.xi}/>
            <SectionTitle>⚙️ 미드필더</SectionTitle>
            <PlayerChips names={sq.mf} xi={sq.xi}/>
            <SectionTitle>🎯 공격수</SectionTitle>
            <PlayerChips names={sq.fw} xi={sq.xi}/>
          </Card>

          <Card style={{marginTop:10}}>
            <SectionTitle sub="확인한 부상/결장 정보를 직접 추가·삭제할 수 있어요">🚑 부상 / 결장 현황</SectionTitle>
            {sq.injured?.length ? (
              <div style={{fontSize:12.5, color:T.red, lineHeight:1.8}}>
                {sq.injured.join(" · ")}
              </div>
            ) : null}
            {sq.keyOut?.length ? (
              <div style={{fontSize:11.5, color:T.muted, marginTop: sq.injured?.length ? 8 : 0}}>
                핵심 결장: {sq.keyOut.join(", ")}
              </div>
            ) : null}
            {(!sq.injured?.length && !sq.keyOut?.length && !customInj.length) ? (
              <div style={{fontSize:12.5, color:T.muted}}>등록된 부상/결장 정보 없음</div>
            ) : null}

            {customInj.length > 0 && (
              <div style={{marginTop:8, display:"flex", flexDirection:"column", gap:5}}>
                {customInj.map((txt, i) => (
                  <div key={i} style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:8}}>
                    <span style={{fontSize:12.5, color:T.red}}>+ {txt}</span>
                    <button onClick={()=>handleRemoveInjury(i)}
                      style={{background:"none", border:"none", color:T.dim, fontSize:14, padding:"0 4px", cursor:"pointer", lineHeight:1}}>✕</button>
                  </div>
                ))}

            <div style={{display:"flex", gap:6, marginTop:10}}>
