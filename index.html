const ALL_TEAMS = Object.keys(SQUADS).sort((a,b)=>a.localeCompare(b,"ko"));
const SIM_OPTIONS = [10000, 30000, 50000, 100000];
// ═══════════════════════════════════════════════════════════
// ⚙️ SettingsPanel — 프록시 / API 키 / 라이브 가중치 설정
// ═══════════════════════════════════════════════════════════
function SettingsPanel() {
  const [cfg, setCfg] = useState({ ...RUNTIME_CONFIG });
  const [status, setStatus] = useState(null); // null|saving|saved
  const [testStatus, setTestStatus] = useState(null); // null|testing|ok|fail
  const [diagSteps, setDiagSteps] = useState(null);
  const [diagRunning, setDiagRunning] = useState(false);

  useEffect(() => { loadRuntimeConfig().then(c => setCfg({ ...c })); }, []);

  const update = (k, v) => setCfg(prev => ({ ...prev, [k]: v }));

  const handleSave = async () => {
    setStatus("saving");
    await saveRuntimeConfig(cfg);
    setStatus("saved");
    setTimeout(() => setStatus(null), 2000);
  };

  // 연결 테스트: API-Football status 엔드포인트 호출
  const handleTest = async () => {
    setTestStatus("testing");
    await saveRuntimeConfig(cfg); // 현재 입력값으로 먼저 적용
    const data = await apiFootball("status", 6000);
    setTestStatus(data?.response ? "ok" : "fail");
  };

  // ★ 상세 진단: 프록시별/키/fixture/예측/배당 단계별 점검
  const handleDiagnose = async () => {
    setDiagRunning(true);
    setDiagSteps(null);
    await saveRuntimeConfig(cfg);
    const steps = await runDiagnostics();
    setDiagSteps(steps);
    setDiagRunning(false);
  };

  const field = (label, key, placeholder, type="text") => (
    <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:12, color:T.muted, marginBottom:4 }}>{label}</div>
      <input type={type} value={cfg[key] ?? ""} onChange={e=>update(key, e.target.value)}
        placeholder={placeholder}
        style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:`1px solid ${T.border}`,
          background:T.bg, color:T.text, fontSize:12, boxSizing:"border-box", fontFamily:"monospace" }}/>
    </div>
  );

  return (
    <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:16 }}>
      <div style={{ fontSize:14, fontWeight:800, color:T.text, marginBottom:4 }}>⚙️ 실시간 연동 설정</div>
      <div style={{ fontSize:11, color:T.muted, marginBottom:14, lineHeight:1.5 }}>
        브라우저는 외부 API 직접 호출을 CORS로 차단합니다. 아래 <b>CORS 프록시</b>를 거쳐야 실시간 데이터가 들어옵니다.
        프록시를 비우면 정적 모델로만 동작합니다.
      </div>

      <div style={{ background:"#3a2a1a", border:`1px solid ${T.gold}`, borderRadius:8, padding:10, marginBottom:14, fontSize:11, color:T.gold, lineHeight:1.5 }}>
        ⚠️ 이 화면의 키는 기기에 저장되며, 아티팩트 코드에도 남습니다. 유출이 우려되면 발급처에서 키를 교체하세요.
      </div>

      {field("CORS 프록시 URL", "corsProxy", "https://corsproxy.io/?url=")}
      <div style={{ fontSize:10, color:T.dim, marginTop:-8, marginBottom:12 }}>
        추천: https://corsproxy.io/?url= · https://api.allorigins.win/raw?url= (프록시는 불안정할 수 있음)
      </div>

      {field("API-Football 키", "footballApiKey", "afb988...")}
      {field("API-Football 호스트", "footballApiHost", "v3.football.api-sports.io")}
      {field("The Odds API 키 (선택)", "oddsApiKey", "실시간 배당용 — the-odds-api.com")}
      {field("OpenWeatherMap 키 (선택)", "weatherApiKey", "날씨용")}

      <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0", padding:"10px", background:T.surface, borderRadius:8 }}>
        <input type="checkbox" checked={!!cfg.useLiveOdds} onChange={e=>update("useLiveOdds", e.target.checked)} id="useLive"/>
        <label htmlFor="useLive" style={{ fontSize:12, color:T.text, flex:1 }}>실시간 배당/예측을 예측 스코어에 반영</label>
      </div>

      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:12, color:T.muted, marginBottom:6 }}>
          실시간 가중치: <b style={{color:T.cyan}}>{Math.round((cfg.liveOddsWeight ?? 0.35)*100)}%</b>
          <span style={{ color:T.dim, fontSize:10 }}> (높을수록 시장/배당을 더 따름)</span>
        </div>
        <input type="range" min="0" max="0.8" step="0.05" value={cfg.liveOddsWeight ?? 0.35}
          onChange={e=>update("liveOddsWeight", parseFloat(e.target.value))}
          style={{ width:"100%" }}/>
      </div>

      <div style={{ display:"flex", gap:8 }}>
        <button onClick={handleSave} disabled={status==="saving"}
          style={{ flex:1, background:T.accent, color:"#fff", border:"none", borderRadius:8, padding:"10px", fontWeight:700, cursor:"pointer", fontSize:13 }}>
          {status==="saving" ? "저장 중..." : status==="saved" ? "✓ 저장됨" : "설정 저장"}
        </button>
        <button onClick={handleTest} disabled={testStatus==="testing"}
          style={{ flex:1, background:T.green, color:"#fff", border:"none", borderRadius:8, padding:"10px", fontWeight:700, cursor:"pointer", fontSize:13 }}>
          {testStatus==="testing" ? "테스트 중..." : "연결 테스트"}
        </button>
      </div>

      {testStatus==="ok" && <div style={{ marginTop:10, textAlign:"center", color:T.green, fontSize:12 }}>✅ API-Football 연결 성공 — 실시간 데이터 사용 가능</div>}
      {testStatus==="fail" && <div style={{ marginTop:10, textAlign:"center", color:T.red, fontSize:12 }}>❌ 연결 실패 — 프록시 URL/키 확인. 프록시가 다운됐을 수 있으니 다른 프록시로 교체해보세요.</div>}

      {/* ★ 상세 진단 */}
      <button onClick={handleDiagnose} disabled={diagRunning}
        style={{ width:"100%", marginTop:10, background:T.surface, border:`1px solid ${T.border}`, color:T.cyan,
          borderRadius:8, padding:"10px", fontWeight:700, cursor:"pointer", fontSize:13 }}>
        {diagRunning ? "진단 중... (10~20초 소요)" : "🔍 상세 진단 실행 (대한민국 vs 체코 기준)"}
      </button>

      {diagSteps && (
        <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:6 }}>
          {diagSteps.map((s, i) => (
            <div key={i} style={{
              background:T.surface, border:`1px solid ${s.ok===true?T.green:s.ok===false?T.red:T.border}`,
              borderRadius:8, padding:"8px 10px", fontSize:11
            }}>
              <div style={{ fontWeight:700, color: s.ok===true?T.green:s.ok===false?T.red:T.muted }}>
                {s.ok===true ? "✅" : s.ok===false ? "❌" : "⚪"} {s.step}
              </div>
              <div style={{ color:T.muted, marginTop:2, wordBreak:"break-all" }}>{s.detail}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop:16, paddingTop:14, borderTop:`1px solid ${T.border}`, fontSize:11, color:T.muted, lineHeight:1.6 }}>
        <b style={{color:T.text}}>📌 이 키로 가져오는 실시간 데이터</b><br/>
        · 종료/진행 경기 스코어 (적중 판정)<br/>
        · API-Football 자체 승무패 예측 (교차검증)<br/>
        · 라이브 스쿼드·부상자 (팀정보 탭)<br/>
        · 시장 배당 (The Odds API 키 입력 시)<br/>
        <span style={{ color:T.dim }}>Understat·Opta·FBref는 로그인 없이 공개 데이터를 참고 사이트에서 직접 확인하세요.</span>
      </div>
    </div>
  );
}

const MAIN_TABS = [
  { id:"predict",  label:"⚡ 예측" },
  { id:"schedule", label:"📅 일정" },
  { id:"history",  label:"📜 예측기록" },
  { id:"teams",    label:"🪪 팀정보" },
  { id:"settings", label:"⚙️ 설정" },
];

function App() {
  const [tab, setTab] = useState("predict");
  const [home, setHome] = useState("브라질");
  const [away, setAway] = useState("프랑스");
  const [sims, setSims] = useState(30000);
  const [modalTeam, setModalTeam] = useState(null);
  const [historyRefresh, setHistoryRefresh] = useState(0);
  const [teamSearch, setTeamSearch] = useState("");
  const [matchDate, setMatchDate] = useState(null); // 일정에서 선택한 경기 날짜 (API 결과 조회 정확도↑)
  const [configReady, setConfigReady] = useState(false);

  // 앱 시작 시 저장된 런타임 설정(프록시/키) 로드
  useEffect(() => {
    loadRuntimeConfig().finally(() => setConfigReady(true));
  }, []);

  const handleScheduleSelect = useCallback((m) => {
    setHome(m.home); setAway(m.away); setMatchDate(m.date || null); setTab("predict");
  }, []);
  const handleSaved = useCallback(() => setHistoryRefresh(k => k+1), []);

  const filteredTeams = useMemo(() => {
    const q = teamSearch.trim();
    if (!q) return ALL_TEAMS;
    return ALL_TEAMS.filter(t => t.includes(q));
  }, [teamSearch]);

  const groupedSchedule = useMemo(() => {
    const groups = {};
    for (const m of SCHEDULE) {
      if (!groups[m.date]) groups[m.date] = [];
      groups[m.date].push(m);
    }
    return Object.entries(groups);
  }, []);

  return (
    <div style={{ minHeight:"100vh", maxWidth:"100vw", overflowX:"hidden", boxSizing:"border-box", background:T.bg, color:T.text, fontFamily:"'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif", padding:"16px 12px 60px" }}>
      <header style={{ position:"relative", textAlign:"center", marginBottom:16 }}>
        <button onClick={()=>setTab("settings")} title="설정" style={{
          position:"absolute", top:0, right:0, background: tab==="settings" ? T.accent : T.card,
          border:`1px solid ${tab==="settings" ? T.accent : T.border}`, borderRadius:10,
          width:38, height:38, fontSize:18, cursor:"pointer", color: tab==="settings" ? "#fff" : T.text,
        }}>⚙️</button>
        <div style={{ fontSize:22, fontWeight:900, background:`linear-gradient(135deg,${T.accent},${T.gold})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text" }}>
          🏆 2026 월드컵 예측기
        </div>
        <div style={{ fontSize:11, color:T.muted, marginTop:4 }}>
          Hybrid ELO 8단계 모델 + ML 랜덤포레스트 앙상블 + 몬테카를로 시뮬레이션
        </div>
      </header>

      {/* 탭 네비게이션 (예측/일정/예측기록/팀정보 — 설정은 우측 상단 ⚙️ 버튼) */}
      <nav style={{ display:"flex", gap:6, marginBottom:16, overflowX:"auto" }}>
        {MAIN_TABS.filter(t=>t.id!=="settings").map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1, minWidth:0, background: tab===t.id ? T.accent : T.card,
            color: tab===t.id ? "#fff" : T.muted, border:`1px solid ${tab===t.id ? T.accent : T.border}`,
            borderRadius:10, padding:"10px 4px", fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
          }}>{t.label}</button>
        ))}
      </nav>

      {/* ── 예측 탭 ── */}
      {tab === "predict" && (
        <div>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:12, marginBottom:12 }}>
            <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1fr) 36px minmax(0,1fr)", alignItems:"center", gap:8 }}>
              <select value={home} onChange={e=>{ setHome(e.target.value); setMatchDate(null); }} style={selectStyle}>
                {ALL_TEAMS.map(t => <option key={t} value={t}>{flag(t)} {t}</option>)}
              </select>
              <button onClick={()=>{ const h=home; setHome(away); setAway(h); }} style={swapBtnStyle} title="홈/원정 교체">⇄</button>
              <select value={away} onChange={e=>{ setAway(e.target.value); setMatchDate(null); }} style={selectStyle}>
                {ALL_TEAMS.map(t => <option key={t} value={t}>{flag(t)} {t}</option>)}
              </select>
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginTop:10 }}>
              <span style={{ fontSize:12, color:T.muted }}>몬테카를로 시뮬레이션:</span>
              <select value={sims} onChange={e=>setSims(Number(e.target.value))} style={{ ...selectStyle, flex:"none", width:120 }}>
                {SIM_OPTIONS.map(s => <option key={s} value={s}>{s.toLocaleString()}회</option>)}
              </select>
            </div>
          </div>

          <PredictPanel home={home} away={away} sims={sims} matchDate={matchDate} onSaved={handleSaved}/>

          <div style={{ display:"flex", gap:8, marginTop:12, justifyContent:"center" }}>
            <button onClick={()=>setModalTeam(home)} style={detailBtnStyle}>{flag(home)} {home} 상세정보</button>
            <button onClick={()=>setModalTeam(away)} style={detailBtnStyle}>{flag(away)} {away} 상세정보</button>
          </div>
        </div>
      )}

      {/* ── 일정 탭 ── */}
      {tab === "schedule" && (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {groupedSchedule.map(([date, matches]) => (
            <div key={date}>
              <div style={{ fontSize:12, fontWeight:700, color:T.cyan, marginBottom:6 }}>{date}</div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {matches.map((m,i) => (
                  <div key={i} onClick={()=>handleScheduleSelect(m)} style={{
                    background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 12px",
                    display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", fontSize:13
                  }}>
                    <span style={{ color:T.muted, fontSize:11, minWidth:50 }}>{m.time}</span>
                    <span style={{ flex:1, textAlign:"center" }}>
                      {flag(m.home)} {m.home} <span style={{color:T.muted}}>vs</span> {m.away} {flag(m.away)}
                    </span>
                    <span style={{ color:T.dim, fontSize:11 }}>예측 →</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── 예측기록 탭 ── */}
      {tab === "history" && <PredictionHistory refreshKey={historyRefresh}/>}

      {/* ── 팀정보 탭 ── */}
      {tab === "teams" && (
        <div>
          <input value={teamSearch} onChange={e=>setTeamSearch(e.target.value)} placeholder="팀 이름 검색..."
            style={{ width:"100%", padding:"10px 12px", borderRadius:10, border:`1px solid ${T.border}`, background:T.card, color:T.text, marginBottom:12, boxSizing:"border-box" }}/>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:8 }}>
            {filteredTeams.map(t => (
              <div key={t} onClick={()=>setModalTeam(t)} style={{
                background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 8px",
                textAlign:"center", cursor:"pointer", fontSize:12
              }}>
                <div style={{ fontSize:20 }}>{flag(t)}</div>
                <div style={{ marginTop:4, fontWeight:700 }}>{t}</div>
                <div style={{ marginTop:2, color:T.muted, fontSize:10 }}>ELO {Math.round(getDynElo(t,"base"))}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 설정 탭 ── */}
      {tab === "settings" && <SettingsPanel />}

      {/* ── 참고 사이트 ── */}
      <footer style={{ marginTop:24, paddingTop:16, borderTop:`1px solid ${T.border}` }}>
        <div style={{ fontSize:12, color:T.muted, marginBottom:8, textAlign:"center" }}>📚 참고 데이터 소스</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"center" }}>
          {REFERENCE_SITES.map((s,i) => (
            <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" style={{
              background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"6px 10px",
              fontSize:11, color:T.muted, textDecoration:"none", display:"flex", alignItems:"center", gap:4
            }}>
              <span>{s.icon}</span><span>{s.name}</span>
            </a>
          ))}
        </div>
      </footer>

      {modalTeam && <TeamModal teamName={modalTeam} onClose={()=>setModalTeam(null)}/>}
    </div>
  );
}

const selectStyle = {
  width:"100%", minWidth:0, padding:"10px 6px", borderRadius:8, border:`1px solid ${T.border}`,
  background:T.surface, color:T.text, fontSize:13, fontWeight:600, boxSizing:"border-box",
};
const swapBtnStyle = {
  background:T.surface, border:`1px solid ${T.border}`, color:T.cyan, borderRadius:8,
  width:36, height:36, cursor:"pointer", fontSize:16, flexShrink:0,
};
const detailBtnStyle = {
  background:T.card, border:`1px solid ${T.border}`, color:T.text, borderRadius:8,
  padding:"8px 14px", fontSize:12, cursor:"pointer", fontWeight:600,
};


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));
</script>
</body>
</html>
