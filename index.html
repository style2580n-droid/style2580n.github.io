<script>
/* window.storage 폴리필 — Claude 아티팩트 밖(일반 웹)에서는 localStorage로 영구 저장 */
(function(){
  if (window.storage) return;
  function lsKey(k, shared){ return (shared?"shared:":"user:") + k; }
  window.storage = {
    async get(key, shared){
      const v = localStorage.getItem(lsKey(key, shared));
      if (v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(lsKey(key, shared), value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(lsKey(key, shared));
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const pfx = lsKey(prefix||"", shared);
      const keys = [];
      for (let i=0;i<localStorage.length;i++){
        const full = localStorage.key(i);
        if (full && full.startsWith(pfx)){
          keys.push(full.replace(shared?"shared:":"user:",""));
        }
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();
</script>

// ═══════════════════════════════════════════════════════════
// 🧮 수학 유틸리티
// ═══════════════════════════════════════════════════════════
function expScore(ra, rb) {
  return 1 / (1 + Math.pow(10, (rb - ra) / 400));
}
function glicko2Factor(rd) {
  const q = Math.log(10) / 400;
  return 1 / Math.sqrt(1 + (3 * q * q * rd * rd) / (Math.PI * Math.PI));
}
function calcDrawProb(eloDiff) {
  const base = 0.27;
  const closeness = Math.max(0, 1 - Math.abs(eloDiff) / 500);
  return Math.min(0.34, Math.max(0.16, base + closeness * 0.07));
}
function poissonRandom(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}
function playerEloPenalty(team) {
  const data = ELO[team];
  if (!data) return 0;
  return (data.injuries || 0) * 8;
}
function bayesianBlend(priorProb, dataProb, weight = 0.6) {
  if (typeof dataProb !== "number" || isNaN(dataProb)) return priorProb;
  return priorProb * (1 - weight) + dataProb * weight;
}

// ═══════════════════════════════════════════════════════════
// ⚙️ 동적 ELO 모듈 (경기 결과 입력 → 실시간 갱신)
// ═══════════════════════════════════════════════════════════
const _dynamicElo = {}; // { teamName: {base, xG, xGA, ...} } - 경기결과 반영시 덮어씀

function getDynElo(team, field) {
  const dyn = _dynamicElo[team];
  if (dyn && typeof dyn[field] === "number") return dyn[field];
  const base = ELO[team];
  if (base && typeof base[field] === "number") return base[field];
  // 안전 기본값
  const FALLBACK = { base:1300, xgElo:1300, atk:1300, def:1300, form:1300, market:1300, player:1300, xG:1.3, xGA:1.3, npXg:1.2, ppda:14, fieldTilt:45, setPxg:0.25 };
  return FALLBACK[field] ?? 1300;
}
function getKFactor(stage = "group") {
  const factors = { group:20, ro16:24, qf:28, sf:32, final:40, friendly:12, qualifier:16, po:18 };
  return factors[stage] ?? 20;
}
// ★ 유효성 검사: xG/xGA가 없거나 NaN이면 실제 득점 기반 기본값으로 대체
function updateEloAfterMatch(home, away, homeGoals, awayGoals, xgHome, xgAway, stage = "group") {
  const hg = Number.isFinite(homeGoals) ? homeGoals : 0;
  const ag = Number.isFinite(awayGoals) ? awayGoals : 0;
  const safeXgHome = (typeof xgHome === "number" && !isNaN(xgHome)) ? xgHome : Math.max(0.2, hg + 0.3);
  const safeXgAway = (typeof xgAway === "number" && !isNaN(xgAway)) ? xgAway : Math.max(0.2, ag + 0.3);

  const homeBase = getDynElo(home, "base");
  const awayBase = getDynElo(away, "base");
  const expectedHome = expScore(homeBase + 60, awayBase);

  let actualHome = 0.5;
  if (hg > ag) actualHome = 1; else if (hg < ag) actualHome = 0;

  const k = getKFactor(stage);
  const goalDiff = Math.abs(hg - ag);
  const margin = goalDiff <= 1 ? 1 : (goalDiff === 2 ? 1.5 : 1.75);
  const homeChange = k * margin * (actualHome - expectedHome);
  const awayChange = -homeChange;

  if (!_dynamicElo[home]) _dynamicElo[home] = { ...(ELO[home] || {}) };
  if (!_dynamicElo[away]) _dynamicElo[away] = { ...(ELO[away] || {}) };

  _dynamicElo[home].base = homeBase + homeChange;
  _dynamicElo[away].base = awayBase + awayChange;

  const prevHomeXg = getDynElo(home, "xG");
  const prevAwayXg = getDynElo(away, "xG");
  const prevHomeXga = getDynElo(home, "xGA");
  const prevAwayXga = getDynElo(away, "xGA");

  _dynamicElo[home].xG  = prevHomeXg  * 0.7 + safeXgHome * 0.3;
  _dynamicElo[away].xG  = prevAwayXg  * 0.7 + safeXgAway * 0.3;
  _dynamicElo[home].xGA = prevHomeXga * 0.7 + safeXgAway * 0.3;
  _dynamicElo[away].xGA = prevAwayXga * 0.7 + safeXgHome * 0.3;

  return { homeChange, awayChange, newHomeBase: _dynamicElo[home].base, newAwayBase: _dynamicElo[away].base, safeXgHome, safeXgAway };
}

// ═══════════════════════════════════════════════════════════
// 🤖 ML 랜덤포레스트 앙상블 (5-tree, 휴리스틱 결정트리)
// ═══════════════════════════════════════════════════════════
function buildFeatureVector(home, away) {
  const h = ELO[home] || {}, a = ELO[away] || {};
  const hSpi = SPI_RATINGS[home]?.spi ?? 50, aSpi = SPI_RATINGS[away]?.spi ?? 50;
  const hOpta = OPTA_RANKINGS[home]?.powerScore ?? 50, aOpta = OPTA_RANKINGS[away]?.powerScore ?? 50;
  const hForm = (getDynElo(home,"_formArr") || h.formArr || []).reduce ? (h.formArr||[]).reduce((s,x)=>s+x,0) : 0;
  const aForm = (a.formArr||[]).reduce((s,x)=>s+x,0);
  return {
    eloDiff: getDynElo(home,"base") - getDynElo(away,"base"),
    spiDiff: hSpi - aSpi,
    optaDiff: hOpta - aOpta,
    xgDiff: getDynElo(home,"xG") - getDynElo(away,"xG"),
    xgaDiff: getDynElo(away,"xGA") - getDynElo(home,"xGA"),
    formDiff: hForm - aForm,
    ppdaDiff: (a.ppda ?? 14) - (h.ppda ?? 14),
    fieldTiltDiff: (h.fieldTilt ?? 45) - (a.fieldTilt ?? 45),
    setPxgDiff: (h.setPxg ?? 0.25) - (a.setPxg ?? 0.25),
  };
}
function decisionTree1(f) { // ELO 기반
  if (f.eloDiff > 150) return {homeWin:0.65, draw:0.20, awayWin:0.15};
  if (f.eloDiff > 50)  return {homeWin:0.50, draw:0.27, awayWin:0.23};
  if (f.eloDiff > -50) return {homeWin:0.38, draw:0.30, awayWin:0.32};
  if (f.eloDiff > -150)return {homeWin:0.25, draw:0.27, awayWin:0.48};
  return {homeWin:0.13, draw:0.20, awayWin:0.67};
}
function decisionTree2(f) { // SPI 기반
  if (f.spiDiff > 15) return {homeWin:0.60, draw:0.22, awayWin:0.18};
  if (f.spiDiff > 5)  return {homeWin:0.48, draw:0.28, awayWin:0.24};
  if (f.spiDiff > -5) return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (f.spiDiff > -15)return {homeWin:0.26, draw:0.28, awayWin:0.46};
  return {homeWin:0.16, draw:0.22, awayWin:0.62};
}
function decisionTree3(f) { // xG 공수 밸런스
  const d = f.xgDiff + f.xgaDiff;
  if (d > 0.6)  return {homeWin:0.58, draw:0.24, awayWin:0.18};
  if (d > 0.2)  return {homeWin:0.46, draw:0.29, awayWin:0.25};
  if (d > -0.2) return {homeWin:0.36, draw:0.31, awayWin:0.33};
  if (d > -0.6) return {homeWin:0.26, draw:0.29, awayWin:0.45};
  return {homeWin:0.15, draw:0.23, awayWin:0.62};
}
function decisionTree4(f) { // 폼 + 필드틸트
  const d = f.formDiff * 8 + f.fieldTiltDiff;
  if (d > 12)  return {homeWin:0.56, draw:0.24, awayWin:0.20};
  if (d > 4)   return {homeWin:0.46, draw:0.29, awayWin:0.25};
  if (d > -4)  return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (d > -12) return {homeWin:0.28, draw:0.29, awayWin:0.43};
  return {homeWin:0.18, draw:0.24, awayWin:0.58};
}
function decisionTree5(f) { // Opta + 세트피스
  const d = f.optaDiff + f.setPxgDiff * 40;
  if (d > 12)  return {homeWin:0.59, draw:0.23, awayWin:0.18};
  if (d > 4)   return {homeWin:0.47, draw:0.28, awayWin:0.25};
  if (d > -4)  return {homeWin:0.37, draw:0.31, awayWin:0.32};
  if (d > -12) return {homeWin:0.27, draw:0.28, awayWin:0.45};
  return {homeWin:0.17, draw:0.22, awayWin:0.61};
}
function randomForestWinProb(f) {
  const trees = [decisionTree1(f), decisionTree2(f), decisionTree3(f), decisionTree4(f), decisionTree5(f)];
  const sum = {homeWin:0, draw:0, awayWin:0};
  trees.forEach(t => { sum.homeWin+=t.homeWin; sum.draw+=t.draw; sum.awayWin+=t.awayWin; });
  const total = sum.homeWin + sum.draw + sum.awayWin;
  return { homeWin: sum.homeWin/total, draw: sum.draw/total, awayWin: sum.awayWin/total, trees };
}
function mlAdjustedLambda(lambda, mlSkew) {
  // mlSkew: -1(원정 압도) ~ +1(홈 압도)
  const safeLambda = Number.isFinite(lambda) ? lambda : 1.2;
  const safeSkew = Number.isFinite(mlSkew) ? mlSkew : 0;
  return Math.max(0.15, safeLambda * (1 + safeSkew * 0.15));
}

// ═══════════════════════════════════════════════════════════
// 🎯 predictMatch — 8단계 하이브리드 ELO + ML + 몬테카를로
// ═══════════════════════════════════════════════════════════
const STAGE_WEIGHTS = { base:0.20, xgElo:0.15, atk:0.10, def:0.10, form:0.15, market:0.15, player:0.15 };

function compositeElo(team) {
  let total = 0;
  for (const [field, w] of Object.entries(STAGE_WEIGHTS)) total += getDynElo(team, field) * w;
  total -= playerEloPenalty(team);
  return total;
}

function predictMatch(homeName, awayName, sims = 30000, liveOverride = {}) {
  const homeEloRaw = compositeElo(homeName);
  const awayEloRaw = compositeElo(awayName);
  const homeAdv = liveOverride.neutralVenue ? 25 : 60;
  const homeElo = homeEloRaw + homeAdv;
  const awayElo = awayEloRaw;

  const eloDiff = homeElo - awayElo;
  const winProbRaw = expScore(homeElo, awayElo);
  const drawProbRaw = calcDrawProb(eloDiff);
  let homeWinProb = winProbRaw * (1 - drawProbRaw);
  let awayWinProb = (1 - winProbRaw) * (1 - drawProbRaw);
  let drawProb = drawProbRaw;

  // ML 앙상블 블렌딩 (40%)
  const features = buildFeatureVector(homeName, awayName);
  const mlProbs = randomForestWinProb(features);
  homeWinProb = bayesianBlend(homeWinProb, mlProbs.homeWin, 0.4);
  awayWinProb = bayesianBlend(awayWinProb, mlProbs.awayWin, 0.4);
  drawProb    = bayesianBlend(drawProb,    mlProbs.draw,    0.4);
  let normTotal = homeWinProb + awayWinProb + drawProb;
  homeWinProb /= normTotal; awayWinProb /= normTotal; drawProb /= normTotal;

  // 기대 득점(λ) 산출
  const hData = ELO[homeName] || {}, aData = ELO[awayName] || {};
  const hXg = getDynElo(homeName, "xG"), hXga = getDynElo(homeName, "xGA");
  const aXg = getDynElo(awayName, "xG"), aXga = getDynElo(awayName, "xGA");
  let lambdaHome = ((hXg + aXga) / 2) * 1.08;
  let lambdaAway = ((aXg + hXga) / 2) * 0.95;
  const mlSkew = mlProbs.homeWin - mlProbs.awayWin;
  lambdaHome = mlAdjustedLambda(lambdaHome, mlSkew);
  lambdaAway = mlAdjustedLambda(lambdaAway, -mlSkew);

  if (typeof liveOverride.lambdaHomeAdj === "number") lambdaHome = Math.max(0.15, lambdaHome + liveOverride.lambdaHomeAdj);
  if (typeof liveOverride.lambdaAwayAdj === "number") lambdaAway = Math.max(0.15, lambdaAway + liveOverride.lambdaAwayAdj);

  // ★ 몬테카를로 시뮬레이션 (sims 횟수, 기본 30,000회)
  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 30000;
  let hw=0, dr=0, aw=0;
  const scoreCounts = {};
  for (let i=0;i<safeSims;i++) {
    const hg = poissonRandom(lambdaHome);
    const ag = poissonRandom(lambdaAway);
    if (hg>ag) hw++; else if (hg<ag) aw++; else dr++;
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key]||0)+1;
  }
  const mcHome = hw/safeSims, mcDraw = dr/safeSims, mcAway = aw/safeSims;

  // ELO+ML(50%) ↔ 몬테카를로(50%) 최종 블렌딩
  const finalHome = (homeWinProb + mcHome) / 2;
  const finalDraw = (drawProb + mcDraw) / 2;
  const finalAway = (awayWinProb + mcAway) / 2;

  const topScores = Object.entries(scoreCounts)
    .sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([score,count])=>({ score, prob: count/safeSims }));

  const overUnder = computeOverUnder(scoreCounts, safeSims);

  return {
    home: homeName, away: awayName,
    homeWinProb: finalHome, drawProb: finalDraw, awayWinProb: finalAway,
    eloOnly: { homeWinProb, drawProb, awayWinProb },
    monteCarlo: { homeWinProb: mcHome, drawProb: mcDraw, awayWinProb: mcAway },
    lambdaHome, lambdaAway,
    homeElo, awayElo, eloDiff,
    topScores,
    overUnder,                 // ★ {2.5:{over,under}, 3.5:{over,under}} — 합산 골 수 기준
    sims: safeSims,           // ★ UI 표시용 실제 시뮬레이션 횟수
    mlProbs, features,
    timestamp: Date.now(),
  };
}

// ★ scoreCounts({"2-1":count,...})로부터 오버/언더 2.5·3.5 확률 계산
function computeOverUnder(scoreCounts, totalSims) {
  const lines = [2.5, 3.5];
  const result = {};
  for (const line of lines) {
    let over = 0;
    for (const [score, count] of Object.entries(scoreCounts)) {
      const [h, a] = score.split("-").map(Number);
      if ((h + a) > line) over += count;
    }
    result[line] = { over: over / totalSims, under: 1 - over / totalSims };
  }
  return result;
}

// ═══════════════════════════════════════════════════════════
// 🔬 교차검증(Cross-Validation) 헬퍼
// ═══════════════════════════════════════════════════════════
function impliedProbabilityFromOdds(odds) {
  if (typeof odds !== "number" || !isFinite(odds) || odds <= 1) return null;
  return 1 / odds;
}

// 배당 3종 → 마진(오버라운드) 제거한 정규화 확률 {home,draw,away}
function devigOdds(oddsObj) {
  if (!oddsObj) return null;
  const ih = impliedProbabilityFromOdds(oddsObj.home);
  const id = impliedProbabilityFromOdds(oddsObj.draw);
  const ia = impliedProbabilityFromOdds(oddsObj.away);
  if (ih == null || id == null || ia == null) return null;
  const sum = ih + id + ia;
  if (sum <= 0) return null;
  return { home: ih/sum, draw: id/sum, away: ia/sum };
}

// ★ 실시간 예측: 정적 모델 결과에 라이브 배당 + API-Football 예측을 가중 혼합
//   고정값 방지의 핵심. 외부 데이터가 하나도 없으면 정적 결과를 그대로 반환(liveApplied:false).
async function predictMatchLive(homeName, awayName, sims = 30000, dateISO = null) {
  const base = predictMatch(homeName, awayName, sims);
  if (!RUNTIME_CONFIG.useLiveOdds) return { ...base, liveApplied: false, liveSources: [] };

  const [oddsRaw, apiPred] = await Promise.all([
    fetchMatchOdds(homeName, awayName),
    fetchApiFootballPrediction(homeName, awayName, dateISO),
  ]);

  const marketProbs = devigOdds(oddsRaw);
  const sources = [];
  // 외부 소스들을 평균내어 하나의 "시장/예측 컨센서스"로
  const ext = { home: [], draw: [], away: [] };
  if (marketProbs) { ext.home.push(marketProbs.home); ext.draw.push(marketProbs.draw); ext.away.push(marketProbs.away); sources.push("market"); }
  if (apiPred && apiPred.home != null) {
    // API-Football 예측은 합이 1이 아닐 수 있어 정규화
    const s = (apiPred.home||0)+(apiPred.draw||0)+(apiPred.away||0);
    if (s > 0) { ext.home.push(apiPred.home/s); ext.draw.push((apiPred.draw||0)/s); ext.away.push(apiPred.away/s); sources.push("apiFootball"); }
  }

  if (!sources.length) {
    return { ...base, liveApplied: false, liveSources: [], marketProbs: null, apiPrediction: apiPred || null };
  }

  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const consensus = { home: avg(ext.home), draw: avg(ext.draw), away: avg(ext.away) };

  const w = Math.min(0.8, Math.max(0, RUNTIME_CONFIG.liveOddsWeight));
  let h = base.homeWinProb*(1-w) + consensus.home*w;
  let d = base.drawProb*(1-w) + consensus.draw*w;
  let a = base.awayWinProb*(1-w) + consensus.away*w;
  const tot = h+d+a;
  h/=tot; d/=tot; a/=tot;

  // 승률이 바뀌면 기대득점(λ)도 비례 조정해 스코어라인 재시뮬
  const homeShift = base.homeWinProb > 0 ? h/base.homeWinProb : 1;
  const awayShift = base.awayWinProb > 0 ? a/base.awayWinProb : 1;
  let lambdaHome = Math.max(0.2, base.lambdaHome * Math.pow(homeShift, 0.6));
  let lambdaAway = Math.max(0.2, base.lambdaAway * Math.pow(awayShift, 0.6));

  // 스코어라인 재시뮬 (가벼운 8천회)
  const reSims = 8000;
  const scoreCounts = {};
  for (let i=0;i<reSims;i++) {
    const hg = poissonRandom(lambdaHome), ag = poissonRandom(lambdaAway);
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key]||0)+1;
  }
  const topScores = Object.entries(scoreCounts).sort((x,y)=>y[1]-x[1]).slice(0,5)
    .map(([score,count])=>({ score, prob: count/reSims }));
  const overUnder = computeOverUnder(scoreCounts, reSims);

  return {
    ...base,
    homeWinProb: h, drawProb: d, awayWinProb: a,
    lambdaHome, lambdaAway, topScores, overUnder,
    staticOverUnder: base.overUnder,
    staticProbs: { home: base.homeWinProb, draw: base.drawProb, away: base.awayWinProb },
    marketProbs, marketTotals: oddsRaw?.totals || null, apiPrediction: apiPred || null,
    consensus,
    liveApplied: true,
    liveWeight: w,
    liveSources: sources,
    timestamp: Date.now(),
  };
}

function calcVariance(values) {
  const valid = values.filter(v => typeof v === "number" && !isNaN(v));
  if (valid.length < 2) return 0;
  const mean = valid.reduce((a,b)=>a+b,0) / valid.length;
  return valid.reduce((a,b)=>a + (b-mean)**2, 0) / valid.length;
}
function calculateConsensus(items) {
  // items: [{value, weight}]
  const valid = items.filter(it => typeof it.value === "number" && !isNaN(it.value));
  if (!valid.length) return null;
  const totalW = valid.reduce((a,b)=>a+b.weight, 0);
  if (totalW === 0) return null;
  return valid.reduce((a,b)=>a + b.value*b.weight, 0) / totalW;
}
function calculateDeviation(ourProb, consensusProb) {
  if (consensusProb === null || typeof ourProb !== "number") return null;
  return Math.abs(ourProb - consensusProb);
}
function calculateConfidenceScore(deviation, variance) {
  if (deviation === null) return 50;
  const devPenalty = Math.min(40, deviation * 150);
  const varPenalty = Math.min(20, (variance || 0) * 200);
  return Math.max(10, Math.round(100 - devPenalty - varPenalty));
}

// SPI/Opta 점수차 → 승률 변환 (간이 로지스틱)
function ratingDiffToProbs(diff, scale = 15, capDraw = 0.85) {
  const homeRaw = 1 / (1 + Math.pow(10, -diff / scale));
  const home = homeRaw * capDraw;
  const away = (1 - homeRaw) * capDraw;
  const draw = Math.max(0, 1 - home - away);
  return { home, draw, away };
}

async function crossValidate(homeName, awayName, ourProbs, dateISO = null) {
  try {
    const hSpi = SPI_RATINGS[homeName], aSpi = SPI_RATINGS[awayName];
    const hOpta = OPTA_RANKINGS[homeName], aOpta = OPTA_RANKINGS[awayName];

    const spiP = (hSpi && aSpi) ? ratingDiffToProbs(hSpi.spi - aSpi.spi) : null;
    const optaP = (hOpta && aOpta) ? ratingDiffToProbs(hOpta.powerScore - aOpta.powerScore) : null;

    // 실시간 소스 병렬 조회 (배당 + API-Football 예측)
    let marketP = null, apiP = null;
    const [odds, apiPred] = await Promise.all([
      fetchMatchOdds(homeName, awayName).catch(() => null),
      fetchApiFootballPrediction(homeName, awayName, dateISO).catch(() => null),
    ]);
    marketP = devigOdds(odds); // 마진 제거된 정규화 확률
    if (apiPred && apiPred.home != null) {
      const s = (apiPred.home||0)+(apiPred.draw||0)+(apiPred.away||0);
      if (s > 0) apiP = { home: apiPred.home/s, draw: (apiPred.draw||0)/s, away: apiPred.away/s, advice: apiPred.advice, underOver: apiPred.underOver, goalsAvg: apiPred.goalsAvg };
    }

    const consensusHome = calculateConsensus([
      { value: spiP?.home ?? null, weight: 0.20 },
      { value: optaP?.home ?? null, weight: 0.30 },
      { value: marketP?.home ?? null, weight: 0.30 },
      { value: apiP?.home ?? null, weight: 0.20 },
    ]);
    const variance = calcVariance([spiP?.home, optaP?.home, marketP?.home, apiP?.home, ourProbs?.homeWinProb]);
    const deviation = calculateDeviation(ourProbs?.homeWinProb, consensusHome);
    const confidence = calculateConfidenceScore(deviation, variance);

    return { spi: spiP, opta: optaP, market: marketP, apiFootball: apiP, consensusHome, deviation, variance, confidence };
  } catch (e) {
    return { spi: null, opta: null, market: null, apiFootball: null, consensusHome: null, deviation: null, variance: 0, confidence: 50, error: true };
  }
}

// 프록시 경유 URL 생성 (프록시 없으면 원본 그대로 → 보통 CORS 차단)
function withProxy(url) {
  const p = RUNTIME_CONFIG.corsProxy;
  return p ? p + encodeURIComponent(url) : url;
}
// ★ 다중 프록시 폴백 목록 — 첫 번째(설정값) 실패 시 순차로 다음 프록시 시도
const PROXY_FALLBACKS = [
  null, // null = RUNTIME_CONFIG.corsProxy(설정값) 그대로 사용
  "https://corsproxy.io/?url=",
  "https://api.allorigins.win/raw?url=",
  "https://thingproxy.freeboard.io/fetch/",
  "https://api.codetabs.com/v1/proxy?quest=",
];
// 여러 프록시를 순차 시도해 첫 성공 응답을 반환. 전부 실패시 null.
async function fetchViaProxies(url, options = {}, timeoutMs = 4000) {
  const tried = new Set();
  for (const proxy of PROXY_FALLBACKS) {
    const p = proxy === null ? RUNTIME_CONFIG.corsProxy : proxy;
    if (!p || tried.has(p)) continue;
    tried.add(p);
    try {
      const res = await fetchWithTimeout(p + encodeURIComponent(url), options, timeoutMs);
      if (res.ok) return res;
    } catch (e) { /* 다음 프록시로 */ }
  }
  return null;
}

async function runDiagnostics(sampleHome = "대한민국", sampleAway = "체코") {

  const proxyListRaw = [
    { name: "설정값", url: RUNTIME_CONFIG.corsProxy },
    { name: "corsproxy.io", url: "https://corsproxy.io/?url=" },
    { name: "allorigins", url: "https://api.allorigins.win/raw?url=" },
    { name: "thingproxy", url: "https://thingproxy.freeboard.io/fetch/" },
    { name: "codetabs", url: "https://api.codetabs.com/v1/proxy?quest=" },
  ];
  const seenUrls = new Set();
  const proxyList = proxyListRaw.filter(px => {
    if (!px.url) return true; // "URL 비어있음" 메시지 표시용으로 유지
    if (seenUrls.has(px.url)) return false; // ★ 설정값과 동일한 프록시 중복 스킵 (쿼터 절약)
    seenUrls.add(px.url);
    return true;
  });
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  let workingProxy = null;
  for (const px of proxyList) {
    if (!px.url) { steps.push({ step: `프록시: ${px.name}`, ok: false, detail: "URL 비어있음" }); continue; }
    try {
      const res = await fetchWithTimeout(px.url + encodeURIComponent(statusUrl), { headers }, 5000);
      if (res.ok) {
        const j = await res.json().catch(()=>null);
        const ok = !!j?.response;
        steps.push({ step: `프록시: ${px.name}`, ok, detail: ok ? "응답 OK" : `HTTP ${res.status}, JSON: ${JSON.stringify(j).slice(0,120)}` });
        if (ok && !workingProxy) workingProxy = px.url;
      } else {
        steps.push({ step: `프록시: ${px.name}`, ok: false, detail: `HTTP ${res.status}` });
      }
    } catch (e) {
      steps.push({ step: `프록시: ${px.name}`, ok: false, detail: `오류: ${e?.message || e}` });
    }
    if (workingProxy) break; // ★ 작동하는 프록시 1개 찾으면 나머지 테스트 생략 (쿼터 절약)
  }

  if (!workingProxy) {
    steps.push({ step: "API-Football 연결", ok: false, detail: "작동하는 프록시가 없어 이후 단계 진행 불가" });
    return steps;
  }

  await sleep(2500); // ★ 분당 요청제한 회피용 대기

  // 2) API 키 / 쿼터 확인 (status 응답에서 subscription·requests 정보 파싱)
  try {
    const res = await fetchWithTimeout(workingProxy + encodeURIComponent(statusUrl), { headers }, 6000);
    const j = await res.json().catch(()=>null);
    const acct = j?.response?.account;
    const reqs = j?.response?.requests;
    const sub = j?.response?.subscription;
    if (acct) {
      steps.push({ step: "API 키 / 계정", ok: true, detail: `${acct.firstname||""} ${acct.lastname||""} · 플랜: ${sub?.plan||"-"} · 오늘 요청 ${reqs?.current ?? "?"}/${reqs?.limit_day ?? "?"}` });
    } else if (j?.errors?.rateLimit) {

    steps.push({ step: "API 키 / 계정", ok: false, detail: `오류: ${e?.message || e}` });
  }

  await sleep(2500);

  // 3) 샘플 매치 fixture 조회 (h2h)
  const homeId = TEAM_API_IDS[sampleHome], awayId = TEAM_API_IDS[sampleAway];
  steps.push({ step: `팀 ID 매핑 (${sampleHome}/${sampleAway})`, ok: !!(homeId && awayId), detail: `${sampleHome}=${homeId ?? "없음"}, ${sampleAway}=${awayId ?? "없음"}` });
  if (homeId && awayId) {
    try {
      const h2hUrl = `https://${RUNTIME_CONFIG.footballApiHost}/fixtures/headtohead?h2h=${homeId}-${awayId}&last=5`;
      const res = await fetchWithTimeout(workingProxy + encodeURIComponent(h2hUrl), { headers }, 6000);
      const j = await res.json().catch(()=>null);
      const arr = j?.response;
      if (Array.isArray(arr) && arr.length) {
        const f = arr[0];
        steps.push({ step: "fixture 조회 (h2h)", ok: true, detail: `${arr.length}건 발견 · 최근: ${f?.fixture?.date?.slice(0,10)} (id ${f?.fixture?.id})` });

        await sleep(2500);

        // 4) predictions 조회
        try {
          const predUrl = `https://${RUNTIME_CONFIG.footballApiHost}/predictions?fixture=${f.fixture.id}`;
          const r2 = await fetchWithTimeout(workingProxy + encodeURIComponent(predUrl), { headers }, 6000);
          const j2 = await r2.json().catch(()=>null);
          const pred = j2?.response?.[0]?.predictions;
          if (pred) {
            steps.push({ step: "predictions 조회", ok: true, detail: `승무패: ${JSON.stringify(pred.percent)}` });
          } else if (j2?.errors?.rateLimit) {
            steps.push({ step: "predictions 조회", ok: null, detail: "분당 요청제한 도달 — 1분 후 다시 시도" });
          } else {
            steps.push({ step: "predictions 조회", ok: false, detail: `응답: ${JSON.stringify(j2).slice(0,150)}` });
          }
        } catch (e) {
          steps.push({ step: "predictions 조회", ok: false, detail: `오류: ${e?.message || e}` });
        }
      } else if (j?.errors?.rateLimit) {
        steps.push({ step: "fixture 조회 (h2h)", ok: null, detail: "분당 요청제한 도달 — 1분 후 다시 시도" });
      } else if (j?.errors?.token) {
        steps.push({ step: "fixture 조회 (h2h)", ok: false, detail: `토큰 오류: ${j.errors.token}` });
      } else {
        steps.push({ step: "fixture 조회 (h2h)", ok: false, detail: `응답: ${JSON.stringify(j).slice(0,150)}` });
      }
    } catch (e) {
      steps.push({ step: "fixture 조회 (h2h)", ok: false, detail: `오류: ${e?.message || e}` });
    }
  }

  // 5) The Odds API (선택 키)
  if (RUNTIME_CONFIG.oddsApiKey) {
    try {
      const oddsUrl = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds?apiKey=${RUNTIME_CONFIG.oddsApiKey}&regions=eu&markets=h2h,totals&oddsFormat=decimal`;
      const res = await fetchWithTimeout(workingProxy + encodeURIComponent(oddsUrl), {}, 6000);
      const j = await res.json().catch(()=>null);
      if (Array.isArray(j)) {
        steps.push({ step: "The Odds API", ok: true, detail: `${j.length}개 경기 배당 수신` });
      } else {
        steps.push({ step: "The Odds API", ok: false, detail: `응답: ${JSON.stringify(j).slice(0,150)}` });
      }
    } catch (e) {
      steps.push({ step: "The Odds API", ok: false, detail: `오류: ${e?.message || e}` });
    }
  } else {
    steps.push({ step: "The Odds API", ok: null, detail: "키 미입력 — the-odds-api.com에서 무료 키 발급 필요" });
  }

  return steps;
}

async function fetchWithTimeout(url, options = {}, timeoutMs = 3000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    return res;
  } finally {
    clearTimeout(timer);
  }
}

// ★ API-Football 자체 예측(predictions) 조회 — 두 팀 fixture를 찾아 승/무/패 퍼센트 반환
//   반환: { home, draw, away, advice, fixtureId } | null  (확률은 0~1)
async function fetchApiFootballPrediction(homeName, awayName, dateISO) {
  const fid = await findFixtureId(homeName, awayName, dateISO);
  if (!fid) return null;
  const data = await apiFootball(`predictions?fixture=${fid}`);
  const p = data?.response?.[0];
  if (!p?.predictions) return null;
  const pc = p.predictions.percent || {};
  const toNum = s => (typeof s === "string" && s.endsWith("%")) ? parseFloat(s)/100 : null;
  const home = toNum(pc.home), draw = toNum(pc.draw), away = toNum(pc.away);
  if (home == null && draw == null && away == null) return null;
  // ★ API-Football 자체 오버/언더 라인 예측 (예: "2.5", "+2.5" 등 표기) + 예상 골 평균
  const underOver = p.predictions.under_over || null;
  const goalsAvg = p.predictions.goals || null; // {home, away} 예상 평균골
  return { home, draw, away, advice: p.predictions.advice || null, underOver, goalsAvg, fixtureId: fid };
}

// 두 팀 간 fixture ID 탐색 (h2h). 날짜 우선 매칭.
async function findFixtureId(homeName, awayName, dateISO) {
  const homeId = TEAM_API_IDS[homeName], awayId = TEAM_API_IDS[awayName];
  if (!homeId || !awayId) return null;
  const data = await apiFootball(`fixtures/headtohead?h2h=${homeId}-${awayId}&next=3`);
  let arr = data?.response;
  if (!Array.isArray(arr) || !arr.length) {
    const past = await apiFootball(`fixtures/headtohead?h2h=${homeId}-${awayId}&last=3`);
    arr = past?.response;
  }
  if (!Array.isArray(arr) || !arr.length) return null;
  if (dateISO) {
    const sameDay = arr.find(f => (f?.fixture?.date || "").startsWith(dateISO));
    if (sameDay) return sameDay.fixture.id;
  }
  return arr[0]?.fixture?.id ?? null;
}

// 경기 배당(시장 컨센서스) 조회 — The Odds API. 실패시 null.
async function fetchMatchOdds(homeName, awayName) {
  if (!RUNTIME_CONFIG.oddsApiKey) return null;
  try {
    const url = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds?apiKey=${RUNTIME_CONFIG.oddsApiKey}&regions=eu&markets=h2h,totals&oddsFormat=decimal`;
    const res = await fetchViaProxies(url, {}, 4500);
    if (!res || !res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data)) return null;
    const match = data.find(m =>
      (m.home_team?.includes(homeName) || homeName.includes(m.home_team || "")) &&
      (m.away_team?.includes(awayName) || awayName.includes(m.away_team || ""))
    );
    if (!match?.bookmakers?.length) return null;
    const bk = match.bookmakers[0];
    const market = bk?.markets?.find(mk => mk.key === "h2h");
    let result = { home: null, away: null, draw: null, totals: null };
    if (market) {
      const ho = market.outcomes.find(o => o.name === match.home_team);
      const ao = market.outcomes.find(o => o.name === match.away_team);
      const do_ = market.outcomes.find(o => o.name === "Draw");
      result = { home: ho?.price ?? null, away: ao?.price ?? null, draw: do_?.price ?? null, totals: null };
    }
    // 토탈(오버/언더) 마켓 — 라인별 over/under 배당
    const totalsMkt = bk?.markets?.find(mk => mk.key === "totals");
    if (totalsMkt) {
      const lines = {};
      for (const o of totalsMkt.outcomes || []) {
        const pt = o.point;
        if (pt == null) continue;
        if (!lines[pt]) lines[pt] = {};
        if (o.name === "Over") lines[pt].over = o.price;
        if (o.name === "Under") lines[pt].under = o.price;
      }
      result.totals = lines; // 예: {2.5:{over:1.8,under:2.0}, 3.5:{...}}
    }
    if (result.home == null && result.away == null && !result.totals) return null;
    return result;
  } catch (e) {
    return null;
  }
}

// ★ 종료된 경기 스코어 자동 조회 (API-Football fixtures)
//   두 팀 ID가 모두 있어야 조회 가능. 실패/미종료시 null → 수동 입력 폴백.
//   반환: { home, away, status, finished } | null
async function fetchMatchResult(homeName, awayName, dateISO) {
  const homeId = TEAM_API_IDS[homeName];
  const awayId = TEAM_API_IDS[awayName];
  if (!homeId || !awayId) return null; // 신규 16개팀 등 ID 미보유 → 수동 입력
  const data = await apiFootball(`fixtures/headtohead?h2h=${homeId}-${awayId}&last=5`, 4500);
  if (!Array.isArray(data?.response) || !data.response.length) return null;

  // 진행중 상태 코드
  const LIVE = ["1H", "2H", "HT", "ET", "BT", "P", "LIVE"];
  const FINISHED = ["FT", "AET", "PEN"];

  // 날짜가 주어지면 같은 날짜 경기 우선, 없으면 가장 최근 종료 경기
  let candidates = data.response.filter(f => FINISHED.includes(f?.fixture?.status?.short));
  if (dateISO) {
    const sameDay = candidates.filter(f => (f?.fixture?.date || "").startsWith(dateISO));
    if (sameDay.length) candidates = sameDay;
  }
  const normalize = (f) => {
    const apiHomeId = f?.teams?.home?.id;
    let hg = f?.goals?.home, ag = f?.goals?.away;
    if (apiHomeId && apiHomeId !== homeId) [hg, ag] = [ag, hg]; // 홈/원정 순서 정규화
    return { hg, ag, status: f?.fixture?.status?.short };
  };
  if (!candidates.length) {
    const latest = data.response[0];
    const n = normalize(latest);
    return {
      home: n.hg ?? null, away: n.ag ?? null,
      status: n.status ?? "NS",
      finished: false,
      live: LIVE.includes(n.status),
    };
  }
  candidates.sort((a, b) => new Date(b?.fixture?.date || 0) - new Date(a?.fixture?.date || 0));
  const n = normalize(candidates[0]);
  return { home: n.hg ?? null, away: n.ag ?? null, status: n.status ?? "FT", finished: true, live: false };
}

// 💾 예측 히스토리 저장소 (window.storage 영구 저장, shared:false)
// ═══════════════════════════════════════════════════════════
// 예측 결과 카테고리 판정: 홈승/무/원정승 — predictMatch 확률 중 최댓값을 "예측 결과"로 간주
function predictedOutcome(pred) {
  if (!pred) return null;
  const { homeWinProb, drawProb, awayWinProb } = pred;
  const max = Math.max(homeWinProb, drawProb, awayWinProb);
  if (max === homeWinProb) return "home";
  if (max === awayWinProb) return "away";
  return "draw";
}
// 실제 결과 카테고리 판정
function actualOutcome(homeGoals, awayGoals) {
  if (homeGoals > awayGoals) return "home";
  if (homeGoals < awayGoals) return "away";
  return "draw";
}
const OUTCOME_LABEL = { home:"홈승", draw:"무승부", away:"원정승" };
// 오버/언더 판정 라벨
const OU_LABEL = { over:"오버", under:"언더" };
// 예측 시점의 오버/언더 2.5·3.5 "예측 방향"(확률 높은 쪽) 산출
function predictedOU(overUnder) {
  if (!overUnder) return null;
  const out = {};
  for (const line of [2.5, 3.5]) {
    const m = overUnder[line];
    if (!m) continue;
    out[line] = m.over >= m.under ? "over" : "under";
  }
  return out; // 예: {2.5:"over", 3.5:"under"}
}
// 실제 합산골 → 라인별 오버/언더 실제 결과
function actualOU(homeGoals, awayGoals) {
  const total = homeGoals + awayGoals;
  return { 2.5: total > 2.5 ? "over" : "under", 3.5: total > 3.5 ? "over" : "under" };
}

async function savePredictionRecord(record) {
  try {
    const key = `predictions:${record.id}`;
    const result = await window.storage.set(key, JSON.stringify(record), false);
    return !!result;
  } catch (e) {
    console.error("예측 저장 실패:", e);
    return false;
  }
}
async function loadAllPredictions() {
  try {
    const list = await window.storage.list("predictions:", false);
    if (!list?.keys?.length) return [];
    const records = [];
    for (const k of list.keys) {
      try {
        const r = await window.storage.get(k, false);
        if (r?.value) records.push(JSON.parse(r.value));
      } catch (e) { /* 개별 레코드 손상 시 스킵 */ }
    }
    records.sort((a,b)=> (b.savedAt||0) - (a.savedAt||0));
    return records;
  } catch (e) {
    console.error("예측 히스토리 로드 실패:", e);
    return [];
  }
}
async function deletePredictionRecord(id) {
  try {
    await window.storage.delete(`predictions:${id}`, false);
    return true;
  } catch (e) {
    return false;
  }
}

// ★ 저장된(대기중) 예측 레코드에 실제 스코어를 채워 적중/미적중 확정 후 갱신
function applyResultToRecord(record, homeGoals, awayGoals, source = "manual") {
  const actual = actualOutcome(homeGoals, awayGoals);
  const isHit = record.predictedOutcome === actual;

  // ★ 오버/언더 적중 판정 (구버전 레코드는 predictedOU가 없을 수 있어 옵셔널 처리)
  const ouActual = actualOU(homeGoals, awayGoals);
  let ouHits = null;
  if (record.predictedOU) {
    ouHits = {};
    for (const line of [2.5, 3.5]) {
      if (record.predictedOU[line]) ouHits[line] = record.predictedOU[line] === ouActual[line];
    }
  }

  return {
    ...record,
    actualScore: { home: homeGoals, away: awayGoals },
    actualOutcome: actual,
    isHit,
    actualOU: ouActual,
    ouHits, // 예: {2.5:true, 3.5:false} — record.predictedOU 없으면 null
    resultStatus: "final",
    resultSource: source,          // "api" | "manual"
    resolvedAt: Date.now(),
  };
}

// ★ 결과 대기중(resultStatus:"pending") 레코드들을 API로 일괄 동기화
//   반환: { updated: 갱신건수, checked: 조회시도건수 }
async function autoSyncPendingResults() {
  let updated = 0, checked = 0;
  try {
    const all = await loadAllPredictions();
    const pending = all.filter(r => r.resultStatus === "pending");
    for (const rec of pending) {
      checked++;
      const res = await fetchMatchResult(rec.home, rec.away, rec.matchDate);
      if (res && res.finished && res.home != null && res.away != null) {
        const filled = applyResultToRecord(rec, res.home, res.away, "api");
        const ok = await savePredictionRecord(filled);
        if (ok) {
          updated++;
          try { updateEloAfterMatch(rec.home, rec.away, res.home, res.away); } catch (e) { /* ELO 갱신 실패 무시 */ }
        }
      }
    }
  } catch (e) {
    console.error("결과 자동 동기화 실패:", e);
  }
  return { updated, checked };
}

  const [saveStatus, setSaveStatus] = useState(null); // null | saving | saved | error
  const [savedRecord, setSavedRecord] = useState(null);
  const [fetchStatus, setFetchStatus] = useState(null); // null|fetching|found|notfound|notfinished|error

  // 예측 실행: 먼저 정적 결과 즉시 표시 → 이어서 실시간 배당/예측 반영본으로 갱신
  useEffect(() => {
    if (!home || !away || home === away) { setResult(null); return; }
    let cancelled = false;
    // 1) 정적 결과 즉시
    const r0 = predictMatch(home, away, sims);
    setResult(r0);
    setHomeScore(""); setAwayScore(""); setSaveStatus(null); setSavedRecord(null); setFetchStatus(null);
    // 2) 실시간 반영본 (프록시/키 있으면 적용, 없으면 liveApplied:false로 동일)
    setLiveLoading(true);
    predictMatchLive(home, away, sims, matchDate).then(rl => {
      if (!cancelled) { setResult(rl); setLiveLoading(false); }
    }).catch(() => { if (!cancelled) setLiveLoading(false); });
    return () => { cancelled = true; };
  }, [home, away, sims, matchDate]);

  // 교차검증 (result 갱신마다 재실행, 실시간 소스 포함)
  useEffect(() => {
    if (!result) { setCrossVal(null); return; }
    let cancelled = false;
    setCrossValLoading(true);
    crossValidate(home, away, result, matchDate).then(cv => {
      if (!cancelled) { setCrossVal(cv); setCrossValLoading(false); }
    });
    return () => { cancelled = true; };
  }, [home, away, result, matchDate]);

  // 공통: 예측 레코드 골격 생성 (스코어 미정 = pending)
  const buildBaseRecord = useCallback(() => ({
    id: `${home}_${away}_${Date.now()}`,
    home, away,
    matchDate: matchDate || null,
    predictedProbs: { home: result.homeWinProb, draw: result.drawProb, away: result.awayWinProb },
    predictedOutcome: predictedOutcome(result),
    predictedOU: predictedOU(result.overUnder),   // ★ {2.5:"over"|"under", 3.5:...}
    overUnderProbs: result.overUnder ?? null,     // ★ 예측 시점 확률 박제
    predictedTopScore: result.topScores?.[0]?.score ?? null,
    actualScore: null,
    actualOutcome: null,
    isHit: null,
    actualOU: null,
    ouHits: null,
    resultStatus: "pending",      // pending → final
    resultSource: null,
    confidence: crossVal?.confidence ?? null,
    sims: result.sims,
    lambdaHome: result.lambdaHome,
    lambdaAway: result.lambdaAway,
    savedAt: Date.now(),
  }), [home, away, matchDate, result, crossVal]);

  // ① 예측 즉시 저장 (스코어 대기중) — 경기 전에 예측만 박제
  const handleSavePrediction = useCallback(async () => {
    if (!result) return;
    setSaveStatus("saving");
    const record = buildBaseRecord();
    const ok = await savePredictionRecord(record);
    if (ok) { setSaveStatus("saved"); setSavedRecord(record); if (onSaved) onSaved(record); }
    else setSaveStatus("error");
  }, [result, buildBaseRecord, onSaved]);

  // ② API로 종료된 경기 스코어 자동 조회 → 적중판정 후 저장/갱신
  const handleFetchResult = useCallback(async () => {
    if (!result) return;
    setFetchStatus("fetching");
    const res = await fetchMatchResult(home, away, matchDate);
    if (res && res.home != null && res.away != null && res.finished) {
      const base = savedRecord && savedRecord.resultStatus === "pending" ? savedRecord : buildBaseRecord();
      const filled = applyResultToRecord(base, res.home, res.away, "api");
      const ok = await savePredictionRecord(filled);
      if (ok) {
        try { updateEloAfterMatch(home, away, res.home, res.away); } catch (e) {}
        setSavedRecord(filled); setSaveStatus("saved"); setFetchStatus("found");
        setHomeScore(String(res.home)); setAwayScore(String(res.away));
        if (onSaved) onSaved(filled);
      } else setFetchStatus("error");
    } else if (res && !res.finished) {
      setFetchStatus("notfinished");
    } else {
      setFetchStatus("notfound"); // ID 미보유/미종료/CORS → 수동 입력 유도
    }
  }, [home, away, matchDate, result, savedRecord, buildBaseRecord, onSaved]);

  // ③ 수동 입력 저장 (폴백)
  const handleSaveResult = useCallback(async () => {
    if (homeScore === "" || awayScore === "" || !result) return;
    const hg = parseInt(homeScore, 10), ag = parseInt(awayScore, 10);
    if (isNaN(hg) || isNaN(ag) || hg < 0 || ag < 0) { setSaveStatus("error"); return; }

    setSaveStatus("saving");
    const base = savedRecord && savedRecord.resultStatus === "pending" ? savedRecord : buildBaseRecord();
    const filled = applyResultToRecord(base, hg, ag, "manual");
    const ok = await savePredictionRecord(filled);
    if (ok) {
      try { updateEloAfterMatch(home, away, hg, ag); } catch (e) { /* ELO 갱신 실패해도 저장은 유지 */ }
      setSaveStatus("saved");
      setSavedRecord(filled);
      if (onSaved) onSaved(filled);
    } else {
      setSaveStatus("error");
    }
  }, [home, away, homeScore, awayScore, result, savedRecord, buildBaseRecord, onSaved]);

  if (!home || !away) {
    return <div style={{ padding:24, color:T.muted, textAlign:"center" }}>홈팀과 원정팀을 선택해주세요.</div>;
  }
  if (home === away) {
    return <div style={{ padding:24, color:T.red, textAlign:"center" }}>서로 다른 팀을 선택해주세요.</div>;
  }
  if (!result) {
    return <div style={{ padding:24, color:T.muted, textAlign:"center" }}>예측 계산 중...</div>;
  }

  return (
    <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, fontSize:18, fontWeight:800, marginBottom:4 }}>
        <span>{flag(home)} {home}</span>
        <span style={{ color:T.muted, fontSize:13, fontWeight:400 }}>vs</span>
        <span>{away} {flag(away)}</span>
      </div>
      {matchDate && <div style={{ textAlign:"center", fontSize:11, color:T.cyan, marginBottom:6 }}>📅 {matchDate} 경기</div>}

      {/* 실시간 반영 상태 배지 */}
      <div style={{ textAlign:"center", marginBottom:10 }}>
        {liveLoading
          ? <Badge color={T.dim}>⏳ 실시간 데이터 반영 중...</Badge>
          : result.liveApplied
            ? <Badge color={T.green}>🔴 실시간 반영됨 · {result.liveSources?.map(s=>s==="market"?"배당":s==="apiFootball"?"API예측":s).join("+")} (가중 {Math.round((result.liveWeight||0)*100)}%)</Badge>
            : <Badge color={T.gold}>📁 정적 모델 (실시간 미연동 — 설정에서 프록시/키 확인)</Badge>}
      </div>

      <TriBar home={result.homeWinProb} draw={result.drawProb} away={result.awayWinProb} homeLabel={home} awayLabel={away}/>

      {/* 정적 → 실시간 변화량 */}
      {result.liveApplied && result.staticProbs && (
        <div style={{ marginTop:6, fontSize:10, color:T.muted, textAlign:"center" }}>
          정적 대비 변화: {home} {fmtShift(result.staticProbs.home, result.homeWinProb)} ·
          무 {fmtShift(result.staticProbs.draw, result.drawProb)} ·
          {away} {fmtShift(result.staticProbs.away, result.awayWinProb)}
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:14 }}>
        <div style={{ background:T.surface, borderRadius:8, padding:10, textAlign:"center" }}>
          <div style={{ fontSize:11, color:T.muted }}>예상 기대득점 (xG)</div>
          <div style={{ fontSize:18, fontWeight:800, color:T.text }}>
            {result.lambdaHome.toFixed(2)} : {result.lambdaAway.toFixed(2)}
          </div>
        </div>
        <div style={{ background:T.surface, borderRadius:8, padding:10, textAlign:"center" }}>
          <div style={{ fontSize:11, color:T.muted }}>ELO (홈/원정)</div>
          <div style={{ fontSize:18, fontWeight:800, color:T.text }}>
            {Math.round(result.homeElo)} : {Math.round(result.awayElo)}
          </div>
        </div>
      </div>

      <div style={{ marginTop:12 }}>
        <div style={{ fontSize:12, color:T.muted, marginBottom:6 }}>주요 예상 스코어라인 (Top 5)</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {result.topScores.map((s,i) => (
            <Badge key={i} color={i===0 ? T.accent : T.dim} style={{ color: i===0 ? "#fff":T.text }}>
              {s.score} ({(s.prob*100).toFixed(1)}%)
            </Badge>
          ))}
        </div>
      </div>

      {/* ★ 오버/언더 2.5 · 3.5 (총 골수 기준) */}
      {result.overUnder && (
        <div style={{ marginTop:12 }}>
          <div style={{ fontSize:12, color:T.muted, marginBottom:6 }}>오버/언더 (총 골수 기준)</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {[2.5, 3.5].map(line => {
              const m = result.overUnder[line];
              if (!m) return null;
              const pickOver = m.over >= m.under;
              return (
                <div key={line} style={{ background:T.surface, borderRadius:8, padding:10 }}>
                  <div style={{ fontSize:11, color:T.muted, marginBottom:6, textAlign:"center" }}>라인 {line}</div>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                    <span style={{ fontWeight: pickOver?800:400, color: pickOver?T.green:T.text }}>오버 {(m.over*100).toFixed(1)}%</span>
                    <span style={{ fontWeight: !pickOver?800:400, color: !pickOver?T.green:T.text }}>언더 {(m.under*100).toFixed(1)}%</span>
                  </div>
                  <MiniBar value={m.over*100} max={100} color={T.green} height={6}/>
                  <div style={{ textAlign:"center", marginTop:6 }}>
                    <Badge color={pickOver?T.green:T.gold}>예측: {OU_LABEL[pickOver?"over":"under"]} {line}</Badge>
                  </div>
                </div>
              );
            })}
          </div>
          {result.liveApplied && result.staticOverUnder && (
            <div style={{ marginTop:6, fontSize:10, color:T.muted, textAlign:"center" }}>
              정적 대비 변화: 2.5오버 {fmtShift(result.staticOverUnder[2.5]?.over, result.overUnder[2.5]?.over)} ·
              3.5오버 {fmtShift(result.staticOverUnder[3.5]?.over, result.overUnder[3.5]?.over)}
            </div>
          )}
          {result.marketTotals && (
            <div style={{ marginTop:6, fontSize:10, color:T.cyan, textAlign:"center" }}>
              시장배당 토탈: {Object.entries(result.marketTotals).map(([line,o])=>`${line}(O${o.over ?? "-"}/U${o.under ?? "-"})`).join(" · ")}
            </div>
          )}
        </div>
      )}

      {/* 몬테카를로 시뮬레이션 + 블렌딩 설명 */}
      <div style={{ marginTop:10, fontSize:11, color:T.muted, textAlign:"center" }}>
        🎲 몬테카를로 <b style={{color:T.cyan}}>{result.sims.toLocaleString()}회</b> ·
        {result.liveApplied
          ? " ELO+ML 모델 + 실시간 배당/예측 가중 혼합"
          : " ELO+ML 앙상블 50% + 시뮬레이션 50% 블렌딩"}
      </div>

      <CrossValidationPanel crossVal={crossVal} loading={crossValLoading} home={home} away={away}/>

      {/* ★ 예측 저장 + 실시간 결과 자동 조회 */}
      <div style={{ marginTop:14, background:T.surface, border:`1px solid ${T.border}`, borderRadius:10, padding:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:T.gold, marginBottom:8 }}>💾 예측 저장 & 결과 추적</div>

        {/* 1단계: 예측 즉시 저장 (경기 전) */}
        <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap" }}>
          <button onClick={handleSavePrediction} disabled={saveStatus==="saving"}
            style={{ background: savedRecord && savedRecord.resultStatus==="pending" ? T.dim : T.accent, color:"#fff", border:"none", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer", fontSize:13, opacity: saveStatus==="saving"?0.6:1 }}>
            {savedRecord ? "✓ 예측 저장됨" : "① 예측 저장 (결과 대기)"}
          </button>
          <button onClick={handleFetchResult} disabled={fetchStatus==="fetching"}
            style={{ background:T.green, color:"#fff", border:"none", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer", fontSize:13, opacity: fetchStatus==="fetching"?0.6:1 }}>
            {fetchStatus==="fetching" ? "조회 중..." : "② 실시간 결과 조회"}
          </button>
        </div>

        {/* 조회 상태 메시지 */}
        {fetchStatus==="found" && (
          <div style={{ marginTop:8, textAlign:"center", color:T.green, fontSize:12 }}>✅ API에서 종료된 경기 스코어를 가져왔습니다.</div>
        )}
        {fetchStatus==="notfinished" && (
          <div style={{ marginTop:8, textAlign:"center", color:T.gold, fontSize:12 }}>⏳ 아직 경기가 종료되지 않았습니다. 종료 후 다시 조회하세요.</div>
        )}
        {fetchStatus==="notfound" && (
          <div style={{ marginTop:8, textAlign:"center", color:T.muted, fontSize:12 }}>
            자동 조회 불가 (팀 API ID 미보유 또는 미연동). 아래에 직접 입력해주세요.
          </div>
        )}

        {/* 폴백: 수동 입력 */}
        <div style={{ marginTop:12, paddingTop:12, borderTop:`1px dashed ${T.border}` }}>
          <div style={{ fontSize:11, color:T.muted, marginBottom:8, textAlign:"center" }}>또는 직접 결과 입력 (적중 판정)</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
            <span style={{ fontSize:12, color:T.muted, minWidth:60, textAlign:"right" }}>{home}</span>
            <input type="number" min="0" value={homeScore} onChange={e=>setHomeScore(e.target.value)}
              placeholder="0" style={{ width:50, padding:"6px 8px", borderRadius:6, border:`1px solid ${T.border}`, background:T.bg, color:T.text, textAlign:"center" }}/>
            <span style={{ color:T.muted }}>:</span>
            <input type="number" min="0" value={awayScore} onChange={e=>setAwayScore(e.target.value)}
              placeholder="0" style={{ width:50, padding:"6px 8px", borderRadius:6, border:`1px solid ${T.border}`, background:T.bg, color:T.text, textAlign:"center" }}/>
            <span style={{ fontSize:12, color:T.muted, minWidth:60 }}>{away}</span>
          </div>
          <div style={{ textAlign:"center", marginTop:10 }}>
            <button onClick={handleSaveResult} disabled={saveStatus==="saving"}
              style={{ background:T.card, color:T.text, border:`1px solid ${T.border}`, borderRadius:8, padding:"7px 18px", fontWeight:700, cursor:"pointer", fontSize:12, opacity: saveStatus==="saving"?0.6:1 }}>
              {saveStatus==="saving" ? "저장 중..." : "수동 저장 & 적중 판정"}
            </button>
          </div>
        </div>

        {/* 최종 결과 표시 */}
        {saveStatus === "saved" && savedRecord && savedRecord.resultStatus === "final" && (
          <div style={{ marginTop:12, textAlign:"center", fontSize:13 }}>
            <div style={{ fontSize:15, fontWeight:800, marginBottom:4 }}>
              {savedRecord.actualScore.home} : {savedRecord.actualScore.away}
              <span style={{ fontSize:11, color:T.muted, marginLeft:6 }}>
                ({savedRecord.resultSource === "api" ? "API 자동" : "수동 입력"})
              </span>
            </div>
            예측: <b>{OUTCOME_LABEL[savedRecord.predictedOutcome]}</b> · 실제: <b>{OUTCOME_LABEL[savedRecord.actualOutcome]}</b>{" "}
            <Badge color={savedRecord.isHit ? T.green : T.red}>{savedRecord.isHit ? "✅ 적중" : "❌ 미적중"}</Badge>
            <div style={{ marginTop:4, color:T.muted, fontSize:11 }}>예측 기록 탭에 저장되었습니다.</div>
          </div>
        )}
        {saveStatus === "saved" && savedRecord && savedRecord.resultStatus === "pending" && (
          <div style={{ marginTop:12, textAlign:"center", fontSize:12, color:T.cyan }}>
            🔖 예측이 저장되었습니다 (결과 대기중). 경기 종료 후 "실시간 결과 조회"를 누르거나 예측 기록 탭에서 일괄 동기화하세요.
          </div>
        )}
        {(saveStatus === "error" || fetchStatus === "error") && (
          <div style={{ marginTop:10, textAlign:"center", color:T.red, fontSize:12 }}>
            저장/조회 실패. 다시 시도해주세요.
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 📜 PredictionHistory — 누적 예측 히스토리 + 정확도
// ═══════════════════════════════════════════════════════════
function PredictionHistory({ refreshKey }) {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const data = await loadAllPredictions();
    setRecords(data);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load, refreshKey]);

  const handleDelete = useCallback(async (id) => {
    await deletePredictionRecord(id);
    load();
  }, [load]);

  // ★ 결과 대기중 예측 일괄 동기화 (API-Football)
  const handleSync = useCallback(async () => {
    setSyncing(true); setSyncMsg(null);
    const { updated, checked } = await autoSyncPendingResults();
    setSyncMsg(checked === 0 ? "대기중인 예측이 없습니다." : `${checked}건 조회 → ${updated}건 결과 확정`);
    await load();
    setSyncing(false);
  }, [load]);

  const resolved = records.filter(r => r.resultStatus === "final");
  const pending = records.filter(r => r.resultStatus !== "final");
  const total = resolved.length;
  const hits = resolved.filter(r => r.isHit).length;
  const accuracy = total > 0 ? (hits / total * 100) : 0;

  // ★ 오버/언더 누적 정확도 (구버전 레코드는 ouHits 없음 → 자동 제외)
  const ouResolved25 = resolved.filter(r => r.ouHits?.[2.5] != null);
  const ouHits25 = ouResolved25.filter(r => r.ouHits[2.5]).length;
  const ouAcc25 = ouResolved25.length > 0 ? (ouHits25/ouResolved25.length*100) : null;
  const ouResolved35 = resolved.filter(r => r.ouHits?.[3.5] != null);
  const ouHits35 = ouResolved35.filter(r => r.ouHits[3.5]).length;
  const ouAcc35 = ouResolved35.length > 0 ? (ouHits35/ouResolved35.length*100) : null;

  if (loading) {
    return <div style={{ padding:24, textAlign:"center", color:T.muted }}>예측 히스토리 불러오는 중...</div>;
  }

  return (
    <div>
      <div style={{
        background:T.card, border:`1px solid ${T.border}`, borderRadius:14,
        padding:16, marginBottom:14, display:"flex", alignItems:"center", justifyContent:"space-between"
      }}>
        <div>
          <div style={{ fontSize:12, color:T.muted }}>누적 정확도</div>
          <div style={{ fontSize:26, fontWeight:900, color: accuracy>=50 ? T.green : T.red }}>
            {accuracy.toFixed(1)}%
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:12, color:T.muted }}>적중 / 확정</div>
          <div style={{ fontSize:18, fontWeight:700, color:T.text }}>{hits} / {total}</div>
          {pending.length > 0 && <div style={{ fontSize:10, color:T.cyan, marginTop:2 }}>결과 대기 {pending.length}건</div>}
        </div>
        <div style={{ width:120 }}>
          <MiniBar value={accuracy} max={100} color={accuracy>=50 ? T.green : T.red} height={10}/>
        </div>
      </div>

      {(ouAcc25 != null || ouAcc35 != null) && (
        <div style={{
          background:T.card, border:`1px solid ${T.border}`, borderRadius:14,
          padding:"10px 16px", marginBottom:14, display:"flex", justifyContent:"space-around", fontSize:12
        }}>
          {ouAcc25 != null && (
            <div style={{ textAlign:"center" }}>
              <div style={{ color:T.muted, fontSize:11 }}>O/U 2.5 정확도</div>
              <div style={{ fontWeight:800, color: ouAcc25>=50?T.green:T.red }}>{ouAcc25.toFixed(1)}% ({ouHits25}/{ouResolved25.length})</div>
            </div>
          )}
          {ouAcc35 != null && (
            <div style={{ textAlign:"center" }}>
              <div style={{ color:T.muted, fontSize:11 }}>O/U 3.5 정확도</div>
              <div style={{ fontWeight:800, color: ouAcc35>=50?T.green:T.red }}>{ouAcc35.toFixed(1)}% ({ouHits35}/{ouResolved35.length})</div>
            </div>
          )}
        </div>
      )}

      {/* ★ 결과 대기중 예측 일괄 동기화 */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <button onClick={handleSync} disabled={syncing || pending.length===0}
          style={{ flex:1, background: pending.length>0 ? T.green : T.dim, color:"#fff", border:"none",
            borderRadius:10, padding:"10px", fontWeight:700, fontSize:13,
            cursor: pending.length>0 ? "pointer":"default", opacity: syncing?0.6:1 }}>
          {syncing ? "동기화 중..." : `🔄 종료 경기 결과 일괄 동기화${pending.length>0 ? ` (${pending.length}건)` : ""}`}
        </button>
        <button onClick={load} title="새로고침"
          style={{ background:T.card, border:`1px solid ${T.border}`, color:T.text, borderRadius:10, padding:"10px 14px", cursor:"pointer" }}>↻</button>
      </div>
      {syncMsg && <div style={{ marginTop:-6, marginBottom:12, textAlign:"center", fontSize:12, color:T.cyan }}>{syncMsg}</div>}

      {!records.length ? (
        <div style={{ padding:24, textAlign:"center", color:T.muted, border:`1px dashed ${T.border}`, borderRadius:12 }}>
          저장된 예측 기록이 없습니다.<br/>
          <span style={{ fontSize:12 }}>예측 탭에서 "예측 저장"을 누르면 여기에 누적됩니다.</span>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {records.map(r => {
            const isFinal = r.resultStatus === "final";
            return (
              <div key={r.id} style={{
                background:T.card, border:`1px solid ${isFinal ? T.border : T.borderHi}`, borderRadius:10,
                padding:"10px 12px", display:"flex", alignItems:"center", gap:10, fontSize:12
              }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, color:T.text }}>
                    {flag(r.home)} {r.home}{" "}
                    {isFinal
                      ? <span style={{ color:T.gold }}>{r.actualScore.home} - {r.actualScore.away}</span>
                      : <span style={{ color:T.muted }}>vs</span>}{" "}
                    {r.away} {flag(r.away)}
                  </div>
                  <div style={{ color:T.muted, marginTop:2 }}>
                    예측: {OUTCOME_LABEL[r.predictedOutcome]}
                    {r.predictedTopScore ? ` ${r.predictedTopScore}` : ""}
                    {" "}(홈 {pct(r.predictedProbs.home)} · 무 {pct(r.predictedProbs.draw)} · 원정 {pct(r.predictedProbs.away)})
                    {r.confidence != null && ` · 신뢰도 ${r.confidence}/100`}
                    {r.sims ? ` · ${r.sims.toLocaleString()}회` : ""}
                  </div>
                  {r.predictedOU && (
                    <div style={{ color:T.muted, marginTop:2, fontSize:11 }}>
                      O/U 예측: 2.5 {OU_LABEL[r.predictedOU[2.5]]}
                      {isFinal && r.ouHits?.[2.5] != null && (r.ouHits[2.5] ? " ✅" : " ❌")}
                      {" · "}3.5 {OU_LABEL[r.predictedOU[3.5]]}
                      {isFinal && r.ouHits?.[3.5] != null && (r.ouHits[3.5] ? " ✅" : " ❌")}
                      {isFinal && r.actualOU && ` (실제 합계 ${r.actualScore.home + r.actualScore.away}골)`}
                    </div>
                  )}
                  <div style={{ color:T.dim, marginTop:2, fontSize:10 }}>
                    예측 {new Date(r.savedAt).toLocaleString("ko-KR")}
                    {isFinal && r.resultSource && ` · 결과 ${r.resultSource==="api" ? "API 자동" : "수동"}`}
                  </div>
                </div>
                {isFinal
                  ? <Badge color={r.isHit ? T.green : T.red}>{r.isHit ? "✅ 적중" : "❌ 미적중"}</Badge>
                  : <Badge color={T.cyan}>⏳ 대기</Badge>}
                <button onClick={()=>handleDelete(r.id)} title="삭제"
                  style={{ background:"transparent", border:"none", color:T.muted, cursor:"pointer", fontSize:14 }}>
                  🗑
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 🪪 TeamModal — 팀 상세 (스쿼드/포메이션/통계·xG/부상)
//    ★ API 오류 처리 강화: 모든 외부 호출 try/catch, 실패시 정적 SQUADS 폴백
// ═══════════════════════════════════════════════════════════
function TeamModal({ teamName, onClose }) {
  const [tab, setTab] = useState("squad");
  const [liveSquad, setLiveSquad] = useState(null);
  const [liveInjuries, setLiveInjuries] = useState(null);
  const [apiLoading, setApiLoading] = useState(true);
  const [apiError, setApiError] = useState(false);

  const squad = SQUADS[teamName];
  const elo = ELO[teamName];
  const spi = SPI_RATINGS[teamName];
  const opta = OPTA_RANKINGS[teamName];

  useEffect(() => {
    if (!teamName) return;
    let cancelled = false;
    setApiLoading(true); setApiError(false); setLiveSquad(null); setLiveInjuries(null);
    (async () => {
      try {
        const [sq, inj] = await Promise.allSettled([
          fetchLiveSquad(teamName),
          fetchLiveInjuries(teamName),
        ]);
        if (cancelled) return;
        if (sq.status === "fulfilled" && sq.value) setLiveSquad(sq.value);
        if (inj.status === "fulfilled" && inj.value) setLiveInjuries(inj.value);
        // 둘 다 실패해도 에러로 취급하지 않음 — 정적 SQUADS 데이터로 폴백 표시
      } catch (e) {
        if (!cancelled) setApiError(true);
      } finally {
        if (!cancelled) setApiLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [teamName]);

  if (!squad) {
    return (
      <div onClick={onClose} style={overlayStyle}>
        <div onClick={e=>e.stopPropagation()} style={modalStyle}>
          <div style={{ padding:20, color:T.muted, textAlign:"center" }}>
            "{teamName}" 팀 데이터를 찾을 수 없습니다.
            <div style={{ marginTop:12 }}>
              <button onClick={onClose} style={closeBtnStyle}>닫기</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  const TABS = [
    { id:"squad", label:"스쿼드" },
    { id:"formation", label:"포메이션" },
    { id:"stats", label:"통계·xG" },
    { id:"injuries", label:"부상" },
  ];

  return (
    <div onClick={onClose} style={overlayStyle}>
      <div onClick={e=>e.stopPropagation()} style={modalStyle}>
        {/* 헤더 */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", borderBottom:`1px solid ${T.border}` }}>
          <div>
            <div style={{ fontSize:18, fontWeight:800, color:T.text }}>{flag(teamName)} {teamName}</div>
            <div style={{ fontSize:12, color:T.muted, marginTop:2 }}>
              감독 {squad.coach} · {squad.formation} · 그룹 {squad.group}
              {apiLoading && <span style={{ marginLeft:8, color:T.cyan }}>· 라이브 데이터 동기화중...</span>}
              {!apiLoading && !liveSquad && <span style={{ marginLeft:8, color:T.dim }}>· 정적 데이터 표시중</span>}
            </div>
          </div>
          <button onClick={onClose} style={closeBtnStyle}>✕</button>
        </div>

        {/* 탭 */}
        <div style={{ display:"flex", gap:6, padding:"10px 16px", borderBottom:`1px solid ${T.border}`, overflowX:"auto" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background: tab===t.id ? T.accent : "transparent",
              color: tab===t.id ? "#fff" : T.muted,
              border:`1px solid ${tab===t.id ? T.accent : T.border}`,
              borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
            }}>{t.label}</button>
          ))}
        </div>

        {/* 본문 */}
        <div style={{ padding:16, overflowY:"auto", flex:1 }}>
          {apiError && (
            <div style={{ background:"#3a1a1a", border:`1px solid ${T.red}`, borderRadius:8, padding:10, marginBottom:12, fontSize:12, color:T.red }}>
              ⚠️ 라이브 데이터 연동 실패 — 정적 데이터(2026.06.01 기준)로 표시합니다.
            </div>
          )}

          {tab === "squad" && (
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {liveSquad ? (
                <SquadPositionGroup title="라이브 스쿼드" players={liveSquad.map(p => p?.player?.name).filter(Boolean)} color={T.cyan}/>
              ) : (
                <>
                  <SquadPositionGroup title="GK" players={squad.gk} color={T.gold}/>
                  <SquadPositionGroup title="DF" players={squad.df} color={T.accent}/>
                  <SquadPositionGroup title="MF" players={squad.mf} color={T.green}/>
                  <SquadPositionGroup title="FW" players={squad.fw} color={T.red}/>
                </>
              )}
              {squad.keyOut?.length > 0 && (
                <div style={{ background:"#3a1a1a", border:`1px solid ${T.red}`, borderRadius:8, padding:10, fontSize:12 }}>
                  <b style={{color:T.red}}>주요 결장:</b> {squad.keyOut.join(", ")}
                </div>
              )}
            </div>
          )}

          {tab === "formation" && (
            <div>
              <div style={{ textAlign:"center", marginBottom:10, color:T.muted, fontSize:12 }}>
                {squad.formation} 예상 선발 라인업
              </div>
              <div style={{
                background:"linear-gradient(180deg,#0d3d1f,#0a2e17)", border:`1px solid ${T.border}`, borderRadius:12,
                padding:"24px 12px", display:"grid", gridTemplateRows:"repeat(4,1fr)", gap:14, minHeight:320
              }}>
                {(() => {
                  const xi = squad.xi || [];
                  // 대략적 포지션 분배: GK 1 / DF 3~5 / MF 3~5 / FW 1~3 (formation 문자열 기반)
                  const parts = (squad.formation||"4-3-3").split("-").map(n=>parseInt(n,10)||0);
                  let idx = 0;
                  const gkRow = xi.slice(idx, idx+1); idx += 1;
                  const rows = [gkRow];
                  for (const n of parts) {
                    rows.push(xi.slice(idx, idx+n));
                    idx += n;
                  }
                  return rows.map((row, ri) => (
                    <div key={ri} style={{ display:"flex", justifyContent:"center", gap:10, flexWrap:"wrap" }}>
                      {row.map((p,pi) => (
                        <div key={pi} style={{ textAlign:"center" }}>
                          <div style={{
                            width:34, height:34, borderRadius:"50%", background:T.accent, color:"#fff",
                            display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, margin:"0 auto"
                          }}>{ri===0?"GK":ri}</div>
                          <div style={{ fontSize:10, color:T.text, marginTop:3, maxWidth:64, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p}</div>
                        </div>
                      ))}
                    </div>
                  )).reverse();
                })()}
              </div>
            </div>
          )}

          {tab === "stats" && elo && (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                <StatCard label="종합 ELO" value={Math.round(getDynElo(teamName,"base"))} max={1900}/>
                <StatCard label="xG 기반 ELO" value={Math.round(getDynElo(teamName,"xgElo"))} max={1900}/>
                <StatCard label="공격 ELO" value={Math.round(getDynElo(teamName,"atk"))} max={1900}/>
                <StatCard label="수비 ELO" value={Math.round(getDynElo(teamName,"def"))} max={1900}/>
                <StatCard label="폼 ELO" value={Math.round(getDynElo(teamName,"form"))} max={1900}/>
                <StatCard label="시장가치 ELO" value={Math.round(getDynElo(teamName,"market"))} max={1900}/>
              </div>
              <div style={{ background:T.surface, borderRadius:10, padding:12 }}>
                <div style={{ fontSize:12, color:T.muted, marginBottom:8 }}>경기당 xG / xGA</div>
                <div style={{ display:"flex", justifyContent:"space-around", textAlign:"center" }}>
                  <div><div style={{fontSize:20,fontWeight:800,color:T.green}}>{getDynElo(teamName,"xG").toFixed(2)}</div><div style={{fontSize:10,color:T.muted}}>xG</div></div>
                  <div><div style={{fontSize:20,fontWeight:800,color:T.red}}>{getDynElo(teamName,"xGA").toFixed(2)}</div><div style={{fontSize:10,color:T.muted}}>xGA</div></div>
                  <div><div style={{fontSize:20,fontWeight:800,color:T.text}}>{(elo.npXg??0).toFixed(2)}</div><div style={{fontSize:10,color:T.muted}}>npxG</div></div>
                </div>
              </div>
              <div style={{ background:T.surface, borderRadius:10, padding:12, display:"flex", justifyContent:"space-around", textAlign:"center", fontSize:12 }}>
                <div><div style={{fontWeight:800,color:T.text}}>{elo.ppda}</div><div style={{color:T.muted,fontSize:10}}>PPDA</div></div>
                <div><div style={{fontWeight:800,color:T.text}}>{elo.fieldTilt}%</div><div style={{color:T.muted,fontSize:10}}>필드틸트</div></div>
                <div><div style={{fontWeight:800,color:T.text}}>{elo.setPxg}</div><div style={{color:T.muted,fontSize:10}}>세트피스xG</div></div>
              </div>
              {spi && (
                <div style={{ background:T.surface, borderRadius:10, padding:12, fontSize:12 }}>
                  <b style={{color:T.cyan}}>FiveThirtyEight SPI:</b> {spi.spi} (off {spi.off} / def {spi.def})
                </div>
              )}
              {opta && (
                <div style={{ background:T.surface, borderRadius:10, padding:12, fontSize:12 }}>
                  <b style={{color:T.gold}}>Opta 파워랭킹:</b> #{opta.rank} (PowerScore {opta.powerScore})
                </div>
              )}
              <div>
                <div style={{ fontSize:12, color:T.muted, marginBottom:6 }}>최근 폼</div>
                <FormDots formArr={elo.formArr || []}/>
              </div>
            </div>
          )}

          {tab === "injuries" && (
            <div>
              {liveInjuries && liveInjuries.length > 0 ? (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {liveInjuries.map((inj, i) => (
                    <div key={i} style={{ background:T.surface, borderRadius:8, padding:10, fontSize:12 }}>
                      <b>{inj?.player?.name ?? "선수명 미상"}</b> — {inj?.player?.reason ?? inj?.player?.type ?? "사유 미상"}
                    </div>
                  ))}
                </div>
              ) : squad.injured?.length > 0 ? (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {squad.injured.map((inj, i) => (
                    <div key={i} style={{ background:T.surface, borderRadius:8, padding:10, fontSize:12 }}>{inj}</div>
                  ))}
                </div>
              ) : (
                <div style={{ padding:20, textAlign:"center", color:T.muted, fontSize:12 }}>
                  보고된 부상 선수가 없습니다.
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SquadPositionGroup({ title, players, color }) {
  if (!players?.length) return null;
  return (
    <div>
      <div style={{ fontSize:12, fontWeight:700, color, marginBottom:6 }}>{title} ({players.length})</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
        {players.map((p,i) => (
          <span key={i} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:6, padding:"4px 10px", fontSize:12, color:T.text }}>{p}</span>
        ))}
      </div>
    </div>
  );
}
function StatCard({ label, value, max }) {
  return (
    <div style={{ background:T.surface, borderRadius:10, padding:10 }}>
      <div style={{ fontSize:11, color:T.muted, marginBottom:4 }}>{label}</div>
      <div style={{ fontSize:18, fontWeight:800, color:T.text, marginBottom:6 }}>{value}</div>
      <MiniBar value={value} max={max} color={T.accent}/>
    </div>
  );
}

};
const closeBtnStyle = {
  background:T.surface, border:`1px solid ${T.border}`, color:T.text, borderRadius:8,
